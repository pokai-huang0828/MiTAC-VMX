n<tr>\n<td><strong>Quantatec<\/strong><\/td>\n<td>客製<\/td>\n<td>(待補)<\/td>\n<td>Camera obstruction 系列(<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6983\" rel=\"noopener\" target=\"_blank\">VMX-6983<\/a> / 7427)<\/td>\n<\/tr>\n<tr>\n<td><strong>HDFE<\/strong><\/td>\n<td>(待補)<\/td>\n<td>(S 那邊)<\/td>\n<td>2026-05-06 抱怨 Q1 Events Page UI 變動<\/td>\n<\/tr>\n<tr>\n<td><strong>LB Technology<\/strong><\/td>\n<td>(待補)<\/td>\n<td>(待補)<\/td>\n<td>Plow PTO / Posted Speed Alert<\/td>\n<\/tr>\n<tr>\n<td><strong>Rastrac<\/strong><\/td>\n<td>(待補)<\/td>\n<td>(待補)<\/td>\n<td>False Speed Event(<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7317\" rel=\"noopener\" target=\"_blank\">VMX-7317<\/a>)<\/td>\n<\/tr>\n<tr>\n<td><strong>Seeing Machines<\/strong><\/td>\n<td>(待補)<\/td>\n<td>(待補)<\/td>\n<td>Rollover detection 需求(<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7194\" rel=\"noopener\" target=\"_blank\">VMX-7194<\/a>)<\/td>\n<\/tr>\n<tr>\n<td><strong>Suvio<\/strong><\/td>\n<td>評估中<\/td>\n<td>(待補)<\/td>\n<td>影像 + 客製語音<\/td>\n<\/tr>\n<tr>\n<td><strong>DSNY<\/strong><\/td>\n<td>(待補)<\/td>\n<td>(待補)<\/td>\n<td>Camera Pilot Project / RTR+Camera<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"_3\">每週固定會議<\/h2>\n<ul>\n<li>Azuga AI weekly<\/li>\n<li>內部 AI weekly<\/li>\n<li>Field-side requirements sync<\/li>\n<li>Bridgeron 整合<\/li>\n<li>Q2 Tracker review(Brian 主持)<\/li>\n<\/ul>"}]}, {"id": "03_systems-architecture", "name": "系統架構", "icon": "🏛", "docs": [{"id": "03_systems-architecture--readme", "filename": "README.md", "title": "03 Systems Architecture", "priority": 0, "pending_count": 0, "html": "<h1 id=\"03-systems-architecture\">03 Systems Architecture<\/h1>\n<p>系統架構層 — Portal 雙層 / Plan Type / Server AI 架構 / 影片三版本。<\/p>\n<h2 id=\"_1\">文件<\/h2>\n<ul>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"03_systems-architecture\" data-doc=\"03_systems-architecture--portal-architecture\" href=\"#03_systems-architecture/03_systems-architecture--portal-architecture\">portal-architecture.md<\/a><\/strong> — Master / Fleet portal 雙層 + 19 頁 + 7 頁<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"03_systems-architecture\" data-doc=\"03_systems-architecture--plan-types\" href=\"#03_systems-architecture/03_systems-architecture--plan-types\">plan-types.md<\/a><\/strong> — Standard / Advanced / Pro 商業模型<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"03_systems-architecture\" data-doc=\"03_systems-architecture--server-ai-architecture\" href=\"#03_systems-architecture/03_systems-architecture--server-ai-architecture\">server-ai-architecture.md<\/a><\/strong> — Edge → Server → VLM 4 stages<\/li>\n<\/ul>\n<h2 id=\"_2\">重要相關交付<\/h2>\n<ul>\n<li><strong>客戶簡報 HTML<\/strong>:<code>../../portal_reference/vmx_portal_client_briefing.html<\/code>(中文 25 張)<\/li>\n<li><strong>PDF 複刻 HTML<\/strong>:<code>../../portal_reference/vmx_architecture_replica.html<\/code>(英文 55 張)<\/li>\n<li><strong>Portal 截圖<\/strong>:<code>../../VMX_images/Fleet/<\/code>(16 張)+ <code>../../VMX_images/Master/<\/code>(8 張)<\/li>\n<\/ul>"}, {"id": "03_systems-architecture--plan-types", "filename": "plan-types.md", "title": "Plan Type 商業模型", "priority": 5, "pending_count": 1, "html": "<h1 id=\"plan-type\">Plan Type 商業模型<\/h1>\n<blockquote>\n<p>來源:PDF Subscription Plans for TSP<\/p>\n<\/blockquote>\n<h2 id=\"4-plan\">4 種 Plan<\/h2>\n<table>\n<thead>\n<tr>\n<th>Plan<\/th>\n<th>功能<\/th>\n<th>定價(per device/month)<\/th>\n<th>Edge 行為<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Standard<\/strong><\/td>\n<td>Sensor Event + VMX VT Cloud + GPS+Video<\/td>\n<td>$5(13 cams) / $7(47 cams)<\/td>\n<td>強制關閉 MiAI<\/td>\n<\/tr>\n<tr>\n<td><strong>Advanced<\/strong><\/td>\n<td>+ ADAS Event Detection<\/td>\n<td>$7(13 cams) / $9(47 cams)<\/td>\n<td>釋放前向 AI,禁 DMS<\/td>\n<\/tr>\n<tr>\n<td><strong>Pro<\/strong><\/td>\n<td>+ DMS Event Detection(全 AI)<\/td>\n<td>(待補)<\/td>\n<td>全 AI<\/td>\n<\/tr>\n<tr>\n<td><strong>Suspend<\/strong><\/td>\n<td>(PDF 未列)<\/td>\n<td>—<\/td>\n<td>帳號暫停<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"coffee-chat-brian\">待 Coffee Chat 釐清(Brian)<\/h2>\n<ul>\n<li>⚠️ Pro 完整定價<\/li>\n<li>⚠️ Suspend 細節<\/li>\n<li>⚠️ <strong>「13 cams / 47 cams」含義<\/strong>(攝影機數?分群?)<\/li>\n<\/ul>"}, {"id": "03_systems-architecture--portal-architecture", "filename": "portal-architecture.md", "title": "Portal 雙層架構", "priority": 5, "pending_count": 1, "html": "<h1 id=\"portal\">Portal 雙層架構<\/h1>\n<blockquote>\n<p>完整客戶簡報:<code>../../portal_reference/vmx_portal_client_briefing.html<\/code><\/p>\n<\/blockquote>\n<h2 id=\"_1\">雙層架構<\/h2>\n<table>\n<thead>\n<tr>\n<th>層<\/th>\n<th>URL<\/th>\n<th>視角<\/th>\n<th>使用者<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Master Portal<\/strong><\/td>\n<td><code>portal.visionmaxfleet.com<\/code><\/td>\n<td>跨 fleet 設備池總管<\/td>\n<td>Dealer / 經銷商 / MAU<\/td>\n<\/tr>\n<tr>\n<td><strong>Fleet Portal<\/strong><\/td>\n<td><code>www.visionmaxfleet.com<\/code><\/td>\n<td>單一 fleet 內運營<\/td>\n<td>Fleet Manager / 客戶 / 內部 PM<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>→ 設備 flow:Master Portal 把 CDR <strong>分配 / 開通<\/strong>給 Fleet → Fleet Portal 運營<\/p>\n<h2 id=\"fleet-portal-19-kenny\">Fleet Portal 19 頁(Kenny 名下測試帳號可登入)<\/h2>\n<div class=\"highlight\"><pre><span><\/span><code>2026Q1_user_try (fleet 選擇器)            ← PDF 漏\n─────────────\nFleet Operation                            ← PDF 漏(整段)\n├─ Map Overview                            ← PDF 漏\n├─ Dashboard                               ✅\n├─ Trips: List / Detail / Report\n├─ Safety: Events / Detail / File Retrieval / Safety Reports / Coaching   ← Coaching PDF 漏\n├─ Management: Devices / Drivers / Vehicles / Geofences   ← Drivers/Vehicles PDF 漏\n└─ Configurations(5 tabs:Device Settings / Sensor / AI / Road Safety / Safety Score)\n\nAdministration                             ← PDF 漏(整段)\n├─ Accounts &amp; Permissions\n├─ Fleets(2 tabs:Fleets / Contract Fleets)\n├─ Device Usage\n└─ User Activity Logs\n<\/code><\/pre><\/div>\n<h2 id=\"master-portal-7\">Master Portal 7 頁<\/h2>\n<div class=\"highlight\"><pre><span><\/span><code>Master Portal\n├─ Dashboard(4 panel:Total Devices / Healthy-Unhealthy / Activated / Total Fleets)\n├─ Analysis(Plan Types 折線圖,2 tabs:Assigned Device / Fleets)\n├─ Management\n│  ├─ Inventory(IMEI / Recalls / 待分配設備)\n│  ├─ Diagnostics                          ← PDF 漏\n│  ├─ Fleets                               ← PDF 漏(跨 fleet 列表 + New Fleet)\n│  └─ User Account                         ← PDF 漏(Admin / Viewer roles)\n└─ User Activity Logs                      ← PDF 漏\n<\/code><\/pre><\/div>\n<h2 id=\"3-tier-user-model\">3-Tier User Model<\/h2>\n<table>\n<thead>\n<tr>\n<th>L<\/th>\n<th>在哪管<\/th>\n<th>對象<\/th>\n<th>權限範圍<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>L1<\/td>\n<td>Master &gt; User Account(14 人)<\/td>\n<td>經銷商員工<\/td>\n<td>跨 fleet<\/td>\n<\/tr>\n<tr>\n<td>L2<\/td>\n<td>Fleet &gt; A&amp;P(8 人)<\/td>\n<td>單 fleet portal 用戶<\/td>\n<td>單一 fleet<\/td>\n<\/tr>\n<tr>\n<td>L3<\/td>\n<td>Fleet &gt; Drivers(1 人 = Kenny)<\/td>\n<td>駕駛員(被 RFID 識別)<\/td>\n<td>不上 portal<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>⚠️ <strong>新 Viewer Only 角色<\/strong>(<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7088\" rel=\"noopener\" target=\"_blank\">VMX-7088<\/a>,2026-05-06 會議討論):不能 Delete / Edit / Download / Retrieve / Configuration — <strong>「detail 能不能看」待釐清<\/strong>。<\/p>\n<h2 id=\"fleet-portal-entity\">Fleet Portal 三大 Entity<\/h2>\n<div class=\"highlight\"><pre><span><\/span><code>Device(車機)── K-series 硬體 / App Version / ADAS+DMS Health\n   │\n   ├─ via Vehicle Profile binding\n   ▼\nVehicle(車輛)── VIN / Year/Make/Model / Vehicle Type\n   │\nDriver(駕駛)── Employee ID / IC Card S/N / Email\n<\/code><\/pre><\/div>\n<h2 id=\"contract-fleet-pdf\">Contract Fleet 真相(PDF 沒寫)<\/h2>\n<p>PDF 只承認 2 種商業身分:<code>Dealer<\/code> + <code>Customer<\/code>。<\/p>\n<p>但 <strong>Fleet Portal Admin &gt; Fleets 上有 <code>Contract Fleets<\/code> tab<\/strong>,且按鈕是 <code>+ New Account<\/code>(不是 + New Contract Fleet)→ 三種解釋:\n1. UI 超前 PDF\n2. UI 殘留\n3. <strong>最可能<\/strong>:Account-based 模擬(account 跨 fleet 共用,不是真 sub-fleet)<\/p>\n<p>→ ⚠️ <strong>PM 風險<\/strong>:Sales 用這個灰色地帶銷售,可能簽約後 RD 交不出。<\/p>\n<h2 id=\"pdf\">PDF 漏掉率<\/h2>\n<ul>\n<li>Fleet Portal nav:50% 漏(19 頁中 PDF 列 9)<\/li>\n<li>Master Portal nav:57% 漏(7 頁中 PDF 列 3)<\/li>\n<li>頁面深度(按鍵 / 欄位):&gt;80% 漏<\/li>\n<li>整體系統理解:<strong>~70% 沒覆蓋<\/strong><\/li>\n<\/ul>\n<p>→ 「PDF 補強 Wiki ticket」的論據(待跟 Brian 推)。<\/p>"}, {"id": "03_systems-architecture--server-ai-architecture", "filename": "server-ai-architecture.md", "title": "Server AI 架構演進", "priority": 4, "pending_count": 3, "html": "<h1 id=\"server-ai\">Server AI 架構演進<\/h1>\n<blockquote>\n<p>來源:MiAI Roadmap 2026-04-24 Slide 5<\/p>\n<\/blockquote>\n<h2 id=\"4\">4 階段架構演進<\/h2>\n<table>\n<thead>\n<tr>\n<th>階段<\/th>\n<th>架構<\/th>\n<th>Strengths<\/th>\n<th>預期<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>1<\/td>\n<td><strong>Edge AI<\/strong>(目前)<\/td>\n<td>Real-time / Low latency / Offline / Privacy<\/td>\n<td>受限於設備算力<\/td>\n<\/tr>\n<tr>\n<td>2<\/td>\n<td><strong>Edge AI + Server AI<\/strong><\/td>\n<td>二次驗證,降 FP / 借 server 算力<\/td>\n<td>提升精度<\/td>\n<\/tr>\n<tr>\n<td>3<\/td>\n<td><strong>Edge AI + Server VLM<\/strong><\/td>\n<td>全影片語意理解 / 處理複雜混合行為<\/td>\n<td>大幅降 FP/FN<\/td>\n<\/tr>\n<tr>\n<td>4<\/td>\n<td><strong>Edge VLM<\/strong>(終局)<\/td>\n<td>Real-time semantic on-device / 不依賴網路<\/td>\n<td>終極形態<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p><strong>Expected Overall Accuracy Improvement: 20% ~ 40%<\/strong>(視場景)<\/p>\n<h2 id=\"server-ai-jira-tickets-stage-23\">已開的 Server AI Jira tickets(對應 Stage 2/3)<\/h2>\n<table>\n<thead>\n<tr>\n<th>Jira<\/th>\n<th>主題<\/th>\n<th>PIC<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6722\" rel=\"noopener\" target=\"_blank\">VMX-6722<\/a><\/td>\n<td>Server-side LDWS model(防 FP)<\/td>\n<td>Eric / Spencer<\/td>\n<\/tr>\n<tr>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6703\" rel=\"noopener\" target=\"_blank\">VMX-6703<\/a><\/td>\n<td>Configurable Server AI Response Time<\/td>\n<td>(待補)<\/td>\n<\/tr>\n<tr>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7346\" rel=\"noopener\" target=\"_blank\">VMX-7346<\/a><\/td>\n<td>ServerAI pre_event_message 加 cdr 版號<\/td>\n<td>Adonis<\/td>\n<\/tr>\n<tr>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7099\" rel=\"noopener\" target=\"_blank\">VMX-7099<\/a><\/td>\n<td>Migrate IOSix service to AZUGA server<\/td>\n<td>(待補)<\/td>\n<\/tr>\n<tr>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6453\" rel=\"noopener\" target=\"_blank\">VMX-6453<\/a><\/td>\n<td>Server Model Research - Phone Usage<\/td>\n<td>(待補)<\/td>\n<\/tr>\n<tr>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/HAWK-397\" rel=\"noopener\" target=\"_blank\">HAWK-397<\/a> / <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6724\" rel=\"noopener\" target=\"_blank\">VMX-6724<\/a><\/td>\n<td>Server AI phone texting<\/td>\n<td>Jieli<\/td>\n<\/tr>\n<tr>\n<td>RFQ0749-689<\/td>\n<td>Backend 動態覆寫 confidence threshold<\/td>\n<td>Adonis<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"q2-q3-pm\">影片三版本架構(Q2-Q3 PM 級議題)<\/h2>\n<p>未來同一影片可能同時存在三版本:\n1. <strong>原始 video<\/strong>\n2. <strong>模糊版本<\/strong>(Server AI 後製,demand request 模式)\n3. <strong>Debug view<\/strong>(AI 視角)<\/p>\n<p>對 PM:\n- 模糊在 Master/MAU 加 API 開關(<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7088\" rel=\"noopener\" target=\"_blank\">VMX-7088<\/a> / 文件需 Lucy 配合 UI 設計)\n- 模糊不在 fleet portal 上顯示(維持 API 操作)\n- <strong>缺一個「任務完成主動通知」UI 機制<\/strong>(目前缺,未來補)<\/p>\n<h2 id=\"brian-vmxbms-2026-05-06\">⚠️ Brian 戰略翻案 — VMX/BMS 同步(2026-05-06 揭露)<\/h2>\n<p>過去:VisionMax 不給 fleet 改 AI 參數 / BMS 給改 → 兩套 codebase<\/p>\n<p>未來:<strong>兩邊同步實作<\/strong>,VMX 也開放給 fleet 改;API 加保護避免亂改參數<\/p>\n<p>時程:6 個月內會發生的架構決策<\/p>\n<p>PM 跟進:API 文件對齊 / Fleet portal UI 加開關 / 客戶溝通(從「不能改」變「能改」要小心訊息)<\/p>"}, {"id": "03_systems-architecture--master-portal-operations", "filename": "master-portal-operations.md", "title": "Master Portal 操作層(memory 之前 0/8 沒覆蓋)", "priority": 3, "pending_count": 0, "html": "<h1 id=\"master-portal-memory-08\">Master Portal 操作層(memory 之前 0/8 沒覆蓋)<\/h1>\n<blockquote>\n<p>來源:KB Master Portal 8 篇文章\nMemory 整理日:2026-05-06\n⚠️ 各文章內容<strong>沒全部抓<\/strong>,這份是 catalog + 該文章在 KB 的位置 + 對 PM 的意義<\/p>\n<\/blockquote>\n<h2 id=\"kb-master-portal-8\">KB Master Portal 8 篇<\/h2>\n<table>\n<thead>\n<tr>\n<th>KB 文章<\/th>\n<th>對 PM 意義<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>What can I do in Master portal?<\/strong><\/td>\n<td>對客戶 demo 開場必讀,涵蓋總覽<\/td>\n<\/tr>\n<tr>\n<td>How do I add a new device to my fleet?<\/td>\n<td>Onboarding SOP<\/td>\n<\/tr>\n<tr>\n<td><strong>VisionMax Update History &amp; Release Notes<\/strong> ⭐<\/td>\n<td>跟客戶講「最近 release 什麼」必查<\/td>\n<\/tr>\n<tr>\n<td>How to Change Devices Settings to a Normal Car<\/td>\n<td>客戶設備 spec 變更<\/td>\n<\/tr>\n<tr>\n<td>How do I set portal language, time zone, date format?<\/td>\n<td>海外客戶 first-time setup<\/td>\n<\/tr>\n<tr>\n<td><strong>How do I update SW for all devices at one time?<\/strong><\/td>\n<td>批量 OTA(對應 #11 Brian OTA 議題)<\/td>\n<\/tr>\n<tr>\n<td>Portal Usage Guides<\/td>\n<td>完整操作指南<\/td>\n<\/tr>\n<tr>\n<td>How to Add New Account?<\/td>\n<td>Account 管理(對應 Viewer Only Role 議題)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"portal-architecturemd-master-portal-7\">對應到 portal-architecture.md 的 Master Portal 7 頁<\/h2>\n<table>\n<thead>\n<tr>\n<th>KB 文章<\/th>\n<th>對應 portal page<\/th>\n<th>KB Link<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>What can I do in Master portal<\/td>\n<td>Dashboard 總覽<\/td>\n<td>待擴<\/td>\n<\/tr>\n<tr>\n<td>How do I add a new device<\/td>\n<td>Inventory + Fleets<\/td>\n<td>待擴<\/td>\n<\/tr>\n<tr>\n<td>How do I update SW for all devices at one time<\/td>\n<td>Diagnostics(Issue Type 顯示問題機台)<\/td>\n<td>待擴<\/td>\n<\/tr>\n<tr>\n<td>How to Add New Account<\/td>\n<td>User Account<\/td>\n<td>待擴<\/td>\n<\/tr>\n<tr>\n<td>How to Change Devices Settings to a Normal Car<\/td>\n<td>(跨多頁,可能在 Inventory 內)<\/td>\n<td>待擴<\/td>\n<\/tr>\n<tr>\n<td>Portal Usage Guides<\/td>\n<td>(overview 文件)<\/td>\n<td>待擴<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"kb-portal_reference\">⚠️ KB 跟 portal_reference 差異<\/h2>\n<p><code>portal_reference/vmx_portal_client_briefing.html<\/code> 是 Kenny 整理的 25 張投影片版,<strong>比 KB 詳細<\/strong>(因為 PDF + 實際盤點)。<\/p>\n<p>但 KB <strong>更新比較快<\/strong>(VisionMax Update History &amp; Release Notes 是 KB 上專門 Master Portal 文件)。<\/p>\n<p>→ 規則:對客戶 demo 用 portal_reference 投影片;<strong>最新版本對齊看 KB<\/strong>。<\/p>\n<h2 id=\"action-items\">Action Items<\/h2>\n<ul>\n<li>[ ] 開 KB 把 Master Portal 8 篇全部讀過(下次 deep dive 時)<\/li>\n<li>[ ] 把 VisionMax Update History 加進每週 routine(看新 release 對應到 sheet 進度)<\/li>\n<li>[ ] 「How to Add New Account」對應 Viewer Only Role 釐清(2026-05-06 會議議題)<\/li>\n<\/ul>"}, {"id": "03_systems-architecture--vehicle-classification", "filename": "vehicle-classification.md", "title": "Vehicle Classification + Camera Height", "priority": 3, "pending_count": 0, "html": "<h1 id=\"vehicle-classification-camera-height\">Vehicle Classification + Camera Height<\/h1>\n<blockquote>\n<p>來源:KB Fleet Portal「How are passenger / medium / heavy defined and how is camera height set」(2026-05-06 抓)<\/p>\n<\/blockquote>\n<h2 id=\"class-kb\">Class 分類(KB)<\/h2>\n<table>\n<thead>\n<tr>\n<th>Class<\/th>\n<th>類型<\/th>\n<th>重量(lbs)<\/th>\n<th>例子<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>1-3<\/td>\n<td>Passenger / Light Duty<\/td>\n<td>6,000 - 14,000<\/td>\n<td>Pickup trucks<\/td>\n<\/tr>\n<tr>\n<td>4-6<\/td>\n<td>Medium Duty<\/td>\n<td>14,001 - 26,000<\/td>\n<td>Delivery vans<\/td>\n<\/tr>\n<tr>\n<td>7-8<\/td>\n<td>Heavy Duty<\/td>\n<td>&gt; 26,001<\/td>\n<td>Long-haul, construction<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"kbwhy-are-thresholds-different\">為什麼要分(KB:Why are thresholds different)<\/h2>\n<ul>\n<li>載重影響加速 → 大車需要更多時間到同樣速度<\/li>\n<li>因此各事件 threshold 必須差別設定<\/li>\n<\/ul>\n<h2 id=\"camera-height\">Camera Height 設定<\/h2>\n<ul>\n<li>各 vehicle 類型有 <strong>specific height settings + AI parameters<\/strong><\/li>\n<li>VisionMax 開發了 <strong>3 種 vehicle types 對應的 height + AI param<\/strong><\/li>\n<li>技術人員需測量實際安裝高度<\/li>\n<\/ul>\n<h2 id=\"pm\">對應 PM 議題<\/h2>\n<ul>\n<li><strong><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/HAWK-501\" rel=\"noopener\" target=\"_blank\">HAWK-501<\/a> Camera height 不穩定<\/strong>(2026-05-06 Q2 sheet) → 跟車種高度設定有關<\/li>\n<li>客戶問「為什麼相同事件 threshold 不同」→ KB 有官方答案<\/li>\n<li>ADAS calibration 30 km/h × 3min 條件 → 跟 camera height 都是 ADAS 準確度的關鍵<\/li>\n<\/ul>"}]}, {"id": "04_pm-frameworks", "name": "PM 框架", "icon": "📐", "docs": [{"id": "04_pm-frameworks--readme", "filename": "README.md", "title": "04 PM Frameworks", "priority": 0, "pending_count": 0, "html": "<h1 id=\"04-pm-frameworks\">04 PM Frameworks<\/h1>\n<p>Kenny 自萃取的 PM 方法論(從 Hub 第三 tab + 5/6 會議洞察整合)。<\/p>\n<h2 id=\"_1\">文件<\/h2>\n<ul>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"04_pm-frameworks\" data-doc=\"04_pm-frameworks--three-truth-layers\" href=\"#04_pm-frameworks/04_pm-frameworks--three-truth-layers\">three-truth-layers.md<\/a><\/strong> — KB / Sheet / Roadmap 三層真相<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"04_pm-frameworks\" data-doc=\"04_pm-frameworks--commitment-framework\" href=\"#04_pm-frameworks/04_pm-frameworks--commitment-framework\">commitment-framework.md<\/a><\/strong> — 承諾層次框架(承諾透明度而非結果)<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"04_pm-frameworks\" data-doc=\"04_pm-frameworks--tech-client-comm\" href=\"#04_pm-frameworks/04_pm-frameworks--tech-client-comm\">tech-client-comm.md<\/a><\/strong> — 技術型客戶溝通(Vinicius 案)<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"04_pm-frameworks\" data-doc=\"04_pm-frameworks--internal-comm-gap\" href=\"#04_pm-frameworks/04_pm-frameworks--internal-comm-gap\">internal-comm-gap.md<\/a><\/strong> — 內部斷層(Wendy 案)+ 雙向 sync 缺口<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"04_pm-frameworks\" data-doc=\"04_pm-frameworks--core-principles\" href=\"#04_pm-frameworks/04_pm-frameworks--core-principles\">core-principles.md<\/a><\/strong> — 4 條核心 PM 原則<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"04_pm-frameworks\" data-doc=\"04_pm-frameworks--ui-change-management\" href=\"#04_pm-frameworks/04_pm-frameworks--ui-change-management\">ui-change-management.md<\/a><\/strong> — 重大 UI 變更框架(Sunset Plan + Beta 模式,5/6 會議實例)<\/li>\n<\/ul>\n<h2 id=\"_2\">為什麼這層重要<\/h2>\n<p>第三 tab 是 Kenny 從 Platform Science / CONNECTSOURCE 兩案 + 5/6 Q2 Review 萃取出的 PM 框架。<strong>評估期最值錢的個人沉澱<\/strong>。<\/p>\n<p><strong>對外 demo / 內部跟 Brian 對話時,直接拿這層框架<\/strong>證明你不是只會搬資料,有自己的 PM 視角。<\/p>\n<h2 id=\"_3\">主要原始來源<\/h2>\n<ul>\n<li><code>../../Case_learning/case-learning-hub.html<\/code> Tab 3<\/li>\n<li><code>../../meetings/2026-05-06_Q2-RequestReview_meeting-record.md<\/code><\/li>\n<\/ul>"}, {"id": "04_pm-frameworks--commitment-framework", "filename": "commitment-framework.md", "title": "承諾層次框架(Commit Framework)", "priority": 5, "pending_count": 0, "html": "<h1 id=\"commit-framework\">承諾層次框架(Commit Framework)<\/h1>\n<blockquote>\n<p>Kenny 自萃取自 Platform Science / CONNECTSOURCE 兩案的 PM 框架<\/p>\n<\/blockquote>\n<h2 id=\"_1\">核心命題<\/h2>\n<p><strong>研發 PM 不是承諾「結果」,是承諾「透明度」<\/strong>。<\/p>\n<blockquote>\n<p>「七月到的時候,客戶不會是第一個知道『做不到』的人。」<\/p>\n<\/blockquote>\n<h2 id=\"4\">4 層承諾<\/h2>\n<table>\n<thead>\n<tr>\n<th>類型<\/th>\n<th>範例<\/th>\n<th>風險<\/th>\n<th>適用<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>功能上線日期<\/td>\n<td>「七月上線」<\/td>\n<td>高<\/td>\n<td>研發確定性極高才用<\/td>\n<\/tr>\n<tr>\n<td>里程碑節點<\/td>\n<td>「六月底給你 MVP 評估結果」<\/td>\n<td>中<\/td>\n<td>階段評估 / 測試版<\/td>\n<\/tr>\n<tr>\n<td>評估時程<\/td>\n<td>「兩週內告訴你能不能做」<\/td>\n<td>低<\/td>\n<td>需求確認初期<\/td>\n<\/tr>\n<tr>\n<td>資訊更新頻率<\/td>\n<td>「每月底給進度更新」<\/td>\n<td>極低<\/td>\n<td><strong>任何時期都可承諾<\/strong><\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"_2\">金句<\/h2>\n<p><strong>信任不是來自準時,是來自事先預警<\/strong>。<\/p>\n<p>同樣是延兩個月:\n- ✅ 事先預警 → 建立信任\n- ❌ 事後才說 → 摧毀信任<\/p>\n<h2 id=\"vmx\">應用到 VMX 實際情境<\/h2>\n<h3 id=\"viniciusplatform-science\">對 Vinicius(Platform Science)<\/h3>\n<ul>\n<li>不講「Custom SDK 七月上線」(高風險)<\/li>\n<li>講「兩週內告訴你 SDK 文件齊全度」(低風險)+「每月底我會給進度」(極低風險)<\/li>\n<\/ul>\n<h3 id=\"bms-smartlink\">對 BMS Smartlink<\/h3>\n<ul>\n<li>不講「Yawning Q2 上」(高風險,內部測試還不過)<\/li>\n<li>講「Yawning 進入 user TR 階段我們會立刻 sync 給你」(里程碑,中風險)<\/li>\n<\/ul>\n<h3 id=\"hdfe-ui-2026-05-06\">對 HDFE UI 抱怨(2026-05-06 會議)<\/h3>\n<ul>\n<li>不講「九月底正式 deprecate 舊版」(高風險,客戶會抗拒)<\/li>\n<li>用 sunset 流程:Q2 預告 + GA 追蹤 + Q3 9月底正式移除(里程碑 + 資訊更新組合)<\/li>\n<\/ul>\n<h2 id=\"kb-sheet-roadmap\">跟 KB / Sheet / Roadmap 三層真相關係<\/h2>\n<ul>\n<li>三層真相 = <strong>誰看到什麼版本<\/strong>(空間維度)<\/li>\n<li>承諾層次 = <strong>用什麼語法承諾<\/strong>(語言維度)<\/li>\n<li>兩者互補<\/li>\n<\/ul>"}, {"id": "04_pm-frameworks--core-principles", "filename": "core-principles.md", "title": "4 條核心 PM 原則", "priority": 5, "pending_count": 0, "html": "<h1 id=\"4-pm\">4 條核心 PM 原則<\/h1>\n<blockquote>\n<p>Kenny 自萃取自 Platform Science / CONNECTSOURCE 兩案<\/p>\n<\/blockquote>\n<h2 id=\"1\">🔍 1. 讀懂需求背後的動機<\/h2>\n<ul>\n<li>Wendy 說「功能何時出」→ 真正在意「我在客戶面前的可信度」<\/li>\n<li>Vinicius 說「需要 SDK 文件」→ 真正在測「MiTAC 值不值得深度合作」<\/li>\n<\/ul>\n<p><strong>回應動機,不只回應表面問題<\/strong>。<\/p>\n<h2 id=\"2\">🔄 2. 你的工作是「讓事情不卡住」<\/h2>\n<p>具體空白地帶(全部該 PM 主動介入):<\/p>\n<h3 id=\"pm-2026-05-06\">真實的 PM 介入空間(2026-05-06 後校正)<\/h3>\n<table>\n<thead>\n<tr>\n<th>空白地帶<\/th>\n<th>為什麼是真機會<\/th>\n<th>切入點<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>#154 Label 管理 process gap<\/strong><\/td>\n<td>Brian 自評 filter 漏 pick<\/td>\n<td>提 Q2 merge label sweep<\/td>\n<\/tr>\n<tr>\n<td><strong>Sheet ↔ Jira 雙向同步缺口<\/strong><\/td>\n<td>兩個方向都有 mismatch<\/td>\n<td>每兩週 sweep<\/td>\n<\/tr>\n<tr>\n<td><strong>K265 白名單沒 owner<\/strong><\/td>\n<td>Vinicius 案卡點<\/td>\n<td>推 owner<\/td>\n<\/tr>\n<tr>\n<td><strong>Passenger Blurring 可行性沒結論<\/strong><\/td>\n<td>CONNECTSOURCE 案<\/td>\n<td>推結論 + Roadmap 對齊<\/td>\n<\/tr>\n<tr>\n<td><strong>路線圖會議沒人約<\/strong><\/td>\n<td>Wendy 案<\/td>\n<td>主動發起季度 roadmap sync<\/td>\n<\/tr>\n<tr>\n<td><strong>「任務完成主動通知」UI 機制缺<\/strong><\/td>\n<td>模糊功能 / Demand request<\/td>\n<td>跟 Lucy 提<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>⚠️ <strong>不要扛 AI sheet hidden row<\/strong>(那是團隊已決定不做,2026-05-05 校正)。<\/p>\n<h2 id=\"3-pm\">💬 3. PM 是「商業翻譯」<\/h2>\n<ul>\n<li>技術成本 → 業務語言<\/li>\n<li>例:<strong>$700/月 AWS 成本<\/strong> 對工程師是基礎設施,對業務是定價變數,對 PM 是要翻譯清楚的橋樑<\/li>\n<li>例:200 Hz G-Sensor 韌體可行性 → 對 Sales 可講「客戶 must-have, 工程在做韌體 study」<\/li>\n<li>業務機會 → 產品優先順序的依據<\/li>\n<li>例:HDFE UI 抱怨 → 不只是「個別客戶問題」, 是「未來重大變更要做 beta 模式」的機會<\/li>\n<\/ul>\n<h2 id=\"4-next-step-owner-timeline\">📅 4. 每次互動要有明確的 Next Step + Owner + Timeline<\/h2>\n<p>不能停在「我們再看看」或「到時候再說」。<\/p>\n<h3 id=\"template\">Template<\/h3>\n<blockquote>\n<p>「下一步:[行動] / 由 [人] / 在 [時間前] 完成。我會在 [check-in 時間點] 跟你 sync 進度。」<\/p>\n<\/blockquote>\n<h3 id=\"_1\">例<\/h3>\n<ul>\n<li>❌「Yawning 的事情我們再討論」<\/li>\n<li>✅「Yawning user TR 開放 / Jieli + Lucy 協作 UI / 兩週內。我下週四 sync 你 user TR 結果。」<\/li>\n<\/ul>"}, {"id": "04_pm-frameworks--three-truth-layers", "filename": "three-truth-layers.md", "title": "三層真相框架", "priority": 5, "pending_count": 0, "html": "<h1 id=\"_1\">三層真相框架<\/h1>\n<h2 id=\"_2\">核心命題<\/h2>\n<p><strong>對外用 Roadmap、對內用 Sheet、實際是否能用看 KB<\/strong>。<\/p>\n<div class=\"highlight\"><pre><span><\/span><code>┌─────────────────────────────────────────┐\n│  KB         → 已 ship 的事實              │   對客戶可具體承諾\n├─────────────────────────────────────────┤\n│  Sheet      → 內部進行中                  │   PM 內部判斷依據\n├─────────────────────────────────────────┤\n│  Roadmap    → 對外規劃故事                │   客戶 / 主管的版本\n└─────────────────────────────────────────┘\n<\/code><\/pre><\/div>\n<h2 id=\"_3\">衝突處理規則<\/h2>\n<h3 id=\"sheet-pm\">時程衝突 → Sheet 為真實時程(對 PM 內部判斷)<\/h3>\n<ul>\n<li>例:VLM,sheet 寫 2026 Q3,Roadmap 寫 2H‘2027 → 內部知道是 Q3,但跟客戶 / 主管講就講 2H‘2027<\/li>\n<\/ul>\n<h3 id=\"sheet\">功能成熟度 → Sheet 為真實狀態<\/h3>\n<ul>\n<li>例:Smoking,sheet 顯示 active dev / Edge 70% 準確,Roadmap 列 Basic 已 ship → 對外可參照 Roadmap,<strong>不能對客戶具體承諾上線時間<\/strong><\/li>\n<\/ul>\n<h3 id=\"pic-task-sheet\">PIC / 沒人扛的 task → Sheet 才看得到<\/h3>\n<ul>\n<li>Roadmap 永遠不會講「沒人扛」,Sheet No PIC 是 PM 真實情報<\/li>\n<li>⚠️ 但 <strong>Sheet hidden row = 不在使用<\/strong>,別當「介入空間」(2026-05-05 校正)<\/li>\n<\/ul>\n<h3 id=\"demo-pr-roadmap\">跟客戶 / 主管 demo / PR → Roadmap 敘事<\/h3>\n<ul>\n<li>❌ 不要把 Sheet 內部 ETA / 客戶名 / 衝突狀態講出去<\/li>\n<\/ul>\n<h3 id=\"rd-pm-sheet\">跟 RD / 內部 PM 討論 → Sheet 數據<\/h3>\n<ul>\n<li>✅ 拿 Sheet 進度、PIC、ticket 號講事實<\/li>\n<\/ul>\n<h2 id=\"_4\">踩線警告<\/h2>\n<ul>\n<li>❌ 把 Sheet ETA(VLM 2026 Q3)直接告訴客戶 → 過早承諾<\/li>\n<li>❌ 把 Roadmap 的「Basic tier 有 Smoking / Yawning」當成「production 已支援」對客戶講 → 後面客戶測不到會炸<\/li>\n<li>✅ 對客戶說「在我們 Roadmap 裡的 Basic tier」+「實際上線時間請我內部確認」<\/li>\n<\/ul>\n<h2 id=\"2026-05-06\">已知三層不一致(2026-05-06 截止)<\/h2>\n<table>\n<thead>\n<tr>\n<th>主題<\/th>\n<th>KB<\/th>\n<th>Sheet<\/th>\n<th>Roadmap<\/th>\n<th>對客戶口徑<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Yawning<\/td>\n<td>沒寫<\/td>\n<td>內部測試,效果不如預期<\/td>\n<td>Basic 2025 已 ship<\/td>\n<td>Roadmap planned, 內部測試中<\/td>\n<\/tr>\n<tr>\n<td>Smoking<\/td>\n<td>沒寫<\/td>\n<td>row 隱藏(2026-05-05)<\/td>\n<td>Basic 2025 已 ship<\/td>\n<td>Roadmap planned, 內部開發中<\/td>\n<\/tr>\n<tr>\n<td>MMF<\/td>\n<td>沒寫<\/td>\n<td>沒上線<\/td>\n<td>overview 列<\/td>\n<td>不對客戶承諾<\/td>\n<\/tr>\n<tr>\n<td>VLM<\/td>\n<td>沒寫<\/td>\n<td>2026 Q3(內部目標)<\/td>\n<td>2H‘2027<\/td>\n<td>講 2027<\/td>\n<\/tr>\n<tr>\n<td>Eating/Drinking<\/td>\n<td>沒寫<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/HAWK-562\" rel=\"noopener\" target=\"_blank\">HAWK-562<\/a> 已動<\/td>\n<td>Advanced 2027<\/td>\n<td>講 2027<\/td>\n<\/tr>\n<\/tbody>\n<\/table>"}, {"id": "04_pm-frameworks--internal-comm-gap", "filename": "internal-comm-gap.md", "title": "內部溝通斷層", "priority": 4, "pending_count": 1, "html": "<h1 id=\"_1\">內部溝通斷層<\/h1>\n<blockquote>\n<p>源自 Wendy 案 + 2026-05-06 Sheet/Jira 同步缺口發現<\/p>\n<\/blockquote>\n<h2 id=\"_2\">業務端不滿的根因表<\/h2>\n<table>\n<thead>\n<tr>\n<th>業務感受<\/th>\n<th>根因<\/th>\n<th>PM 解法<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>「不知道功能什麼時候出」<\/td>\n<td>產品端沒主動輸出 roadmap<\/td>\n<td>建立定期 roadmap sync(每季)<\/td>\n<\/tr>\n<tr>\n<td>「不知道能否承諾」<\/td>\n<td>承諾層次太粗,沒里程碑<\/td>\n<td>提供「確認日期」而非「上線日期」<\/td>\n<\/tr>\n<tr>\n<td>「功能說好有,但用不了」<\/td>\n<td>原型 ≠ 可交付,差異未傳達<\/td>\n<td>早期清楚說就緒條件<\/td>\n<\/tr>\n<tr>\n<td>「感覺被蒙在鼓裡」<\/td>\n<td>無常態資訊流,只有被動回應<\/td>\n<td>主動推播,<strong>沒進展也要說<\/strong><\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"_3\">核心洞察<\/h2>\n<p><strong>業務端的不滿通常是資訊不對稱,不是情緒問題<\/strong>。<\/p>\n<p>PM 有責任主動輸出資訊,即使功能沒進展,也要讓業務端知道「我們知道、目前狀態是 X」。<\/p>\n<h2 id=\"sheet-jira-2026-05-06\">Sheet ↔ Jira 雙向同步缺口(2026-05-06 發現)<\/h2>\n<p>PM 角色升級成「Sheet/Jira sync owner」,要處理兩個方向的落差:<\/p>\n<h3 id=\"1sheet-jirajira-sheet\">方向 1:Sheet 落後 Jira(Jira 已關 Sheet 沒改)<\/h3>\n<ul>\n<li>例:<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6754\" rel=\"noopener\" target=\"_blank\">VMX-6754<\/a> / 7029 / 7161 / 7162 — 5/6 Q2 Review 前<\/li>\n<li>業務端看 Sheet 以為「拖了 7 個月」,實際 RD 已交付<\/li>\n<\/ul>\n<h3 id=\"2sheet-jirajira-close\">方向 2:Sheet 領先 Jira(口頭說完成,Jira 沒 close)<\/h3>\n<ul>\n<li>例:<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7082\" rel=\"noopener\" target=\"_blank\">VMX-7082<\/a> / 7233 / 6782 — 5/6 Q2 Review 後新生成<\/li>\n<li>「我做完了」≠ Jira ticket transition<\/li>\n<\/ul>\n<h2 id=\"pm\">PM 介入動作<\/h2>\n<p>每兩週做一次 Sheet × Jira sweep:\n1. 撈 Sheet 顯示 In Process 的 ticket\n2. 比對 Jira 真實狀態\n3. 兩個方向 mismatch 都私訊 owner 確認\n4. 同步後在 Sheet 加 sweep 紀錄<\/p>\n<p>→ 這就是評估期 PM 真實的「沒人扛 = 我來扛」入口。<\/p>\n<h2 id=\"vmx\">對應到 VMX 內部具體案件<\/h2>\n<table>\n<thead>\n<tr>\n<th>案件<\/th>\n<th>業務端感受<\/th>\n<th>PM 解法<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>#11 OTA 17 個月 Brian 自己提<\/td>\n<td>看似 stale<\/td>\n<td><strong>不是內部問題,Akamai 設定錯,Brian 自己不在意<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Yawning(對外 Roadmap 已有 vs 內部測試中)<\/td>\n<td>客戶以為已 ship<\/td>\n<td>對外口徑統一改「Roadmap planned」<\/td>\n<\/tr>\n<tr>\n<td>Smoking(KB 沒寫 / Sheet 隱藏 / Roadmap 列)<\/td>\n<td>業務不確定能否賣<\/td>\n<td>找 Jimmy 確認真實狀態,給 sales 一致口徑<\/td>\n<\/tr>\n<tr>\n<td>#154 Server AI label 沒 pick<\/td>\n<td>API 沒釋出<\/td>\n<td>PM 來扛 merge label sweep<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"wendy\">⚠️ Wendy 待補<\/h2>\n<p>Wendy 是 Hub 第三 tab 提到的內部業務端 stakeholder。身份 / 部門 / 跟進案件不明 — <strong>找 Brian 確認後補進 stakeholders.md<\/strong>。<\/p>"}, {"id": "04_pm-frameworks--tech-client-comm", "filename": "tech-client-comm.md", "title": "技術型客戶溝通", "priority": 4, "pending_count": 0, "html": "<h1 id=\"_1\">技術型客戶溝通<\/h1>\n<blockquote>\n<p>源自 Vinicius / Platform Science 案例<\/p>\n<\/blockquote>\n<h2 id=\"_2\">對立行動清單<\/h2>\n<table>\n<thead>\n<tr>\n<th>❌ 不有效<\/th>\n<th>✅ 有效<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>強調功能多強大<\/td>\n<td>提供精準技術文件<\/td>\n<\/tr>\n<tr>\n<td>只說商業故事<\/td>\n<td>清楚說功能限制<\/td>\n<\/tr>\n<tr>\n<td>等客戶問才回應<\/td>\n<td>跟上客戶測試節奏<\/td>\n<\/tr>\n<tr>\n<td>技術問題模糊帶過<\/td>\n<td>主動定義 Next Step + Owner + 時限<\/td>\n<\/tr>\n<tr>\n<td>讓報價「等一下」<\/td>\n<td><strong>報價作為信任指標,早給<\/strong><\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"_3\">關鍵洞察<\/h2>\n<blockquote>\n<p>「Vinicius 這類技術型決策者,每次互動都在測試 MiTAC 的反應速度與專業度。K265 portal 問題對他不只是 bug — 是『這個合作夥伴值不值得依賴』的評估。」<\/p>\n<\/blockquote>\n<h2 id=\"_4\">識別技術型客戶的訊號<\/h2>\n<ul>\n<li>對方先看 spec / 文件 / API,後問商業<\/li>\n<li>會主動提技術細節挑戰你<\/li>\n<li>重視回覆速度多於話術<\/li>\n<li>報價 / 時程 modulation 比較敏感(看是否專業)<\/li>\n<\/ul>\n<h2 id=\"vmx\">對應到目前 VMX 客戶<\/h2>\n<table>\n<thead>\n<tr>\n<th>客戶<\/th>\n<th>是否技術型<\/th>\n<th>對接方式<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Platform Science (Vinicius)<\/td>\n<td>✅ 強烈<\/td>\n<td>精準文件 / 早報價 / 主動 Next Step<\/td>\n<\/tr>\n<tr>\n<td>BMS<\/td>\n<td>部分(技術 + 商業混)<\/td>\n<td>同步 API 文件 / 雙版本對齊<\/td>\n<\/tr>\n<tr>\n<td>Mainfreight<\/td>\n<td>(待觀察)<\/td>\n<td>—<\/td>\n<\/tr>\n<tr>\n<td>HDFE<\/td>\n<td>UX 取向(非技術型)<\/td>\n<td>用變更管理框架<\/td>\n<\/tr>\n<\/tbody>\n<\/table>"}, {"id": "04_pm-frameworks--ui-change-management", "filename": "ui-change-management.md", "title": "重大 UI 變更管理框架", "priority": 3, "pending_count": 0, "html": "<h1 id=\"ui\">重大 UI 變更管理框架<\/h1>\n<blockquote>\n<p>源自 2026-05-06 Q2 Review 會議:HDFE 抱怨 + 舊 Playback Sunset Plan<\/p>\n<\/blockquote>\n<h2 id=\"brian-beta\">Brian 引入的 Beta 模式<\/h2>\n<blockquote>\n<p>「未來重大變更時可以考慮 BT(beta)期 — 像 AWS、Box、Atlassian 都是先告訴你新介面試用,給你時間,再正式 deprecate。」 — Brian 2026-05-06<\/p>\n<\/blockquote>\n<h2 id=\"kenny\">對應 Kenny 承諾層次框架<\/h2>\n<table>\n<thead>\n<tr>\n<th>變更類型<\/th>\n<th>承諾風險<\/th>\n<th>解法<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>強制日期切換<\/td>\n<td>高風險<\/td>\n<td>不建議<\/td>\n<\/tr>\n<tr>\n<td>beta period + 切換按鈕<\/td>\n<td>中風險<\/td>\n<td>✅ Brian 想引入<\/td>\n<\/tr>\n<tr>\n<td>紅色預告 + GA 追蹤 + 漸進式 sunset<\/td>\n<td>低風險<\/td>\n<td>✅ 已在做(舊 Playback)<\/td>\n<\/tr>\n<tr>\n<td>純資訊更新<\/td>\n<td>極低風險<\/td>\n<td>任何時期都可<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"4-sunset-sop-playback\">4 階段標準 Sunset SOP(從舊 Playback 案萃取)<\/h2>\n<h3 id=\"stage-1ga\">Stage 1:GA 追蹤期(觀察)<\/h3>\n<ul>\n<li>埋 GA 看誰在用<\/li>\n<li><strong>觀察至少一個月<\/strong>(時間太短沒意義)<\/li>\n<li>不只看 page view,要看 visitor / device / browser<\/li>\n<\/ul>\n<h3 id=\"stage-2\">Stage 2:預告期(資訊更新層)<\/h3>\n<ul>\n<li>在頁面上加紅色預告 / 驚嘆號<\/li>\n<li>寫具體日期(不是「即將不再維護」)<\/li>\n<li>範例:「此功能將於 2026-09-30 終止支援」<\/li>\n<\/ul>\n<h3 id=\"stage-3beta-period\">Stage 3:Beta period(中風險承諾層)<\/h3>\n<ul>\n<li>提供「新版 / 舊版切換」按鈕<\/li>\n<li>4 個月 grace period(現在 → 9月底)<\/li>\n<li>用戶有選擇權<\/li>\n<\/ul>\n<h3 id=\"stage-4-deprecate\">Stage 4:正式 deprecate(高風險承諾層)<\/h3>\n<ul>\n<li>跳 alert<\/li>\n<li>引導到新介面<\/li>\n<li>舊頁面下線<\/li>\n<\/ul>\n<h2 id=\"sunset-vmx\">已在跑的 Sunset 案例(VMX 內)<\/h2>\n<table>\n<thead>\n<tr>\n<th>功能<\/th>\n<th>預告日<\/th>\n<th>正式下線<\/th>\n<th>Stage<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>舊 Playback 頁面(#135 / #147 / #182 / <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7132\" rel=\"noopener\" target=\"_blank\">VMX-7132<\/a>)<\/td>\n<td>Q2 2026-05<\/td>\n<td>Q3 2026-09-30<\/td>\n<td>Stage 2-3 之間<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"template\">客戶溝通 template<\/h2>\n<p>對抱怨「不習慣」的客戶(像 HDFE):<\/p>\n<blockquote>\n<p>❌ 「新介面比較好,習慣就好了」<\/p>\n<p>✅ 「我聽到你的 feedback。<strong>這個變更我們確實該提供 transition 期<\/strong>,我會跟產品確認能否給你切換按鈕。同時你能告訴我哪些操作具體變難嗎?(滑鼠次數 / 找事件 / 篩選)我整理後給 owner」<\/p>\n<\/blockquote>\n<p>→ 對應 4 條核心原則:\n1. 讀懂動機(他要可信度,不只是 UI)\n2. 讓事情不卡住(主動推 toggle 提案)\n3. 商業翻譯(把 UX 痛點翻成產品 task)\n4. Next Step + Owner + Timeline<\/p>"}]}, {"id": "05_workflows", "name": "工作流 SOP", "icon": "⚙️", "docs": [{"id": "05_workflows--readme", "filename": "README.md", "title": "05 Workflows", "priority": 0, "pending_count": 0, "html": "<h1 id=\"05-workflows\">05 Workflows<\/h1>\n<p>工作流 SOP 和工具使用。<\/p>\n<h2 id=\"_1\">文件<\/h2>\n<ul>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"05_workflows\" data-doc=\"05_workflows--html-presentation-pipeline\" href=\"#05_workflows/05_workflows--html-presentation-pipeline\">html-presentation-pipeline.md<\/a><\/strong> — HTML 簡報製作 SOP(MDT 2026 模板色)<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"05_workflows\" data-doc=\"05_workflows--mdt-2026-template\" href=\"#05_workflows/05_workflows--mdt-2026-template\">mdt-2026-template.md<\/a><\/strong> — PPT 模板使用指南<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"05_workflows\" data-doc=\"05_workflows--sheet-jira-sync-sweeper\" href=\"#05_workflows/05_workflows--sheet-jira-sync-sweeper\">sheet-jira-sync-sweeper.md<\/a><\/strong> — 每兩週 Sheet × Jira 雙向 sync 流程<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"05_workflows\" data-doc=\"05_workflows--memory-system\" href=\"#05_workflows/05_workflows--memory-system\">memory-system.md<\/a><\/strong> — Claude memory 系統使用方式<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"05_workflows\" data-doc=\"05_workflows--customer-onboarding\" href=\"#05_workflows/05_workflows--customer-onboarding\">customer-onboarding.md<\/a><\/strong> ⭐ — 海外客戶 onboarding 完整 SOP(裝相機 → APN → Driver setup)<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"05_workflows\" data-doc=\"05_workflows--troubleshooting\" href=\"#05_workflows/05_workflows--troubleshooting\">troubleshooting.md<\/a><\/strong> ⭐ — Fleet manager 報修 10 題 checklist<\/li>\n<\/ul>\n<h2 id=\"sop\">何時用各個 SOP<\/h2>\n<table>\n<thead>\n<tr>\n<th>任務<\/th>\n<th>用哪個<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>做客戶簡報<\/td>\n<td>html-presentation-pipeline + mdt-2026-template<\/td>\n<\/tr>\n<tr>\n<td>做 PPT 內部報告<\/td>\n<td>mdt-2026-template(直接拷模板)<\/td>\n<\/tr>\n<tr>\n<td>每兩週對齊 sheet vs jira<\/td>\n<td>sheet-jira-sync-sweeper<\/td>\n<\/tr>\n<tr>\n<td>想記事 / 升級 memory<\/td>\n<td>memory-system<\/td>\n<\/tr>\n<\/tbody>\n<\/table>"}, {"id": "05_workflows--html-presentation-pipeline", "filename": "html-presentation-pipeline.md", "title": "HTML 簡報製作 SOP", "priority": 5, "pending_count": 0, "html": "<h1 id=\"html-sop\">HTML 簡報製作 SOP<\/h1>\n<blockquote>\n<p>2026-05-05 起,新標準對齊 MDT 2026 PowerPoint 模板色 + Calibri<\/p>\n<\/blockquote>\n<h2 id=\"build-script\">色票(寫死在 build script)<\/h2>\n<div class=\"highlight\"><pre><span><\/span><code><span class=\"c1\"># 對齊 MDT 2026 模板<\/span>\n<span class=\"n\">ACCENT1<\/span>     <span class=\"o\">=<\/span> <span class=\"s1\">'#5B9BD5'<\/span>  <span class=\"c1\"># 主藍<\/span>\n<span class=\"n\">ACCENT5<\/span>     <span class=\"o\">=<\/span> <span class=\"s1\">'#4472C4'<\/span>  <span class=\"c1\"># 深藍<\/span>\n<span class=\"n\">ACCENT2<\/span>     <span class=\"o\">=<\/span> <span class=\"s1\">'#ED7D31'<\/span>  <span class=\"c1\"># 橘(強調 / CTA)<\/span>\n<span class=\"n\">ACCENT3<\/span>     <span class=\"o\">=<\/span> <span class=\"s1\">'#A5A5A5'<\/span>  <span class=\"c1\"># 灰<\/span>\n<span class=\"n\">ACCENT4<\/span>     <span class=\"o\">=<\/span> <span class=\"s1\">'#FFC000'<\/span>  <span class=\"c1\"># 金<\/span>\n<span class=\"n\">ACCENT6<\/span>     <span class=\"o\">=<\/span> <span class=\"s1\">'#70AD47'<\/span>  <span class=\"c1\"># 綠<\/span>\n<span class=\"n\">TEXT<\/span>        <span class=\"o\">=<\/span> <span class=\"s1\">'#1B2541'<\/span>  <span class=\"c1\"># 內文深色<\/span>\n<span class=\"n\">TEXT_LIGHT<\/span>  <span class=\"o\">=<\/span> <span class=\"s1\">'#5A6779'<\/span>  <span class=\"c1\"># 副文字<\/span>\n<span class=\"n\">BG<\/span>          <span class=\"o\">=<\/span> <span class=\"s1\">'#FFFFFF'<\/span>  <span class=\"c1\"># 白底<\/span>\n<span class=\"n\">BG_SOFT<\/span>     <span class=\"o\">=<\/span> <span class=\"s1\">'#F4F6FA'<\/span>  <span class=\"c1\"># 卡片背景<\/span>\n<span class=\"n\">BG_STRIPE<\/span>   <span class=\"o\">=<\/span> <span class=\"s1\">'#EAEDF2'<\/span>  <span class=\"c1\"># 表格條紋<\/span>\n<\/code><\/pre><\/div>\n<p>⚠️ <strong>舊 navy <code>#003B71<\/code> + Cabinet Grotesk + Satoshi 已作廢<\/strong>(2026-05-05)<\/p>\n<h2 id=\"cdn\">字型(系統字型,不依賴 CDN)<\/h2>\n<ul>\n<li><strong>英文<\/strong>:Calibri / Segoe UI fallback<\/li>\n<li><strong>中文<\/strong>:微軟正黑體 / 思源宋體 fallback<\/li>\n<\/ul>\n<h2 id=\"html\">HTML 簡報必備結構<\/h2>\n<ol>\n<li>⭐ 套 viewport-base.css(來自 frontend-slides skill,每張 slide 嚴格 <code>100vh<\/code>)<\/li>\n<li>CSS 用 <code>clamp()<\/code> 做尺寸,<strong>絕對不寫 fixed px<\/strong>(否則小螢幕破版)<\/li>\n<li>動畫用 <code>@keyframes revealIn<\/code> + <code>animation: ... both<\/code>\n   - <strong>不要<\/strong>用 <code>.reveal { opacity: 0 }<\/code> + transition + IntersectionObserver(會卡在 0 不顯示)\n   - 直接用 keyframe 載入即播<\/li>\n<li><strong>Slide types<\/strong>:<code>cover<\/code> / <code>section-divider<\/code> / <code>inner<\/code> / <code>end-slide<\/code><\/li>\n<li><strong>JS controller<\/strong>:<code>SlidePresentation<\/code> 類處理鍵盤 / 觸控 / progress bar / nav dots<\/li>\n<\/ol>\n<h2 id=\"_1\">已踩過的坑<\/h2>\n<ul>\n<li>⚠️ <strong>navigate tool 對 <code>file://<\/code> URL 會失敗<\/strong>(自動加 https://)\n  → 用本機 HTTP server:<code>python -m http.server 8766<\/code>(在 portal_reference/)<\/li>\n<li>⚠️ PowerPoint COM 自動化用 win32com:<code>pip install pywin32<\/code>,需要 Windows + 已裝 PowerPoint<\/li>\n<li>⚠️ LibreOffice / pdftoppm 沒裝 → 用 PowerPoint COM 替代(已寫好 export_pngs.py / export_pdf.py)<\/li>\n<li>⚠️ pdftoppm 沒裝:Read tool 讀 PDF 會失敗。改用 PyMuPDF(<code>pip install pymupdf<\/code>)抽文字<\/li>\n<li>⚠️ JS console.log 在 Chrome MCP 會被擋(<code>[BLOCKED]<\/code>)— 改用回傳值的方式 debug<\/li>\n<\/ul>\n<h2 id=\"build-script_1\">已存在 build script(可拷貝改)<\/h2>\n<table>\n<thead>\n<tr>\n<th>檔案<\/th>\n<th>角色<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><code>../../portal_reference/build_html_replica.py<\/code> ⭐<\/td>\n<td>55 頁 PDF 複刻 HTML 生成器<\/td>\n<\/tr>\n<tr>\n<td><code>../../portal_reference/build_briefing_html.py<\/code> ⭐<\/td>\n<td>25 頁客戶簡報 HTML 生成器<\/td>\n<\/tr>\n<tr>\n<td><code>../../portal_reference/build_replica_pptx.py<\/code><\/td>\n<td>55 頁 .pptx 生成器<\/td>\n<\/tr>\n<tr>\n<td><code>../../portal_reference/export_pngs.py<\/code><\/td>\n<td>PowerPoint COM .pptx → PNG<\/td>\n<\/tr>\n<tr>\n<td><code>../../portal_reference/export_pdf.py<\/code><\/td>\n<td>PowerPoint COM .pptx → PDF<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>⚠️ 既有 build script <strong>沒套 MDT 2026 模板<\/strong>(用空白 Presentation 從零畫的)。下次重做要遷移到模板基底:<\/p>\n<div class=\"highlight\"><pre><span><\/span><code><span class=\"kn\">from<\/span><span class=\"w\"> <\/span><span class=\"nn\">pptx<\/span><span class=\"w\"> <\/span><span class=\"kn\">import<\/span> <span class=\"n\">Presentation<\/span>\n<span class=\"n\">p<\/span> <span class=\"o\">=<\/span> <span class=\"n\">Presentation<\/span><span class=\"p\">(<\/span><span class=\"s1\">'MDT_2026_powerpoint_template.pptx'<\/span><span class=\"p\">)<\/span>  <span class=\"c1\"># 拿模板當底<\/span>\n<span class=\"n\">slide<\/span> <span class=\"o\">=<\/span> <span class=\"n\">p<\/span><span class=\"o\">.<\/span><span class=\"n\">slides<\/span><span class=\"o\">.<\/span><span class=\"n\">add_slide<\/span><span class=\"p\">(<\/span><span class=\"n\">p<\/span><span class=\"o\">.<\/span><span class=\"n\">slide_layouts<\/span><span class=\"p\">[<\/span><span class=\"mi\">2<\/span><span class=\"p\">])<\/span>  <span class=\"c1\"># Title and Content 01<\/span>\n<span class=\"n\">slide<\/span><span class=\"o\">.<\/span><span class=\"n\">placeholders<\/span><span class=\"p\">[<\/span><span class=\"mi\">0<\/span><span class=\"p\">]<\/span><span class=\"o\">.<\/span><span class=\"n\">text<\/span> <span class=\"o\">=<\/span> <span class=\"s1\">'標題'<\/span>\n<span class=\"n\">slide<\/span><span class=\"o\">.<\/span><span class=\"n\">placeholders<\/span><span class=\"p\">[<\/span><span class=\"mi\">1<\/span><span class=\"p\">]<\/span><span class=\"o\">.<\/span><span class=\"n\">text<\/span> <span class=\"o\">=<\/span> <span class=\"s1\">'內文'<\/span>\n<span class=\"n\">p<\/span><span class=\"o\">.<\/span><span class=\"n\">save<\/span><span class=\"p\">(<\/span><span class=\"s1\">'output.pptx'<\/span><span class=\"p\">)<\/span>\n<\/code><\/pre><\/div>\n<h2 id=\"sop\">SOP 步驟<\/h2>\n<ol>\n<li>拷貝 <code>build_briefing_html.py<\/code> 為 <code>build_&lt;新主題&gt;_html.py<\/code><\/li>\n<li>改 <code>OUT<\/code> 路徑、<code>&lt;title&gt;<\/code>、所有 slide content<\/li>\n<li>改色票:從舊 navy → MDT 2026 accents<\/li>\n<li>跑 <code>python build_&lt;新主題&gt;_html.py<\/code><\/li>\n<li>開 <code>http://localhost:8766/&lt;新主題&gt;.html<\/code> 驗證<\/li>\n<li>要 PDF / PNG → 用 frontend-slides skill 的 <code>scripts/export-pdf.sh<\/code>(在 <code>~/.claude/skills/frontend-slides/scripts/<\/code>)<\/li>\n<li>要部署到雲端 → <code>scripts/deploy.sh<\/code>(Vercel)<\/li>\n<\/ol>\n<h2 id=\"html-navy\">既有 HTML 簡報(navy 舊版)<\/h2>\n<ul>\n<li><code>../../portal_reference/vmx_portal_client_briefing.html<\/code>(中文 25 張)<\/li>\n<li><code>../../portal_reference/vmx_architecture_replica.html<\/code>(英文 55 張)<\/li>\n<li><code>../../Case_learning/case-learning-hub.html<\/code>(navy <code>#1a3a5c<\/code>)<\/li>\n<\/ul>\n<p>→ 不主動重做,等 Kenny 要新版才換 MDT 2026 配色。<\/p>"}, {"id": "05_workflows--mdt-2026-template", "filename": "mdt-2026-template.md", "title": "MDT 2026 PowerPoint Template SOP", "priority": 5, "pending_count": 0, "html": "<h1 id=\"mdt-2026-powerpoint-template-sop\">MDT 2026 PowerPoint Template SOP<\/h1>\n<blockquote>\n<p>路徑:<code>../../MDT_2026_powerpoint_template.pptx<\/code>(5.96 MB)\n2026-05-05 起所有報告基底<\/p>\n<\/blockquote>\n<h2 id=\"_1\">規格<\/h2>\n<ul>\n<li>尺寸:<strong>16:9<\/strong>(13.33 × 7.50 inch)<\/li>\n<li>字型:<strong>Calibri Light<\/strong>(major)/ <strong>Calibri<\/strong>(minor)/ 新細明體(TC)<\/li>\n<li>6 layouts(內含 sample slide,可刪)<\/li>\n<\/ul>\n<h2 id=\"6-layout\">6 個 Layout<\/h2>\n<table>\n<thead>\n<tr>\n<th>idx<\/th>\n<th>名稱<\/th>\n<th>用途<\/th>\n<th>主要 placeholder<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>0<\/td>\n<td><strong>Title Slide<\/strong><\/td>\n<td>封面<\/td>\n<td>Title(2 行 OK)/ Subtitle<\/td>\n<\/tr>\n<tr>\n<td>1<\/td>\n<td><strong>Breakpage<\/strong><\/td>\n<td>章節分隔<\/td>\n<td>Title + 多層 bullet<\/td>\n<\/tr>\n<tr>\n<td>2<\/td>\n<td><strong>Title and Content 01<\/strong><\/td>\n<td>純文字內頁<\/td>\n<td>Header + bullet 內文<\/td>\n<\/tr>\n<tr>\n<td>3<\/td>\n<td><strong>Title and Content 02<\/strong><\/td>\n<td>內頁 + 物件<\/td>\n<td>Page Title + 段落<\/td>\n<\/tr>\n<tr>\n<td>4<\/td>\n<td><strong>Title and Content 03<\/strong><\/td>\n<td>滿版物件<\/td>\n<td>整片內容區<\/td>\n<\/tr>\n<tr>\n<td>5<\/td>\n<td><strong>Thank You Slide<\/strong><\/td>\n<td>結尾<\/td>\n<td>(純視覺)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"theme-accents\">色票(theme accents)<\/h2>\n<table>\n<thead>\n<tr>\n<th>名稱<\/th>\n<th>色碼<\/th>\n<th>用途<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>accent1<\/td>\n<td><code>#5B9BD5<\/code><\/td>\n<td>主藍<\/td>\n<\/tr>\n<tr>\n<td>accent5<\/td>\n<td><code>#4472C4<\/code><\/td>\n<td>深藍<\/td>\n<\/tr>\n<tr>\n<td>accent2<\/td>\n<td><code>#ED7D31<\/code><\/td>\n<td>橘(強調 / CTA)<\/td>\n<\/tr>\n<tr>\n<td>accent3<\/td>\n<td><code>#A5A5A5<\/code><\/td>\n<td>灰<\/td>\n<\/tr>\n<tr>\n<td>accent4<\/td>\n<td><code>#FFC000<\/code><\/td>\n<td>金<\/td>\n<\/tr>\n<tr>\n<td>accent6<\/td>\n<td><code>#70AD47<\/code><\/td>\n<td>綠<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"python-pptx\">python-pptx 拷模板程式<\/h2>\n<div class=\"highlight\"><pre><span><\/span><code><span class=\"kn\">from<\/span><span class=\"w\"> <\/span><span class=\"nn\">pptx<\/span><span class=\"w\"> <\/span><span class=\"kn\">import<\/span> <span class=\"n\">Presentation<\/span>\n\n<span class=\"c1\"># 拿模板當底<\/span>\n<span class=\"n\">p<\/span> <span class=\"o\">=<\/span> <span class=\"n\">Presentation<\/span><span class=\"p\">(<\/span><span class=\"s1\">'MDT_2026_powerpoint_template.pptx'<\/span><span class=\"p\">)<\/span>\n\n<span class=\"c1\"># (選擇)模板已有 6 張 sample slide,可全部刪掉<\/span>\n<span class=\"n\">xml_slides<\/span> <span class=\"o\">=<\/span> <span class=\"n\">p<\/span><span class=\"o\">.<\/span><span class=\"n\">slides<\/span><span class=\"o\">.<\/span><span class=\"n\">_sldIdLst<\/span>\n<span class=\"n\">slides<\/span> <span class=\"o\">=<\/span> <span class=\"nb\">list<\/span><span class=\"p\">(<\/span><span class=\"n\">xml_slides<\/span><span class=\"p\">)<\/span>\n<span class=\"k\">for<\/span> <span class=\"n\">slide<\/span> <span class=\"ow\">in<\/span> <span class=\"n\">slides<\/span><span class=\"p\">:<\/span>\n    <span class=\"n\">xml_slides<\/span><span class=\"o\">.<\/span><span class=\"n\">remove<\/span><span class=\"p\">(<\/span><span class=\"n\">slide<\/span><span class=\"p\">)<\/span>\n\n<span class=\"c1\"># 加新 slide(用 layout 0 = Title Slide)<\/span>\n<span class=\"n\">slide<\/span> <span class=\"o\">=<\/span> <span class=\"n\">p<\/span><span class=\"o\">.<\/span><span class=\"n\">slides<\/span><span class=\"o\">.<\/span><span class=\"n\">add_slide<\/span><span class=\"p\">(<\/span><span class=\"n\">p<\/span><span class=\"o\">.<\/span><span class=\"n\">slide_layouts<\/span><span class=\"p\">[<\/span><span class=\"mi\">0<\/span><span class=\"p\">])<\/span>\n<span class=\"n\">slide<\/span><span class=\"o\">.<\/span><span class=\"n\">placeholders<\/span><span class=\"p\">[<\/span><span class=\"mi\">0<\/span><span class=\"p\">]<\/span><span class=\"o\">.<\/span><span class=\"n\">text<\/span> <span class=\"o\">=<\/span> <span class=\"s1\">'我的主題'<\/span>\n<span class=\"n\">slide<\/span><span class=\"o\">.<\/span><span class=\"n\">placeholders<\/span><span class=\"p\">[<\/span><span class=\"mi\">1<\/span><span class=\"p\">]<\/span><span class=\"o\">.<\/span><span class=\"n\">text<\/span> <span class=\"o\">=<\/span> <span class=\"s1\">'副標題'<\/span>\n\n<span class=\"c1\"># 加內頁(layout 2 = Title and Content 01)<\/span>\n<span class=\"n\">slide<\/span> <span class=\"o\">=<\/span> <span class=\"n\">p<\/span><span class=\"o\">.<\/span><span class=\"n\">slides<\/span><span class=\"o\">.<\/span><span class=\"n\">add_slide<\/span><span class=\"p\">(<\/span><span class=\"n\">p<\/span><span class=\"o\">.<\/span><span class=\"n\">slide_layouts<\/span><span class=\"p\">[<\/span><span class=\"mi\">2<\/span><span class=\"p\">])<\/span>\n<span class=\"n\">slide<\/span><span class=\"o\">.<\/span><span class=\"n\">placeholders<\/span><span class=\"p\">[<\/span><span class=\"mi\">0<\/span><span class=\"p\">]<\/span><span class=\"o\">.<\/span><span class=\"n\">text<\/span> <span class=\"o\">=<\/span> <span class=\"s1\">'章節標題'<\/span>\n<span class=\"n\">slide<\/span><span class=\"o\">.<\/span><span class=\"n\">placeholders<\/span><span class=\"p\">[<\/span><span class=\"mi\">1<\/span><span class=\"p\">]<\/span><span class=\"o\">.<\/span><span class=\"n\">text<\/span> <span class=\"o\">=<\/span> <span class=\"s1\">'內文 bullet 1<\/span><span class=\"se\">\\n<\/span><span class=\"s1\">內文 bullet 2'<\/span>\n\n<span class=\"n\">p<\/span><span class=\"o\">.<\/span><span class=\"n\">save<\/span><span class=\"p\">(<\/span><span class=\"s1\">'output.pptx'<\/span><span class=\"p\">)<\/span>\n<\/code><\/pre><\/div>\n<h2 id=\"sop\">直接手動編輯 SOP<\/h2>\n<ol>\n<li>拷貝 <code>MDT_2026_powerpoint_template.pptx<\/code> 改名(例:<code>Q2-Review.pptx<\/code>)<\/li>\n<li>PowerPoint 開啟<\/li>\n<li>刪掉 6 張 sample slide<\/li>\n<li><strong>新增投影片時選對應 layout<\/strong>(右鍵 → 新增投影片 → 選 layout)<\/li>\n<li>文字內容直接編輯 placeholder,<strong>不要動字型 / 顏色<\/strong>(讓 theme 跑)<\/li>\n<li>儲存<\/li>\n<\/ol>\n<h2 id=\"pptx-vs-html\">何時用 .pptx vs HTML<\/h2>\n<table>\n<thead>\n<tr>\n<th>用途<\/th>\n<th>.pptx<\/th>\n<th>HTML<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>給主管看 / 內部會議<\/td>\n<td>✅(熟悉)<\/td>\n<td>△<\/td>\n<\/tr>\n<tr>\n<td>客戶現場 demo<\/td>\n<td>△<\/td>\n<td>✅(更專業)<\/td>\n<\/tr>\n<tr>\n<td>海外客戶<\/td>\n<td>△<\/td>\n<td>✅(連結即看)<\/td>\n<\/tr>\n<tr>\n<td>內部知識整理<\/td>\n<td>△<\/td>\n<td>✅<\/td>\n<\/tr>\n<tr>\n<td>含複雜動畫<\/td>\n<td>❌<\/td>\n<td>✅<\/td>\n<\/tr>\n<tr>\n<td>需要列印<\/td>\n<td>✅<\/td>\n<td>△(要 export PDF)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>"}, {"id": "05_workflows--customer-onboarding", "filename": "customer-onboarding.md", "title": "Customer Onboarding SOP(裝相機 → 配置 → 上線)", "priority": 4, "pending_count": 1, "html": "<h1 id=\"customer-onboarding-sop\">Customer Onboarding SOP(裝相機 → 配置 → 上線)<\/h1>\n<blockquote>\n<p>來源:KB Quick Start Guide / Camera Install Position / APN Setting / How to Add Device + Account\n用途:海外客戶 / 新 fleet 客戶 onboarding<\/p>\n<\/blockquote>\n<h2 id=\"_1\">整體流程<\/h2>\n<div class=\"highlight\"><pre><span><\/span><code>1. Master Portal 註冊 master account\n   ↓\n2. Master Portal 加 device 到 inventory\n   ↓\n3. Master Portal 創 fleet + 把 device 分到 fleet\n   ↓\n4. Master Portal 創 fleet manager account(+ Viewer Only Role 待釐清)\n   ↓\n5. 技術人員到車上裝相機(VisionAgent app)\n   ↓\n6. APN 設定(if SIM 不通)\n   ↓\n7. Camera Install Position 確認(VisionAgent live view)\n   ↓\n8. ignition on → 等 calibration → \"Calibration Completed\"\n   ↓\n9. Driver Profile 創 + RFID/QR 卡發放\n   ↓\n10. Driver tap 卡 → trip 開始 → 上線\n<\/code><\/pre><\/div>\n<h2 id=\"step-by-step\">Step-by-step<\/h2>\n<h3 id=\"1-master-devicekbhow-do-i-add-a-new-device\">1. Master 加 Device(KB:How do I add a new device)<\/h3>\n<ul>\n<li>Login Master Portal<\/li>\n<li>Management → Inventory<\/li>\n<li>\n<ul>\n<li>New Device(individual 或 import CSV)<\/li>\n<\/ul>\n<\/li>\n<li>⚠️ Only master admin 可加 — fleet admin 不行<\/li>\n<\/ul>\n<h3 id=\"2-assign-device-to-fleet\">2. Assign Device to Fleet<\/h3>\n<ul>\n<li>Inventory 選 device → assign 到 fleet<\/li>\n<li>設備 power on + 連網後開始 reporting<\/li>\n<\/ul>\n<h3 id=\"3-fleet-manager-accountkbhow-to-add-new-account\">3. 加 Fleet Manager Account(KB:How to Add New Account)<\/h3>\n<ul>\n<li>Master Portal → Management → User Account<\/li>\n<li>新增<\/li>\n<\/ul>\n<h3 id=\"4-visionagentkbhow-to-check-camera-install-position\">4. 裝相機 — VisionAgent(KB:How to Check Camera Install Position)<\/h3>\n<p><strong>前置<\/strong>:VisionAgent app(iOS / Android)+ smartphone WiFi 連 device hotspot<\/p>\n<p><strong>Outward Camera 設定<\/strong>:\n- 車輛停 level ground\n- 相機 view parallel to ground\n- <strong>Ground:Sky = 50:50<\/strong>\n- 矩形框內是 ADAS engine 處理區 → 確保 unobstructed view<\/p>\n<p><strong>Inward Camera 設定<\/strong>:\n- 設 Driver Location:<strong>Right (RHD)<\/strong> / <strong>Left (LHD)<\/strong>\n- Camera Location:選 A / B(具體選法看 KB 圖)\n- DMS 需 clear view of driver’s face<\/p>\n<h3 id=\"5-apn-kbhow-do-i-set-apn-through-visionagent\">5. APN 設定(KB:How do I set APN through VisionAgent)<\/h3>\n<p><strong>何時要做<\/strong>:Telecom APN setting 導致網路失敗時<\/p>\n<p>SOP:\n1. VisionAgent → Search Dashcam → 確認 CDR # match\n2. Save + Yes(連 device WiFi)\n3. Home → SIM → setting screen\n4. Enter APN info → Save Changes\n5. Verify → OK\n6. Diagnostics → 看 APN saved + online 狀態\n7. Disconnect<\/p>\n<h3 id=\"6-driver-identification\">6. Driver Identification 設定<\/h3>\n<p><strong>機種能力<\/strong>:\n- K245 / K245C / K265:RFID + QR\n- K220:QR only\n- K145(c) with i25:都不行<\/p>\n<p><strong>SOP<\/strong>(KB:Driver Identification Setup):\n- VisionMax → Management → Driver → + New Driver\n- 輸入 IC Card S/N(RFID 號)+ name + photo + employee ID\n- 完成後,trip 開始時相機說「Please tap your ID card」/「Please scan your ID QR code」\n- Driver tap NFC 或 scan QR(in-cabin camera 前 3 秒內)<\/p>\n<h3 id=\"7-calibration\">7. 第一次 Calibration<\/h3>\n<ul>\n<li>開車到開放路段<\/li>\n<li>ADAS:<strong>30 km/h × 3 分鐘 + 平坦少彎<\/strong><\/li>\n<li>DMS:20 km/h × 15 秒 + 司機臉穩定<\/li>\n<li>完成語音:”Calibration Completed”<\/li>\n<\/ul>\n<h3 id=\"8\">8. 健康檢查<\/h3>\n<p><strong>Master Portal<\/strong>:Management → Diagnostics\n- 看 device 「Has Issue」狀態\n- Issue Type:Location Function / Sensor Events Detection / 等\n- KB Diagnostics 文章有詳細 Q&amp;A<\/p>\n<h2 id=\"onboarding\">常見 Onboarding 卡點<\/h2>\n<table>\n<thead>\n<tr>\n<th>問題<\/th>\n<th>KB 對應文章<\/th>\n<th>解法<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Camera 不開<\/td>\n<td>Troubleshooting &gt; 沒開機<\/td>\n<td>檢查電源 / fuse / 手動 ignition switch<\/td>\n<\/tr>\n<tr>\n<td>Network 不通<\/td>\n<td>VisionAgent &gt; APN<\/td>\n<td>設 APN<\/td>\n<\/tr>\n<tr>\n<td>Calibration 失敗<\/td>\n<td>(vehicle classification / camera height)<\/td>\n<td>確認 vehicle class + height settings<\/td>\n<\/tr>\n<tr>\n<td>Driver 卡讀不到<\/td>\n<td>Using camera &gt; NFC<\/td>\n<td>對齊 NFC symbol / 換 supported card 格式<\/td>\n<\/tr>\n<tr>\n<td>ADAS Failure<\/td>\n<td>Diagnostics + 30km/h × 3min<\/td>\n<td>看 GPS / 速度條件 / camera 高度<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"pm\">對應 PM 議題<\/h2>\n<ul>\n<li><strong>Vinicius (Platform Science)<\/strong> 案的 K265 white-list 卡點 — 可能是 onboarding step 2 (assign to fleet)沒推 owner<\/li>\n<li><strong>Connect Source<\/strong> Passenger Blurring 跟 onboarding 無關,是 feature<\/li>\n<li><strong>Quantatec obstruction<\/strong>:VisionAgent 可看 inward camera blocked 警示<\/li>\n<\/ul>"}, {"id": "05_workflows--sheet-jira-sync-sweeper", "filename": "sheet-jira-sync-sweeper.md", "title": "Sheet × Jira Sync Sweeper SOP", "priority": 4, "pending_count": 1, "html": "<h1 id=\"sheet-jira-sync-sweeper-sop\">Sheet × Jira Sync Sweeper SOP<\/h1>\n<blockquote>\n<p>Kenny PM 角色升級:每兩週做 Sheet × Jira 雙向 sync。\n起源:2026-05-05 抓出 Sheet stale → 2026-05-06 會議直接落地 4 件同步 → 但又生出 3 個新 mismatch。<\/p>\n<\/blockquote>\n<h2 id=\"_1\">為什麼要做這件事<\/h2>\n<p>業務端的不滿通常是資訊不對稱:\n- <strong>方向 1:Sheet 落後 Jira<\/strong>(Jira 已 close,Sheet 沒改)→ 業務以為「PM/RD 拖延」\n- <strong>方向 2:Sheet 領先 Jira<\/strong>(口頭說完成,Jira 沒 close)→ 看 Jira 以為「沒做完」<\/p>\n<p>PM 是商業翻譯,要消除這層不對稱。<\/p>\n<h2 id=\"sweeper-sop\">雙週 Sweeper SOP(每兩週執行一次)<\/h2>\n<h3 id=\"step-1-sheet-visible-rows\">Step 1:撈 Sheet 真實 visible rows<\/h3>\n<ul>\n<li>開 <a class=\"ext-link\" href=\"https://docs.google.com/spreadsheets/d/1DXCf8vU7ZrtzVdMEPSxHgmDb7cPKJFDK/edit\" rel=\"noopener\" target=\"_blank\">https://docs.google.com/spreadsheets/d/1DXCf8vU7ZrtzVdMEPSxHgmDb7cPKJFDK/edit<\/a><\/li>\n<li><strong>用截圖,不要用 CSV export<\/strong>(CSV 會把 hidden row 一起拉)<\/li>\n<li>看右下角「已顯示 X 列(共 Y 列)」確認 visible 數<\/li>\n<li>Status 欄 filter 顯示 In Process / Discussion / Pending / Feasibility<\/li>\n<\/ul>\n<h3 id=\"step-2-visible-row-jira-link\">Step 2:抓出每筆 visible row 的 Jira link<\/h3>\n<h3 id=\"step-3-jira\">Step 3:批量驗證 Jira 真實狀態<\/h3>\n<ul>\n<li>用 Chrome MCP 或手動點開<\/li>\n<li>重點看:<strong>Status<\/strong>(Open / In Progress / Resolved / Closed)+ <strong>Resolution<\/strong>(Unresolved / Fixed)<\/li>\n<\/ul>\n<h3 id=\"step-4-mismatch\">Step 4:整理兩個方向的 mismatch<\/h3>\n<table>\n<thead>\n<tr>\n<th>Sheet<\/th>\n<th>Jira<\/th>\n<th>方向<\/th>\n<th>動作<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>In Process<\/td>\n<td>Resolved<\/td>\n<td>Sheet 落後<\/td>\n<td>私訊 owner 確認後改 sheet status<\/td>\n<\/tr>\n<tr>\n<td>Resolved<\/td>\n<td>Open<\/td>\n<td>Sheet 領先<\/td>\n<td>私訊 owner 提醒 transition Jira<\/td>\n<\/tr>\n<tr>\n<td>Discussion<\/td>\n<td>In Progress<\/td>\n<td>Sheet 慢一拍<\/td>\n<td>同步 sheet<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3 id=\"step-5-owner\">Step 5:私訊 owner(分人,別丟群組)<\/h3>\n<p>Template:<\/p>\n<blockquote>\n<p>「Hi [Owner],我在做雙週 sheet sync 發現 [#XXX, VMX-XXXX]:\n- Sheet 顯示:[status]\n- Jira 顯示:[status]<\/p>\n<p>是不是 [推測:已交付但 ticket 沒 transition / 還在做但 sheet 改太快]?要不要一起對齊一下?」<\/p>\n<\/blockquote>\n<h3 id=\"step-6-sheet-sheet-sweep\">Step 6:更新 sheet + 在 sheet 加 sweep 紀錄<\/h3>\n<p>在 Discussion Note 欄加註:<code>5/X PM sync - Jira status: [X]<\/code><\/p>\n<h2 id=\"mismatch\">已知歷史 mismatch 紀錄<\/h2>\n<h3 id=\"2026-05-05-sheet\">2026-05-05 抓出(會議前)— Sheet 落後<\/h3>\n<table>\n<thead>\n<tr>\n<th>#<\/th>\n<th>Jira<\/th>\n<th>Sheet<\/th>\n<th>Jira<\/th>\n<th>結果<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>162<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6754\" rel=\"noopener\" target=\"_blank\">VMX-6754<\/a><\/td>\n<td>In Process<\/td>\n<td>Resolved<\/td>\n<td>5/6 同步 ✅<\/td>\n<\/tr>\n<tr>\n<td>165<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7029\" rel=\"noopener\" target=\"_blank\">VMX-7029<\/a><\/td>\n<td>In Process<\/td>\n<td>Resolved<\/td>\n<td>5/6 同步 ✅<\/td>\n<\/tr>\n<tr>\n<td>187<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7161\" rel=\"noopener\" target=\"_blank\">VMX-7161<\/a><\/td>\n<td>In Process<\/td>\n<td>Resolved<\/td>\n<td>5/6 同步 ✅<\/td>\n<\/tr>\n<tr>\n<td>188<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7162\" rel=\"noopener\" target=\"_blank\">VMX-7162<\/a><\/td>\n<td>In Process<\/td>\n<td>Resolved<\/td>\n<td>5/6 同步 ✅<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3 id=\"2026-05-06-sheet\">2026-05-06 抓出(會議後)— Sheet 領先<\/h3>\n<table>\n<thead>\n<tr>\n<th>#<\/th>\n<th>Jira<\/th>\n<th>Sheet<\/th>\n<th>Jira<\/th>\n<th>結果<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>180<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7082\" rel=\"noopener\" target=\"_blank\">VMX-7082<\/a><\/td>\n<td>Resolved<\/td>\n<td>New<\/td>\n<td>⏳ 待私訊 Lucy<\/td>\n<\/tr>\n<tr>\n<td>195<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7233\" rel=\"noopener\" target=\"_blank\">VMX-7233<\/a><\/td>\n<td>Resolved<\/td>\n<td>New<\/td>\n<td>⏳ 待私訊 Internal<\/td>\n<\/tr>\n<tr>\n<td>199<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6782\" rel=\"noopener\" target=\"_blank\">VMX-6782<\/a><\/td>\n<td>Resolved<\/td>\n<td>Open<\/td>\n<td>⏳ 待私訊 joe.lien<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3 id=\"2026-05-06-sheet-link\">2026-05-06 Sheet link 錯誤<\/h3>\n<table>\n<thead>\n<tr>\n<th>#<\/th>\n<th>Sheet 寫<\/th>\n<th>真實應該是<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>194 IOSix dongle<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7316\" rel=\"noopener\" target=\"_blank\">VMX-7316<\/a>(實為 AZUGA SmartLink)<\/td>\n<td>(待釐清)<\/td>\n<\/tr>\n<tr>\n<td>197 UVC integration<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7224\" rel=\"noopener\" target=\"_blank\">VMX-7224<\/a> + <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7147\" rel=\"noopener\" target=\"_blank\">VMX-7147<\/a>(實為 Camera recording bug)<\/td>\n<td>移除 <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7147\" rel=\"noopener\" target=\"_blank\">VMX-7147<\/a><\/td>\n<\/tr>\n<tr>\n<td>209 Viewer only<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7407\" rel=\"noopener\" target=\"_blank\">VMX-7407<\/a>(重複)<\/td>\n<td>應為 <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7088\" rel=\"noopener\" target=\"_blank\">VMX-7088<\/a><\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"_2\">工具命令<\/h2>\n<h3 id=\"python-chrome-mcp\">用 Python + Chrome MCP 批量驗證(已驗證可用)<\/h3>\n<div class=\"highlight\"><pre><span><\/span><code><span class=\"c1\"># 從 sheet visible rows 抓出 jira list,批量檢查<\/span>\n<span class=\"n\">tickets<\/span> <span class=\"o\">=<\/span> <span class=\"p\">[<\/span><span class=\"s1\">'VMX-6754'<\/span><span class=\"p\">,<\/span> <span class=\"s1\">'VMX-7029'<\/span><span class=\"p\">,<\/span> <span class=\"o\">...<\/span><span class=\"p\">]<\/span>\n<span class=\"k\">for<\/span> <span class=\"n\">t<\/span> <span class=\"ow\">in<\/span> <span class=\"n\">tickets<\/span><span class=\"p\">:<\/span>\n    <span class=\"c1\"># navigate to https://jira.navman.co.nz/jira/browse/{t}<\/span>\n    <span class=\"c1\"># find Status field<\/span>\n    <span class=\"c1\"># log result<\/span>\n<\/code><\/pre><\/div>\n<p>→ 可批量自動化,我用過 22 票一次過。<\/p>\n<h2 id=\"off-cycle-sweep\">何時做 Off-cycle sweep<\/h2>\n<ul>\n<li>大會議前 1 天(會議當天才動會被打臉)<\/li>\n<li>客戶 demo 前<\/li>\n<li>跟 Brian 1on1 前<\/li>\n<\/ul>"}, {"id": "05_workflows--troubleshooting", "filename": "troubleshooting.md", "title": "Troubleshooting Checklist(對 fleet manager / 技術人員)", "priority": 4, "pending_count": 0, "html": "<h1 id=\"troubleshooting-checklist-fleet-manager\">Troubleshooting Checklist(對 fleet manager / 技術人員)<\/h1>\n<blockquote>\n<p>來源:KB Troubleshooting + Diagnostics + 各機種 LED Behaviors(2026-05-06 deep read)<\/p>\n<\/blockquote>\n<h2 id=\"checklist\">客戶報修第一層 checklist<\/h2>\n<h3 id=\"q1\">Q1. 設備沒開機<\/h3>\n<p><strong>KB 線索<\/strong>:\n- LED 紅燈 60 秒以上閃 = camera 沒在錄 / 即將關機\n- 數分鐘內會 shut down<\/p>\n<p><strong>檢查<\/strong>:\n- 電源連接 / ignition line(loose contact)\n- 保險絲(power line)\n- Manual ignition switch(部分版本有,要 ON)<\/p>\n<h3 id=\"q2-gps-function-adas-dms\">Q2. GPS Function 失效(導致 ADAS / DMS 都不偵測)<\/h3>\n<p><strong>KB Diagnostic Q1<\/strong>:Location Function — GPS 10 分鐘沒訊號\n<strong>影響<\/strong>:不能建 trip / 不能偵測 ADAS / DMS / 不能記錄 video 位置\n<strong>Solution<\/strong>:確保車輛在 open area,GPS 收得到<\/p>\n<h3 id=\"q3-adas\">Q3. ADAS 觸發失敗(常見!)<\/h3>\n<p><strong>症狀<\/strong>:<code>\"Can't detect the road level, ADAS off\"<\/code> 語音\n<strong>真因 1<\/strong>:速度沒滿足 <strong>30 km/h × 3 分鐘 + 平坦少彎<\/strong>\n<strong>真因 2<\/strong>:Camera height 設錯(車種不對應)\n<strong>真因 3<\/strong>:GPS 失效(連帶)\n<strong>Solution<\/strong>:\n- 開出市區到高速公路維持速度\n- Master Portal Diagnostics 看 ADAS AI Health\n- 確認 Vehicle Class 設對(passenger/medium/heavy)<\/p>\n<h3 id=\"q4-sensor-events\">Q4. Sensor Events 不觸發<\/h3>\n<p><strong>KB Diagnostic Q2<\/strong>:Sensor Events Detection 失敗\n<strong>Solution<\/strong>:檢查 device 安裝是否正確<\/p>\n<h3 id=\"q5-sd-card\">Q5. SD card 找不到 / 錯誤<\/h3>\n<p><strong>KB<\/strong>:\n- 「No SD Card」語音 — 沒插\n- 「SD Card Error」語音 — 讀寫錯誤\n- 紅燈每 15 秒閃一次(K220/K245/K265)\n<strong>Solution<\/strong>:\n- 插 SD card / 換 SD card\n- KB「SD Card Overwriting Mechanism」 — 看是否容量問題\n- 紅色按鍵 hold 10-30s 重格式化(<code>\"SD Card formatting, please wait\"<\/code>)<\/p>\n<h3 id=\"q6-network-apn\">Q6. Network / APN 不通<\/h3>\n<p><strong>KB<\/strong>:K265 orange LED 常亮 = 沒網路\n<strong>Solution<\/strong>:VisionAgent app → 設 APN(海外 SIM 常見)<\/p>\n<h3 id=\"q7-driver\">Q7. Driver 卡讀不到<\/h3>\n<p><strong>KB<\/strong>:「Failed to read the ID Card」語音\n<strong>Solution<\/strong>:\n- 對齊 NFC symbol\n- 換 supported NFC 格式\n- K220:確認用 QR Code(K220 不支援 RFID)\n- K145(c):需 i25 才能 QR<\/p>\n<h3 id=\"q8-privacy-mode\">Q8. Privacy Mode 卡住(設備不錄)<\/h3>\n<p><strong>症狀<\/strong>:<code>\"Private Mode On\"<\/code> 進去後沒再退\n<strong>KB<\/strong>:Privacy Mode 不會自動退,<strong>Restart 後仍維持<\/strong>\n<strong>Solution<\/strong>:Panic Button hold &gt; 2s(KB)→ <code>\"Private Mode Off\"<\/code><\/p>\n<h3 id=\"q9-calibration\">Q9. Calibration 一直不完成<\/h3>\n<p><strong>KB<\/strong>:\n- ADAS:60 km/h × 3 min(KB 寫 — 注意這是 <em>初次 calibration<\/em> 條件,跟持續門檻 30 不同)\n- DMS:20 km/h × 15 秒,臉穩定即可\n- 完成語音「Calibration Completed」\n<strong>Solution<\/strong>:開高速直線路段<\/p>\n<h3 id=\"q10-camera\">Q10. Camera 重置(最後手段)<\/h3>\n<p><strong>KB:How to reset device<\/strong>:\n- 用 paper clip 戳 reset button\n- ⚠️ K245 / K145c / K245c:reset button 在 <strong>tamper proof cover<\/strong> 後面,要先拆<\/p>\n<h2 id=\"escalation\">對技術人員 escalation<\/h2>\n<ul>\n<li>VisionAgent → Diagnostic Scan → 看 health report<\/li>\n<li>如果還不行 → Master Portal 看 Diagnostics 頁<\/li>\n<li>還不行 → KB「How to export the system logs from K220」(K220 special)→ Submit Ticket<\/li>\n<\/ul>\n<h2 id=\"pm-ticket\">對應 PM ticket<\/h2>\n<ul>\n<li><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7404\" rel=\"noopener\" target=\"_blank\">VMX-7404<\/a> ADAS Failure → Q3 多重原因<\/li>\n<li><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7194\" rel=\"noopener\" target=\"_blank\">VMX-7194<\/a> Rollover → Q4 sensor 系列<\/li>\n<li><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7427\" rel=\"noopener\" target=\"_blank\">VMX-7427<\/a> Quantatec obstruction → 屬 Q9 範疇(camera 看不到驅動者)<\/li>\n<li><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7407\" rel=\"noopener\" target=\"_blank\">VMX-7407<\/a> UVC RAW frame error → 屬 Q2 範疇(sensor 不識別)<\/li>\n<\/ul>"}, {"id": "05_workflows--memory-system", "filename": "memory-system.md", "title": "Claude Memory 系統使用", "priority": 3, "pending_count": 0, "html": "<h1 id=\"claude-memory\">Claude Memory 系統使用<\/h1>\n<blockquote>\n<p>Claude Code 跨 session memory 路徑:<code>C:\\Users\\pokai.huang\\.claude\\projects\\C--Users-pokai-huang-Desktop-MiTAC-KennyHuang\\memory\\<\/code><\/p>\n<\/blockquote>\n<h2 id=\"memory-knowledge-folder\">為什麼要記到 memory(而不是 knowledge folder)<\/h2>\n<table>\n<thead>\n<tr>\n<th>屬性<\/th>\n<th>knowledge folder(這資料夾)<\/th>\n<th>Claude memory<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>持久度<\/td>\n<td>跨 session / 跨工具<\/td>\n<td>跨 session(只給 Claude 用)<\/td>\n<\/tr>\n<tr>\n<td>可分享<\/td>\n<td>✅ 可給 Brian / Lucy<\/td>\n<td>❌ 私人<\/td>\n<\/tr>\n<tr>\n<td>內容<\/td>\n<td>結構化、operational<\/td>\n<td>Claude 行為規則 + 校正歷史<\/td>\n<\/tr>\n<tr>\n<td>更新<\/td>\n<td>手動編輯<\/td>\n<td>自然語言觸發 Claude 寫入<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"memory-13-2026-05-06\">Memory 13 條索引(2026-05-06 截止)<\/h2>\n<table>\n<thead>\n<tr>\n<th>類型<\/th>\n<th>名稱<\/th>\n<th>用途<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>user<\/td>\n<td>user_kenny.md<\/td>\n<td>Kenny 個人 profile<\/td>\n<\/tr>\n<tr>\n<td>project<\/td>\n<td>project_vmx.md<\/td>\n<td>VMX 產品 + 利害關係人<\/td>\n<\/tr>\n<tr>\n<td>project<\/td>\n<td>project_training_progress.md<\/td>\n<td>30-day onboarding 暫停狀態<\/td>\n<\/tr>\n<tr>\n<td>project<\/td>\n<td>project_portal_walkthrough.md<\/td>\n<td>Brian portal task + 26 頁系統地圖<\/td>\n<\/tr>\n<tr>\n<td>project<\/td>\n<td>project_meeting_2026-05-06_q2_review.md<\/td>\n<td>5/6 Q2 Review 戰略洞察<\/td>\n<\/tr>\n<tr>\n<td>feedback<\/td>\n<td>feedback_training_style.md<\/td>\n<td>訓練官風格 8 條<\/td>\n<\/tr>\n<tr>\n<td>feedback<\/td>\n<td>feedback_vmx_facts.md<\/td>\n<td>已校正事實 + Sheet vs Jira mismatch 紀錄<\/td>\n<\/tr>\n<tr>\n<td>feedback<\/td>\n<td>feedback_internal_vs_external_truth.md<\/td>\n<td>三層真相規則<\/td>\n<\/tr>\n<tr>\n<td>reference<\/td>\n<td>reference_vmx_resources.md<\/td>\n<td>KB / NotebookLM / Jira 等連結<\/td>\n<\/tr>\n<tr>\n<td>reference<\/td>\n<td>reference_html_pipeline.md<\/td>\n<td>HTML 簡報 SOP(已校正色板)<\/td>\n<\/tr>\n<tr>\n<td>reference<\/td>\n<td>reference_user_skills.md<\/td>\n<td>~/.claude/skills/ 4 個<\/td>\n<\/tr>\n<tr>\n<td>reference<\/td>\n<td>reference_mdt_pptx_template.md<\/td>\n<td>MDT 2026 模板規格<\/td>\n<\/tr>\n<tr>\n<td>reference<\/td>\n<td>reference_miai_roadmap_2026.md<\/td>\n<td>Tier × Chip × Model<\/td>\n<\/tr>\n<tr>\n<td>reference<\/td>\n<td>reference_ai_tasks_sheet_2026-05-05.md<\/td>\n<td>AI sheet 結構洞察 + sync 缺口<\/td>\n<\/tr>\n<tr>\n<td>reference<\/td>\n<td>reference_kenny_pm_frameworks.md<\/td>\n<td>Hub 第三 tab 4 框架<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"claude-memory_1\">何時觸發 Claude 寫 memory<\/h2>\n<ul>\n<li>✅ Kenny 校正 Claude 過去答錯的事實<\/li>\n<li>✅ Kenny 給互動風格 feedback(「不要做 X」/「保持做 Y」)<\/li>\n<li>✅ 重大專案 / 戰略決策(Brian 同步戰略 / 客戶名單變動)<\/li>\n<li>✅ 跨 session 才會用到的 reference(KB 連結 / 帳號 / 路徑)<\/li>\n<\/ul>\n<h2 id=\"not-memory\">何時 NOT 寫 memory<\/h2>\n<ul>\n<li>❌ 一次性對話狀態<\/li>\n<li>❌ 已經在 git history 的程式碼<\/li>\n<li>❌ Knowledge folder 已經有的(別重複)<\/li>\n<li>❌ 機密資料(雖然 memory 在本機,但別當保險箱用)<\/li>\n<\/ul>\n<h2 id=\"_1\">維護建議<\/h2>\n<p>每 2 週執行一次:\n1. 跟 Claude 說「列出 memory 索引,看哪些該合併 / 刪除」\n2. 看哪些 reference 已被 KB / Sheet 取代\n3. 看哪些 project 已結案,可降級為 archive<\/p>\n<h2 id=\"memory-knowledge-folder_1\">Memory 跟 Knowledge folder 的同步<\/h2>\n<p>當 Claude 校正 memory 時,如果該事實也應該在 knowledge folder:\n- 要 Claude 同步更新 knowledge folder 對應檔案\n- 例:Yawning 狀態校正 → 同時更新 <code>01_product-knowledge/kb-cheatsheet.md<\/code> 和 <code>feedback_vmx_facts.md<\/code><\/p>"}]}, {"id": "06_calibration-log", "name": "校正紀錄", "icon": "🎯", "docs": [{"id": "06_calibration-log--readme", "filename": "README.md", "title": "06 Calibration Log", "priority": 0, "pending_count": 0, "html": "<h1 id=\"06-calibration-log\">06 Calibration Log<\/h1>\n<p>校正歷史層 — 已被打臉 / 已校正的事實清單。<\/p>\n<h2 id=\"_1\">文件<\/h2>\n<ul>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"06_calibration-log\" data-doc=\"06_calibration-log--critical-facts-log\" href=\"#06_calibration-log/06_calibration-log--critical-facts-log\">critical-facts-log.md<\/a><\/strong> — 已校正的關鍵事實(機種 / FCW 語音 / ADAS 範圍等)<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"06_calibration-log\" data-doc=\"06_calibration-log--sheet-jira-mismatches\" href=\"#06_calibration-log/06_calibration-log--sheet-jira-mismatches\">sheet-jira-mismatches.md<\/a><\/strong> — Sheet vs Jira 雙向同步缺口紀錄<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"06_calibration-log\" data-doc=\"06_calibration-log--roadmap-vs-internal\" href=\"#06_calibration-log/06_calibration-log--roadmap-vs-internal\">roadmap-vs-internal.md<\/a><\/strong> — 對外 Roadmap vs 內部現實 不一致紀錄<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"06_calibration-log\" data-doc=\"06_calibration-log--vmx-7404-tracking\" href=\"#06_calibration-log/06_calibration-log--vmx-7404-tracking\">vmx-7404-tracking.md<\/a><\/strong> — <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7404\" rel=\"noopener\" target=\"_blank\">VMX-7404<\/a> ADAS Failure 追蹤(評估期主案)<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"06_calibration-log\" data-doc=\"06_calibration-log--ai-team-sheet-snapshot-2026-05-05\" href=\"#06_calibration-log/06_calibration-log--ai-team-sheet-snapshot-2026-05-05\">ai-team-sheet-snapshot-2026-05-05.md<\/a><\/strong> — AI Team 15 件 active tasks 快照<\/li>\n<\/ul>\n<h2 id=\"_2\">為什麼要記校正歷史<\/h2>\n<p>評估期 PM 講錯一個事實 = 失去 RD / 客戶信任。這資料夾是 <strong>「我哪些事不要再講錯」<\/strong> 的清單。<\/p>\n<p>每次 Claude 答錯被 Kenny 修正時,該對應更新這層。<\/p>\n<h2 id=\"_3\">規則<\/h2>\n<ol>\n<li>寫進這資料夾 = 我之前以為對但其實錯<\/li>\n<li>標日期 + 來源(誰糾正的)<\/li>\n<li>給對的版本 + 為什麼之前錯<\/li>\n<li><strong>三層真相不一致<\/strong> ≠ 校正(那是結構問題)→ 進 04_pm-frameworks/<\/li>\n<\/ol>"}, {"id": "06_calibration-log--critical-facts-log", "filename": "critical-facts-log.md", "title": "已校正的關鍵 VMX 事實", "priority": 5, "pending_count": 2, "html": "<h1 id=\"vmx\">已校正的關鍵 VMX 事實<\/h1>\n<blockquote>\n<p>過去 Claude / 對話中答錯後修正的事實。<strong>對 RD / 客戶 / 內部講話前先看這份<\/strong>。<\/p>\n<\/blockquote>\n<h2 id=\"_1\">機種列表<\/h2>\n<ul>\n<li>❌ 之前答:K245 / K265 / K165<\/li>\n<li>✅ <strong>正確:K145c / K220 / K245 / K245c / K265<\/strong>(沒有 K165)<\/li>\n<li>校正日:2026-04 早期<\/li>\n<li>校正人:Kenny<\/li>\n<\/ul>\n<h2 id=\"_2\">紅色按鍵功能<\/h2>\n<ul>\n<li>❌ 之前答:Panic + 雙擊取消 + 長按重啟 + factory reset<\/li>\n<li>✅ <strong>正確<\/strong>:接聽電話 + Manual event + Server callback + 格化 SD(<strong>沒 panic event<\/strong>)<\/li>\n<li>校正人:Kenny<\/li>\n<\/ul>\n<h2 id=\"fcw\">FCW 語音<\/h2>\n<ul>\n<li>❌ 之前答:”Frontal Collision Warning”<\/li>\n<li>✅ <strong>正確<\/strong>:<code>\"Keep distance\"<\/code><\/li>\n<li>校正人:Kenny<\/li>\n<\/ul>\n<h2 id=\"_3\">疲勞分類<\/h2>\n<ul>\n<li>❌ 之前答:單一 Fatigue event<\/li>\n<li>✅ <strong>正確<\/strong>:細分 Yawning / Nodding off / Sleepy 三個子事件<\/li>\n<li>註:Yawning 真實狀態 → 看 <a class=\"internal-doc-link\" data-cat=\"06_calibration-log\" data-doc=\"06_calibration-log--roadmap-vs-internal\" href=\"#06_calibration-log/06_calibration-log--roadmap-vs-internal\">roadmap-vs-internal.md<\/a><\/li>\n<\/ul>\n<h2 id=\"adas\">ADAS 範圍<\/h2>\n<ul>\n<li>❌ 之前答:含 yawning / phone / smoking<\/li>\n<li>✅ <strong>正確<\/strong>:<strong>只含 FCW / LDW / Stop and Go / Tailgating<\/strong>;DMS 是另一回事<\/li>\n<li>校正人:Kenny<\/li>\n<\/ul>\n<h2 id=\"smoking-list\">Smoking 在不在官方 list<\/h2>\n<ul>\n<li>❌ 之前答:在<\/li>\n<li>✅ <strong>正確<\/strong>:<strong>不在 KB list<\/strong>(Sheet row 隱藏 / Roadmap 列 Basic / 4 個 Jira open)— <strong>狀態待釐清<\/strong><\/li>\n<li>註:<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7324\" rel=\"noopener\" target=\"_blank\">VMX-7324<\/a> 客訴根源就是這個<\/li>\n<li>待動作:Coffee chat 找 Jimmy 釐清<\/li>\n<\/ul>\n<h2 id=\"adas-calibration\">ADAS 觸發時間 / Calibration 條件<\/h2>\n<ul>\n<li>❌ 之前答:60 km/h × 3 分鐘<\/li>\n<li>✅ <strong>正確<\/strong>:<strong>30 km/h × 3 分鐘 + 平坦少彎<\/strong><\/li>\n<li>校正日:2026-05-05<\/li>\n<li>校正人:Kenny<\/li>\n<li>重要:<strong>沒滿足就觸發 ADAS Failure<\/strong>,語音 <code>\"Can't detect the road level, ADAS off\"<\/code><\/li>\n<li>應用:<strong><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7404\" rel=\"noopener\" target=\"_blank\">VMX-7404<\/a> 根因<\/strong>,市區走停會反覆觸發<\/li>\n<\/ul>\n<h2 id=\"g-sensor\">G-Sensor 事件數<\/h2>\n<ul>\n<li>❌ 之前答:4 種(Harsh Braking / Cornering / Driving Impact / Parking Impact)<\/li>\n<li>✅ <strong>正確<\/strong>:<strong>6 種<\/strong>(+ Harsh Acceleration + Rollover)<\/li>\n<li>校正日:2026-05-05(MiAI Roadmap 揭露)<\/li>\n<li>註:Harsh Acc / Rollover G 值門檻 ⚠️ 待 Mori 確認<\/li>\n<\/ul>\n<h2 id=\"vlm-roadmap\">VLM Roadmap 時程<\/h2>\n<ul>\n<li>❌ 之前答:2H‘2027(對內)<\/li>\n<li>✅ <strong>正確<\/strong>:對內 Sheet 寫 2026 Q3,<strong>對外用 Roadmap 2027<\/strong>(Kenny 裁示)<\/li>\n<li>校正日:2026-05-05<\/li>\n<\/ul>\n<h2 id=\"ai-sheet-row-pm\">AI sheet 隱藏 row 是「PM 介入空間」<\/h2>\n<ul>\n<li>❌ 之前答:hidden row + No PIC = PM 該扛<\/li>\n<li>✅ <strong>正確<\/strong>:<strong>hidden row = 團隊已決定不做<\/strong>,別扛<\/li>\n<li>校正日:2026-05-05<\/li>\n<li>校正人:Kenny<\/li>\n<\/ul>\n<h2 id=\"yawning-2026-05-06\">Yawning 真實狀態(2026-05-06 會議揭露)<\/h2>\n<ul>\n<li>❌ 之前答:Roadmap Basic tier 已有<\/li>\n<li>✅ <strong>正確<\/strong>:<strong>還沒給客戶用,內部測試中,效果不如預期<\/strong><\/li>\n<li>校正日:2026-05-06<\/li>\n<li>校正人:會議錄音<\/li>\n<li>對外口徑:「Roadmap planned, 內部測試中」<strong>不能說「已有」<\/strong><\/li>\n<\/ul>\n<h2 id=\"brian-11-ota-17-ticket\">Brian #11 OTA 17 個月 ticket 性質<\/h2>\n<ul>\n<li>❌ 之前答:stale(Brian 拖延)<\/li>\n<li>✅ <strong>正確<\/strong>:<strong>不是內部 stale,是 Akamai CDN 設定問題<\/strong><\/li>\n<li>校正日:2026-05-06<\/li>\n<li>校正人:會議錄音(Brian 自己說)<\/li>\n<li>重要:<strong>別在 Brian 面前主動提這個 ticket<\/strong><\/li>\n<\/ul>\n<h2 id=\"154-server-ai-lane-departure-api\">#154 Server AI lane departure 為什麼 API 沒釋出<\/h2>\n<ul>\n<li>❌ 之前答:RD 沒做完<\/li>\n<li>✅ <strong>正確<\/strong>:<strong>Q1 已 merge 但 label 沒設好,Brian filter 時漏 pick<\/strong><\/li>\n<li>校正日:2026-05-06<\/li>\n<li>校正人:會議錄音<\/li>\n<li>重要:<strong>這是 PM process 介入空間<\/strong>(merge label sweep)<\/li>\n<\/ul>"}, {"id": "06_calibration-log--vmx-7404-tracking", "filename": "vmx-7404-tracking.md", "title": "VMX-7404 ADAS Failure 追蹤", "priority": 5, "pending_count": 1, "html": "<h1 id=\"vmx-7404-adas-failure\"><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7404\" rel=\"noopener\" target=\"_blank\">VMX-7404<\/a> ADAS Failure 追蹤<\/h1>\n<blockquote>\n<p>Jira:<a class=\"ext-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7404\" rel=\"noopener\" target=\"_blank\">VMX-7404<\/a>\n評估期最大籌碼,Kenny 主追。\n最後更新:2026-05-06<\/p>\n<\/blockquote>\n<hr/>\n<h2 id=\"_1\">現況<\/h2>\n<ul>\n<li><strong>8/10 設備<\/strong> ADAS AI Health = ADAS Failure(包含 Kenny 的 K245 L3024290010)<\/li>\n<li>真因(2026-05-05 校正):<strong>30 km/h × 3 mins<\/strong> 行駛條件門檻沒滿足 → 市區走停會反覆觸發<\/li>\n<li>詳細校正見 <a class=\"internal-doc-link\" data-cat=\"06_calibration-log\" data-doc=\"06_calibration-log--critical-facts-log\" href=\"#06_calibration-log/06_calibration-log--critical-facts-log\">critical-facts-log.md<\/a><\/li>\n<\/ul>\n<h2 id=\"evidence\">Evidence<\/h2>\n<table>\n<thead>\n<tr>\n<th>Trip<\/th>\n<th>平均速度<\/th>\n<th>ADAS Started<\/th>\n<th>韌體<\/th>\n<th>結論<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>7028714<\/td>\n<td>~25 km/h<\/td>\n<td>缺<\/td>\n<td>同<\/td>\n<td>市區走停 → 觸發 ADAS Failure<\/td>\n<\/tr>\n<tr>\n<td>7079470<\/td>\n<td>30+ km/h<\/td>\n<td>有<\/td>\n<td>同<\/td>\n<td>滿足條件 → 正常運作<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"_2\">待動作<\/h2>\n<ul>\n<li>[ ] 把 evidence 寫成
