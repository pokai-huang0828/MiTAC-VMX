  .tab {

  }

  /* Sidebar drag handle */
  .resize-handle {
    position: absolute;
    top: 0; right: -3px;
    width: 6px;
    height: 100%;
    cursor: col-resize;
    z-index: 5;

  /* ─── Responsive ─── */

rts\">voice-alerts.md<\/a><\/strong> ⭐ — In-cabin voice alerts 完整 11 類(KB deep read)<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"01_product-knowledge\" data-doc=\"01_product-knowledge--safety-score\" href=\"#01_product-knowledge/01_product-knowledge--safety-score\">safety-score.md<\/a><\/strong> ⭐ — Driver Scorecard 公式 + 5,000 km 滾動視窗<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"01_product-knowledge\" data-doc=\"01_product-knowledge--diagnostics\" href=\"#01_product-knowledge/01_product-knowledge--diagnostics\">diagnostics.md<\/a><\/strong> ⭐ — Diagnostics Q&amp;A + Master Portal 監控<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"01_product-knowledge\" data-doc=\"01_product-knowledge--visionagent-app\" href=\"#01_product-knowledge/01_product-knowledge--visionagent-app\">visionagent-app.md<\/a><\/strong> ⭐ — VisionAgent 技術人員 app(跟 Fleet Mobile App 不同)<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"01_product-knowledge\" data-doc=\"01_product-knowledge--storage-mechanism\" href=\"#01_product-knowledge/01_product-knowledge--storage-mechanism\">storage-mechanism.md<\/a><\/strong> ⭐ — SD Card + Internal Flash 完整 overwrite 規則<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"01_product-knowledge\" data-doc=\"01_product-knowledge--miai-roadmap-2026\" href=\"#01_product-knowledge/01_product-knowledge--miai-roadmap-2026\">miai-roadmap-2026.md<\/a><\/strong> — Tier × Chip × Model × Year 完整對應<\/li>\n<\/ul>\n<h2 id=\"_2\">⚠️ 三層真相提醒<\/h2>\n<p>本層內容 <strong>以 KB 為準<\/strong>。Roadmap 寫但 KB 沒寫的功能,實際狀態如下(2026-05-07 校正):<\/p>\n<ul>\n<li><strong>Yawning<\/strong> — 仍在開發中,還沒給客戶用,效果不如預期<\/li>\n<li><strong>Smoking<\/strong> — 已開發,但客戶端還沒注意到 / 沒主動 promo<\/li>\n<li>兩者對外口徑都是「<strong>Roadmap planned, 內部開發 / 測試中<\/strong>」,不對客戶承諾上線時間。<\/li>\n<\/ul>"}, {"id": "01_product-knowledge--adas-dms-events", "filename": "adas-dms-events.md", "title": "ADAS / DMS / G-Sensor / Map / OBD-II 完整事件", "priority": 5, "pending_count": 0, "html": "<h1 id=\"adas-dms-g-sensor-map-obd-ii\">ADAS / DMS / G-Sensor / Map / OBD-II 完整事件<\/h1>\n<p>來源:KB 已讀 + MiAI Roadmap 2026-04-24 + 2026-05-06 Q2 Review 會議<\/p>\n<h2 id=\"adas-rd-facing-camera\">ADAS 事件(rd-facing camera)<\/h2>\n<h3 id=\"kb-faq-ship\">KB FAQ 確定(已 ship,可對客戶承諾)<\/h3>\n<p>官方 KB(<a class=\"ext-link\" href=\"https://service.visionmaxfleet.com/portal/en/kb/articles/what-adas-and-dms-features-do-you-support\" rel=\"noopener\" target=\"_blank\">https://service.visionmaxfleet.com/portal/en/kb/articles/what-adas-and-dms-features-do-you-support<\/a>):\n- <strong>FCWS<\/strong>(語音 = <code>\"Keep distance\"<\/code>)\n- <strong>LDWS<\/strong>\n- <strong>Tailgating<\/strong>\n- <strong>Rolling Stop<\/strong> ⭐ (memory 之前漏)\n- <strong>Stop &amp; Go<\/strong><\/p>\n<h3 id=\"kb-in-development\">KB 標(in development)— 對客戶可講「開發中」<\/h3>\n<ul>\n<li><strong>Speed Sign<\/strong>(in development) — Roadmap 列 Advanced 2027,KB 對外目前是 dev<\/li>\n<\/ul>\n<h3 id=\"roadmap-kb\">Roadmap 列但 KB 沒寫(對客戶要小心)<\/h3>\n<table>\n<thead>\n<tr>\n<th>功能<\/th>\n<th>Roadmap Tier<\/th>\n<th>狀態<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>FCWS<\/td>\n<td>Basic(2025)<\/td>\n<td>✅ 已 ship(2026-05-07 校正,memory 之前寫 PCWS 是錯的)<\/td>\n<\/tr>\n<tr>\n<td>Rolling Stop Sign<\/td>\n<td>Basic<\/td>\n<td>✅ 已 ship(2026-05-07 校正)<\/td>\n<\/tr>\n<tr>\n<td>Blind Spot Monitoring (Side Camera)<\/td>\n<td>Basic<\/td>\n<td>對應 S_F_R Single SKU 進行中<\/td>\n<\/tr>\n<tr>\n<td>Speeding Sign<\/td>\n<td>Advanced(2027)<\/td>\n<td>⚠️ Roadmap planned<\/td>\n<\/tr>\n<tr>\n<td>BCWS (Rear Camera)<\/td>\n<td>Advanced<\/td>\n<td>⚠️ Roadmap planned<\/td>\n<\/tr>\n<tr>\n<td>Rash Driving<\/td>\n<td>Premium(2027)<\/td>\n<td>⚠️ Roadmap planned<\/td>\n<\/tr>\n<tr>\n<td>Traffic Light<\/td>\n<td>Premium<\/td>\n<td>⚠️ Roadmap planned<\/td>\n<\/tr>\n<tr>\n<td>ANPR (License Plate Recognition)<\/td>\n<td>Premium<\/td>\n<td>⚠️ Roadmap planned<\/td>\n<\/tr>\n<tr>\n<td>Blurring function (ADAS)<\/td>\n<td>(Roadmap Slide 2 寫 Burning ADAS,實為 Blurring)<\/td>\n<td>對應 server-side 影像模糊化(2026-05-07 校正)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"dms-cabin-facing-camera\">DMS 事件(cabin-facing camera)<\/h2>\n<h3 id=\"kb-faq-ship_1\">KB FAQ 確定(已 ship)<\/h3>\n<ul>\n<li><strong>Distraction<\/strong><\/li>\n<li><strong>Fatigue<\/strong>(細分 Yawning / Nodding off / Sleepy 三個子事件)<\/li>\n<li><strong>Phone Usage<\/strong><\/li>\n<li><strong>Unfastened Seatbelt<\/strong>(Server-side AI 90-95% accuracy)<\/li>\n<li><strong>Lens Covered<\/strong>(觸發 backoff:2→4→8→16 分鐘)<\/li>\n<\/ul>\n<h3 id=\"kb-in-development_1\">KB 標(in development)<\/h3>\n<ul>\n<li><strong>Smoking<\/strong>(in development)⭐ memory 之前說「KB 沒寫」是錯的 — KB 有寫,標 in development<\/li>\n<\/ul>\n<h3 id=\"roadmap-kb_1\">Roadmap 列但 KB 沒寫<\/h3>\n<table>\n<thead>\n<tr>\n<th>功能<\/th>\n<th>Roadmap Tier<\/th>\n<th>真實狀態(2026-05-06 會議揭露)<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Yawning(Fatigue 子)<\/strong><\/td>\n<td>Basic(2025)<\/td>\n<td>⚠️ <strong>還沒給客戶 / 內部測試中 / 效果不如預期 / Fatigue config 下要加獨立開關<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>Smoking<\/strong><\/td>\n<td>Basic(2025)<\/td>\n<td>⚠️ KB 沒寫 / Sheet 隱藏 / 4 個 Jira ticket open(<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6670\" rel=\"noopener\" target=\"_blank\">VMX-6670<\/a> / 7324 / 6380 / 6920)<\/td>\n<\/tr>\n<tr>\n<td><strong>Obstructed Camera<\/strong><\/td>\n<td>Basic<\/td>\n<td>(對應 Quantatec 案 <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6983\" rel=\"noopener\" target=\"_blank\">VMX-6983<\/a> / <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7427\" rel=\"noopener\" target=\"_blank\">VMX-7427<\/a>)<\/td>\n<\/tr>\n<tr>\n<td>Eating<\/td>\n<td>Advanced(2027)<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/HAWK-562\" rel=\"noopener\" target=\"_blank\">HAWK-562<\/a> 已開 ticket(Jimmy)— <strong>比 Roadmap 提早動工<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Drinking<\/td>\n<td>Advanced<\/td>\n<td>(同上)<\/td>\n<\/tr>\n<tr>\n<td>Blurring function (DMS)<\/td>\n<td>(Roadmap Slide 2 寫 Burning DMS,實為 Blurring)<\/td>\n<td>對應 cabin 影像模糊化(2026-05-07 校正)<\/td>\n<\/tr>\n<tr>\n<td>VLM-based Behavior Understanding<\/td>\n<td>Premium(2027)<\/td>\n<td>sheet 標 2026 Q3 — 內部比 Roadmap 提早<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"g-sensor-6-roadmap\">G-Sensor 事件(共 6 種,Roadmap 列)<\/h2>\n<table>\n<thead>\n<tr>\n<th>事件<\/th>\n<th>速度條件<\/th>\n<th>Low<\/th>\n<th>Medium(預設)<\/th>\n<th>High<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Harsh Braking<\/strong><\/td>\n<td>&gt; 11 km/h<\/td>\n<td>&gt; 0.55 G<\/td>\n<td>&gt; 0.45 G<\/td>\n<td>&gt; 0.35 G<\/td>\n<\/tr>\n<tr>\n<td><strong>Harsh Cornering<\/strong><\/td>\n<td>&gt; 30 km/h<\/td>\n<td>同 Harsh Braking<\/td>\n<td>同<\/td>\n<td>同<\/td>\n<\/tr>\n<tr>\n<td><strong>Driving Impact<\/strong>(行駛中)<\/td>\n<td>無<\/td>\n<td>&gt; 1.2 G<\/td>\n<td>&gt; 0.9 G<\/td>\n<td>&gt; 0.7 G<\/td>\n<\/tr>\n<tr>\n<td><strong>Parking Impact<\/strong>(停車中)<\/td>\n<td>無<\/td>\n<td>&gt; 0.8 G<\/td>\n<td>&gt; 0.5 G<\/td>\n<td>&gt; 0.2 G<\/td>\n<\/tr>\n<tr>\n<td><strong>Harsh Acceleration<\/strong><\/td>\n<td>?<\/td>\n<td>⚠️ 待 Mori<\/td>\n<td>⚠️<\/td>\n<td>⚠️<\/td>\n<\/tr>\n<tr>\n<td><strong>Rollover<\/strong><\/td>\n<td>無<\/td>\n<td>⚠️ 待 Mori<\/td>\n<td>⚠️<\/td>\n<td>⚠️<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p><strong>Reference scale<\/strong>:普通煞車 ≈ 0.3-0.4 G / 急煞 (Med) = 0.45 G / 真實碰撞 (Med) = 0.9 G / 嚴重碰撞 = 1.2 G+<\/p>\n<p>⚠️ <strong>200 Hz G-Sensor 戰略議題<\/strong>(2026-05-06 會議):客戶 Simon must-have 事件發生時吐 200 Hz,目前 50 Hz。Mori 在弄。<\/p>\n<h2 id=\"map-based-gps-map4\">Map-based 事件(GPS + Map,4 種)<\/h2>\n<ul>\n<li>Mobility Map Function(MMF)— ⚠️ <strong>還沒上線,不要對客戶承諾<\/strong><\/li>\n<li>Speed Camera Violation<\/li>\n<li>Railroad Crossing Alert<\/li>\n<li>School Zone Alert<\/li>\n<\/ul>\n<h2 id=\"obd-ii-6\">OBD-II 事件(6 種)<\/h2>\n<ul>\n<li>Low Fuel<\/li>\n<li>Increase Fuel<\/li>\n<li>Decrease Fuel<\/li>\n<li>Battery Voltage<\/li>\n<li>VIN Change Event<\/li>\n<li>Diagnostic Trouble Codes<\/li>\n<\/ul>\n<h2 id=\"sensitivity-dial-jimmy\">Sensitivity Dial 估計值(⚠️ 估計,真實要問 Jimmy)<\/h2>\n<table>\n<thead>\n<tr>\n<th>Sensitivity<\/th>\n<th>Confidence<\/th>\n<th>Debounce<\/th>\n<th>Cooldown<\/th>\n<th>行為<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Low<\/td>\n<td>~0.85<\/td>\n<td>5 秒<\/td>\n<td>長<\/td>\n<td>FP 少、FN 多<\/td>\n<\/tr>\n<tr>\n<td>Medium<\/td>\n<td>~0.70<\/td>\n<td>3 秒<\/td>\n<td>中<\/td>\n<td>平衡<\/td>\n<\/tr>\n<tr>\n<td>High<\/td>\n<td>~0.55<\/td>\n<td>1.5 秒<\/td>\n<td>短<\/td>\n<td>FP 多、FN 少<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>對應 Jira:<strong><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/HAWK-419\" rel=\"noopener\" target=\"_blank\">HAWK-419<\/a> / <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6837\" rel=\"noopener\" target=\"_blank\">VMX-6837<\/a><\/strong> Independent Sensitivity Thresholds for Distractions(Jieli)<\/p>\n<h2 id=\"ai-inference-pipeline-ai\">AI Inference Pipeline(任何 AI 客訴用此框架定位)<\/h2>\n<div class=\"highlight\"><pre><span><\/span><code>1. Capture(感測)         鏡頭 + IMU + GPS,**對外 only 10 fps**(機體可達 15-30,因運算資源限制)\n2. Preprocess(預處理)    resize / normalize / ROI 切割\n3. Detection(偵測「是什麼」)  bounding box + confidence\n4. Classification(分類「在做什麼」)  ⭐ 誤判主戰場\n5. Decision(決策)        ⭐ Sensitivity dial 在這層\n                          threshold + debounce + cooldown\n6. Fire(觸發 + 上傳)     event packaging + 4G upload\n<\/code><\/pre><\/div>"}, {"id": "01_product-knowledge--kb-cheatsheet", "filename": "kb-cheatsheet.md", "title": "VMX KB Cheatsheet", "priority": 5, "pending_count": 1, "html": "<h1 id=\"vmx-kb-cheatsheet\">VMX KB Cheatsheet<\/h1>\n<blockquote>\n<p><strong>官方 KB<\/strong>:<a class=\"ext-link\" href=\"https://service.visionmaxfleet.com/portal/en/kb/vm\" rel=\"noopener\" target=\"_blank\">https://service.visionmaxfleet.com/portal/en/kb/vm<\/a>\n⚠️ KB 實際 <strong>60+ 篇<\/strong>(完整 catalog 見 <a class=\"internal-doc-link\" data-cat=\"01_product-knowledge\" data-doc=\"01_product-knowledge--kb-full-catalog\" href=\"#01_product-knowledge/01_product-knowledge--kb-full-catalog\">kb-full-catalog.md<\/a>),這頁只摘核心 9 篇。\n其他重要 KB 內容:<a class=\"internal-doc-link\" data-cat=\"01_product-knowledge\" data-doc=\"01_product-knowledge--sales-faq\" href=\"#01_product-knowledge/01_product-knowledge--sales-faq\">sales-faq.md<\/a>(對客戶 RFP)/ <a class=\"internal-doc-link\" data-cat=\"03_systems-architecture\" data-doc=\"03_systems-architecture--master-portal-operations\" href=\"#03_systems-architecture/03_systems-architecture--master-portal-operations\">../03_systems-architecture/master-portal-operations.md<\/a>(Master Portal 8 篇)<\/p>\n<\/blockquote>\n<h2 id=\"9\">已讀核心 9 篇<\/h2>\n<table>\n<thead>\n<tr>\n<th>#<\/th>\n<th>主題<\/th>\n<th>重點<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>1<\/td>\n<td>Manual Event Button Behaviors<\/td>\n<td>紅色按鍵:接電話 / Manual event / Server callback / 格化 SD(<strong>沒 panic event<\/strong>)<\/td>\n<\/tr>\n<tr>\n<td>2<\/td>\n<td>LED Behaviors(分機種)<\/td>\n<td>LED 號燈分機種,要查 KB 文章對應<\/td>\n<\/tr>\n<tr>\n<td>3<\/td>\n<td>Parking Mode Behavior<\/td>\n<td>停車模式行為定義<\/td>\n<\/tr>\n<tr>\n<td>4<\/td>\n<td>Camera stay-on after ignition off<\/td>\n<td><strong>3 分鐘 suspend 窗口<\/strong>(熄火後續傳 + 等 ACC 重啟)<\/td>\n<\/tr>\n<tr>\n<td>5<\/td>\n<td>Supported ADAS events<\/td>\n<td><strong>FCW / LDW / Stop and Go / Tailgating<\/strong>(只這 4 個)<\/td>\n<\/tr>\n<tr>\n<td>6<\/td>\n<td>Supported DMS events<\/td>\n<td>Distraction / Fatigue / Lens Cover / Phone / Seatbelt(<strong>KB 沒列 Smoking<\/strong>)<\/td>\n<\/tr>\n<tr>\n<td>7<\/td>\n<td>In-cabin alerts<\/td>\n<td>完整語音指令地圖,見 <a class=\"internal-doc-link\" data-cat=\"01_product-knowledge\" data-doc=\"01_product-knowledge--voice-alerts\" href=\"#01_product-knowledge/01_product-knowledge--voice-alerts\">voice-alerts.md<\/a><\/td>\n<\/tr>\n<tr>\n<td>8<\/td>\n<td>Sensor events<\/td>\n<td>G-Sensor 4 種 + 數值 threshold,見 <a class=\"internal-doc-link\" data-cat=\"01_product-knowledge\" data-doc=\"01_product-knowledge--adas-dms-events\" href=\"#01_product-knowledge/01_product-knowledge--adas-dms-events\">adas-dms-events.md<\/a><\/td>\n<\/tr>\n<tr>\n<td>9<\/td>\n<td>Traffic Sign features<\/td>\n<td><strong>TW 客戶只能承諾 Speed Limit<\/strong>;Stop / School / Railway 沒支援<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"kb-mori-jimmy\">KB 待補的區塊(問 Mori / Jimmy)<\/h2>\n<ul>\n<li>各 KB 文章內「圖片表格」具體數字(FCW TTC / Tailgating distance / Stop and Go configured distance)<\/li>\n<li>「Why are thresholds different for Passenger / Medium Vehicle / Heavy Duty?」(車種差異)<\/li>\n<li>機種 spec 對照表(K145c / K220 / K245 / K245c / K265 各自鏡頭 / 算力 / SD 容量)<\/li>\n<li>Master Portal / Fleet Portal / VisionAgent 三大類 KB 文章<\/li>\n<\/ul>\n<h2 id=\"_1\">結構性事實(對所有客戶適用)<\/h2>\n<ul>\n<li><strong>20 km/h 是 DMS 全域門檻<\/strong> — 速度沒到 DMS 不會觸發<\/li>\n<li><strong>30 km/h × 3 分鐘 + 平坦少彎<\/strong> = ADAS 基礎計算 / calibration 條件 ⚠️ <strong>2026-05-05 校正過,不是 60 km/h<\/strong><\/li>\n<li><strong>DMS calibration<\/strong>:20 km/h × 15 秒,只要司機臉穩定即可<\/li>\n<li><strong>Lens Cover exponential backoff<\/strong>:觸發間隔 2→4→8→16 分鐘<\/li>\n<li><strong>熄火後 3 分鐘窗口<\/strong>:設備不立即關機,先續傳 + 等 ACC 重啟<\/li>\n<li><strong>Traffic Sign 分區域支援<\/strong>:<strong>TW 客戶只能承諾 Speed Limit<\/strong><\/li>\n<li><strong>MMF (Mobility Map Function)<\/strong>:<strong>還沒上線、測試中<\/strong>,不要對任何客戶承諾<\/li>\n<li><strong>DMS IR 補光<\/strong>:夜間反而比白天好(但深色隔熱紙會擋 IR)<\/li>\n<li><strong>ADAS 沒 IR<\/strong>:夜間 recall 必然較差 — 結構性事實<\/li>\n<\/ul>\n<h2 id=\"kb\">不在 KB 但常被問<\/h2>\n<table>\n<thead>\n<tr>\n<th>主題<\/th>\n<th>真實狀態<\/th>\n<th>對客戶口徑<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Smoking<\/td>\n<td>KB 沒寫 / Sheet 隱藏 / Roadmap 列 Basic / 4 個 Jira open<\/td>\n<td>⚠️ Roadmap planned, 內部開發中,<strong>不能保證上線時間<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Yawning<\/td>\n<td>KB 沒寫 / Sheet 顯示但 still in dev / <strong>2026-05-06 會議:還沒給客戶,效果不如預期<\/strong><\/td>\n<td>⚠️ Roadmap planned, 內部測試中<\/td>\n<\/tr>\n<tr>\n<td>MMF<\/td>\n<td>KB 沒寫 / Roadmap 列 / 沒上線<\/td>\n<td>⚠️ 不對客戶承諾<\/td>\n<\/tr>\n<\/tbody>\n<\/table>"}, {"id": "01_product-knowledge--machines-spec", "filename": "machines-spec.md", "title": "K-series 機種規格", "priority": 5, "pending_count": 3, "html": "<h1 id=\"k-series\">K-series 機種規格<\/h1>\n<blockquote>\n<p>⚠️ K-series ↔ Chip ↔ Tier 的具體 mapping <strong>memory 還沒齊<\/strong> — 必問 Mori。<\/p>\n<p>📄 <strong>客戶介紹會議的完整機種規格紀錄<\/strong> → <a class=\"ext-link\" href=\"https://docs.google.com/document/d/1QJj6EOnZz4HFV-wG_SAlFywEw0M01FMjriRc8hwSH7M/edit?tab=t.opseshkr4x94\" rel=\"noopener\" target=\"_blank\">Google Doc<\/a><\/p>\n<\/blockquote>\n<h2 id=\"_1\">機種列表(校正過)<\/h2>\n<p><strong>K145c / K220 / K245 / K245c / K265<\/strong> — 共 5 個機種<\/p>\n<p>⚠️ <strong>沒有 K165<\/strong>(之前 Claude 答錯過)<\/p>\n<p>Kenny 自己的測試機:<strong>K245<\/strong>(L3024290010)<\/p>\n<h2 id=\"connected-dash-camera-lineup-2025\">Connected Dash Camera Lineup 2025(對客戶介紹用)<\/h2>\n<table>\n<thead>\n<tr>\n<th>規格<\/th>\n<th>Sprint (K220)<\/th>\n<th>Gemini SE (K245c)<\/th>\n<th>EVO (K265)<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>適用車型<\/td>\n<td>LCV<\/td>\n<td>Medium Truck<\/td>\n<td>Heavy Truck<\/td>\n<\/tr>\n<tr>\n<td>Platform<\/td>\n<td>Qualcomm SDM450<\/td>\n<td>Qualcomm SDM450<\/td>\n<td>Qualcomm QCS610<\/td>\n<\/tr>\n<tr>\n<td>RAM / Flash<\/td>\n<td>2GB / 16GB<\/td>\n<td>2GB / 16GB<\/td>\n<td>3GB / 32GB<\/td>\n<\/tr>\n<tr>\n<td>OS<\/td>\n<td>Android 10<\/td>\n<td>Android 9<\/td>\n<td>Android 10 / Linux<\/td>\n<\/tr>\n<tr>\n<td>Video Channels<\/td>\n<td>最多 3(+Video Hub 可達 6)<\/td>\n<td>最多 3(+Video Hub 可達 6)<\/td>\n<td>最多 7<\/td>\n<\/tr>\n<tr>\n<td>Storage<\/td>\n<td>1× SD(最高 1TB)<\/td>\n<td>1× SD(最高 1TB)<\/td>\n<td>2× SD(最高 2TB,1TB×2)<\/td>\n<\/tr>\n<tr>\n<td>WiFi / BT<\/td>\n<td>11ac 2.4/5GHz、BLE 4.2<\/td>\n<td>11ac 2.4/5GHz、BLE 4.2<\/td>\n<td>11ac 2.4/5GHz、BLE 5.0<\/td>\n<\/tr>\n<tr>\n<td>NFC<\/td>\n<td>–<\/td>\n<td>支援<\/td>\n<td>支援<\/td>\n<\/tr>\n<tr>\n<td>OBD / CAN<\/td>\n<td>OBD Cable、MiTAC SmartGO、IOSix<\/td>\n<td>同左<\/td>\n<td>同左<\/td>\n<\/tr>\n<tr>\n<td>Certification<\/td>\n<td>CE/FCC/IC/RCM/PTCRB;AT&amp;T、T-Mobile<\/td>\n<td>CE/FCC/IC/RCM/PTCRB;AT&amp;T、Verizon、T-Mobile、Telstra<\/td>\n<td>CE/FCC/IC/RCM/PTCRB;AT&amp;T、Verizon、T-Mobile<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>→ 來源:客戶介紹會議簡報(Google Doc 同上)。<\/p>\n<h2 id=\"cdrconnected-dash-recorder-roadmap\">CDR(Connected Dash Recorder) Roadmap<\/h2>\n<table>\n<thead>\n<tr>\n<th>區隔<\/th>\n<th>機種<\/th>\n<th>平台<\/th>\n<th>主要規格<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Heavy Truck (up to 7CH)<\/td>\n<td><strong>EVO (K265, K165)<\/strong><\/td>\n<td>QCS610<\/td>\n<td>最高 3 TOPS AI、最多 5 路擴充 (1×USB + 4×TVI)、LTE Cat4、WiFi 11ac、BLE 5.0、GPS/QZSS/GLONASS/Galileo、NFC、雙 SD 槽(各 512GB)<\/td>\n<\/tr>\n<tr>\n<td>Heavy Truck<\/td>\n<td>EVO 5G RedCap<\/td>\n<td>QCS610<\/td>\n<td>5G NR SA、NA/EU/GL SKU、5G 223 / 123 Mbps、LTE 195 / 105 Mbps<\/td>\n<\/tr>\n<tr>\n<td>Medium Truck (up to 3CH)<\/td>\n<td><strong>Gemini SE (K245c, K145c)<\/strong><\/td>\n<td>SDM450<\/td>\n<td>1× USB 擴充、LTE Cat6、WiFi 11ac、BLE 4.2、NFC<\/td>\n<\/tr>\n<tr>\n<td>Medium Truck<\/td>\n<td>Orion – K246 series<\/td>\n<td>QCM6125<\/td>\n<td>接班 K245c、4K、強化安全、分級 AI<\/td>\n<\/tr>\n<tr>\n<td>Van / Light Truck (up to 3CH)<\/td>\n<td><strong>Sprint (K220)<\/strong><\/td>\n<td>SDM450<\/td>\n<td>1× USB 擴充、LTE Cat6、WiFi 11ac、BLE 4.2、NFC<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>⚠️ <strong>K165 出現在 Roadmap<\/strong> 但前面我們校正說「沒有 K165」 — 看來 Roadmap 把 EVO family 含 K165 一起算,但客戶實機目前是 K265。要跟 Mori 確認 K165 是否有實機 ship,還是純 Roadmap planning。<\/p>\n<p>⚠️ <strong>Orion / K246 系列<\/strong> 是接班 K245c 的下一代(4K + 分級 AI),memory 沒提過 — 新加進來。<\/p>\n<h2 id=\"mori\">待補對應(問 Mori)<\/h2>\n<table>\n<thead>\n<tr>\n<th>機種<\/th>\n<th>Chip(待確認)<\/th>\n<th>Tier(待確認)<\/th>\n<th>TOPs(待確認)<\/th>\n<th>RFID(KB)<\/th>\n<th>QR(KB)<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>K145c<\/td>\n<td>?<\/td>\n<td>?<\/td>\n<td>?<\/td>\n<td>❌<\/td>\n<td>❌<\/td>\n<\/tr>\n<tr>\n<td>K145 (with i25)<\/td>\n<td>?<\/td>\n<td>?<\/td>\n<td>?<\/td>\n<td>❌<\/td>\n<td>❌<\/td>\n<\/tr>\n<tr>\n<td>K220<\/td>\n<td>?<\/td>\n<td>?<\/td>\n<td>?<\/td>\n<td>❌<\/td>\n<td>✅<\/td>\n<\/tr>\n<tr>\n<td>K245<\/td>\n<td>?<\/td>\n<td>?<\/td>\n<td>?<\/td>\n<td>✅<\/td>\n<td>✅<\/td>\n<\/tr>\n<tr>\n<td>K245c<\/td>\n<td>?<\/td>\n<td>?<\/td>\n<td>?<\/td>\n<td>✅<\/td>\n<td>✅<\/td>\n<\/tr>\n<tr>\n<td>K265<\/td>\n<td>?<\/td>\n<td>?<\/td>\n<td>?<\/td>\n<td>✅<\/td>\n<td>✅<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>⭐ <strong>第一個 KB 確認的機種 mapping<\/strong>(2026-05-06):K220 只支援 QR Code(沒 RFID)/ K145(c) 連 QR 都不行(需 i25)。\nKB 來源:<a class=\"ext-link\" href=\"https://service.visionmaxfleet.com/portal/en/kb/articles/driver-identification-setup-and-usage-for-models-k245-k245c-k265-and-k220\" rel=\"noopener\" target=\"_blank\">https://service.visionmaxfleet.com/portal/en/kb/articles/driver-identification-setup-and-usage-for-models-k245-k245c-k265-and-k220<\/a><\/p>\n<h2 id=\"led-behaviorskb\">LED Behaviors(KB 確認的機種差異)<\/h2>\n<table>\n<thead>\n<tr>\n<th>機種<\/th>\n<th>LED 數量<\/th>\n<th>差異<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>K220 / K245<\/strong><\/td>\n<td>1 個(紅)<\/td>\n<td>Manual Event Button 紅燈;沒 SD 每 15 秒閃<\/td>\n<\/tr>\n<tr>\n<td><strong>K265<\/strong><\/td>\n<td><strong>2 個<\/strong><\/td>\n<td>紅(Manual Event Button)+ <strong>橘左<\/strong>(沒網路常亮)+ <strong>藍/綠右<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>K145c / K245c<\/strong><\/td>\n<td>(KB 待補,沒抓全)<\/td>\n<td>(待 deep read)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>KB 來源:<a class=\"ext-link\" href=\"https://service.visionmaxfleet.com/portal/en/kb/articles/led-behaviors\" rel=\"noopener\" target=\"_blank\">https://service.visionmaxfleet.com/portal/en/kb/articles/led-behaviors<\/a><\/p>\n<h2 id=\"reset-buttonkb\">Reset Button(KB 確認的機種差異)<\/h2>\n<table>\n<thead>\n<tr>\n<th>機種<\/th>\n<th>Reset Button 位置<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>K245 / K145c / K245c<\/strong><\/td>\n<td><strong>在 tamper proof cover 後<\/strong>(要先拆)<\/td>\n<\/tr>\n<tr>\n<td><strong>K220 / K265<\/strong><\/td>\n<td>(KB 沒明說,可能是露出的)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>→ Reset = paper clip 戳。對應 troubleshooting Q10。<\/p>\n<h2 id=\"miai-roadmap-chip\">從 MiAI Roadmap 對應的 Chip 候選<\/h2>\n<table>\n<thead>\n<tr>\n<th>Tier<\/th>\n<th>Year<\/th>\n<th>Chip<\/th>\n<th>TOPs<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Entry<\/td>\n<td>2023 Foundation<\/td>\n<td>Snapdragon 450<\/td>\n<td>&lt; 1<\/td>\n<\/tr>\n<tr>\n<td>Basic<\/td>\n<td>2025 Expansion<\/td>\n<td>QCS 6125 / QCS 610<\/td>\n<td>1<\/td>\n<\/tr>\n<tr>\n<td>Advanced<\/td>\n<td>1H‘2027<\/td>\n<td>QCS 5430<\/td>\n<td>6<\/td>\n<\/tr>\n<tr>\n<td>Premium<\/td>\n<td>2H‘2027<\/td>\n<td>QCS 6490<\/td>\n<td>12<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>→ 推測:K245(Kenny 的)很可能是 Basic tier(2025 主力 ship 機種),但<strong>沒確認<\/strong>。<\/p>\n<h2 id=\"_2\">硬體技術棧<\/h2>\n<ul>\n<li>4G LTE 連網<\/li>\n<li><strong>雙鏡頭<\/strong>:road-facing ADAS + cabin-facing DMS<\/li>\n<li>Android SoC 平台<\/li>\n<li>Cloud:<code>visionmaxfleet.com<\/code><\/li>\n<li>三層客戶整合深度:Web Platform / API / Custom SDK<\/li>\n<\/ul>\n<h2 id=\"kb-2026-05-06\">影像規格(KB 已抓 2026-05-06)<\/h2>\n<table>\n<thead>\n<tr>\n<th>Video Type<\/th>\n<th>Resolution<\/th>\n<th>FPS<\/th>\n<th>Bitrate<\/th>\n<th>Size/3min<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Side by Side(雙鏡頭並列)<\/td>\n<td>2560 × 720<\/td>\n<td><strong>10<\/strong><\/td>\n<td>2,764,800<\/td>\n<td>58.8 MB<\/td>\n<\/tr>\n<tr>\n<td>Separated Video(雙鏡頭分離)<\/td>\n<td>1280 × 720<\/td>\n<td><strong>10<\/strong><\/td>\n<td>1,382,400<\/td>\n<td>29.4 MB<\/td>\n<\/tr>\n<tr>\n<td>AUX UVC Cam(外接 UVC)<\/td>\n<td>1280 × 720<\/td>\n<td><strong>10<\/strong><\/td>\n<td>5,000,000<\/td>\n<td>106.8 MB<\/td>\n<\/tr>\n<tr>\n<td>AUX USB Cam(外接 USB)<\/td>\n<td>2560 × 1440<\/td>\n<td><strong>10<\/strong><\/td>\n<td>5,529,600<\/td>\n<td>118.8 MB<\/td>\n<\/tr>\n<tr>\n<td>Live View<\/td>\n<td>854 × 480<\/td>\n<td>—<\/td>\n<td>800,000<\/td>\n<td>0.1 MB/s<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>⚠️ <strong>memory 之前說 15-30 fps 是錯的<\/strong>(2026-05-06 KB 校正)— 全部 10 fps。\nKB 來源:<a class=\"ext-link\" href=\"https://service.visionmaxfleet.com/portal/en/kb/articles/what-is-the-resolution-fps-bitrate-and-video-size-for-mitac-s-cameras\" rel=\"noopener\" target=\"_blank\">https://service.visionmaxfleet.com/portal/en/kb/articles/what-is-the-resolution-fps-bitrate-and-video-size-for-mitac-s-cameras<\/a><\/p>\n<p>⚠️ KB 上沒按 K145c / K220 / K245 / K245c / K265 拆分 — 是按 video type(Side by Side / Separated / AUX UVC / AUX USB)拆。各 K 機種能跑哪些 video type <strong>要 Mori 確認<\/strong>。<\/p>\n<h2 id=\"coffee-chat-mori\">待 Coffee Chat 問 Mori<\/h2>\n<ol>\n<li>K145c / K220 / K245 / K245c / K265 各跑哪顆 Qualcomm chip<\/li>\n<li>K245(Kenny 自己的)屬 Entry / Basic / Advanced 哪個 tier<\/li>\n<li><del>各機種 frame rate<\/del> ✅ 已釐清:機體可達 15-30 fps,<strong>對外 only 10 fps<\/strong>(運算資源限制,2026-05-07)<\/li>\n<li>紅色按鍵各機種語音不一致 — 是哪幾台?<\/li>\n<li>Private Mode 切換按法(KB 沒寫清楚)<\/li>\n<li><strong>Harsh Acceleration / Rollover G 值門檻<\/strong>(只 lock 4 種,缺這 2 種)<\/li>\n<li>200 Hz G-Sensor 韌體可行性(2026-05-06 會議 Simon 客戶要求)<\/li>\n<\/ol>"}, {"id": "01_product-knowledge--diagnostics", "filename": "diagnostics.md", "title": "VisionMax Diagnostics", "priority": 4, "pending_count": 0, "html": "<h1 id=\"visionmax-diagnostics\">VisionMax Diagnostics<\/h1>\n<blockquote>\n<p>來源:KB「VisionMax Diagnostics Information」(2026-05-06 deep read)\n對應:Master Portal &gt; Diagnostics 頁面 / 客戶報修 / <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7404\" rel=\"noopener\" target=\"_blank\">VMX-7404<\/a> ADAS Failure 議題<\/p>\n<\/blockquote>\n<h2 id=\"_1\">監控範圍<\/h2>\n<p>VMX 系統持續監控:\n- GPS tracking\n- Sensor detection\n- Camera operation\n- AI features\n- Data storage<\/p>\n<h2 id=\"diagnostic-qakb\">Diagnostic Q&amp;A(KB 已抓)<\/h2>\n<h3 id=\"q1-location-function-issues\">Q1: “Location Function” issues<\/h3>\n<ul>\n<li><strong>意思<\/strong>:device GPS 位置最近 10 分鐘沒被偵測到<\/li>\n<li><strong>影響<\/strong>:不能建 trip / 不能偵測 ADAS / DMS / 不能記錄 video 位置<\/li>\n<li><strong>Solution<\/strong>:確保車輛在開放環境,GPS 能收訊號<\/li>\n<\/ul>\n<h3 id=\"q2-sensor-events-detection\">Q2: “Sensor Events Detection” 失敗<\/h3>\n<ul>\n<li><strong>意思<\/strong>:device 不能偵測 harsh acc / harsh dec / harsh cornering<\/li>\n<li><strong>Solution<\/strong>:檢查 device 是否裝好<\/li>\n<\/ul>\n<p>⚠️ 完整 Q&amp;A list KB 文章還有更多內容(Q3+),沒抓完。<\/p>\n<h2 id=\"pm\">對 PM 議題的對應<\/h2>\n<h3 id=\"vmx-7404-adas-failure\"><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7404\" rel=\"noopener\" target=\"_blank\">VMX-7404<\/a> ADAS Failure<\/h3>\n<ul>\n<li>KB 確認:<strong>Location Function 問題會導致 ADAS / DMS 都不能偵測<\/strong><\/li>\n<li>對應你 K245(L3024290010)的 ADAS Failure → 可能是 GPS + 30 km/h × 3min 雙重原因<\/li>\n<li>⚠️ 必確認:Trip 7028714 是 GPS 失效?還是純粹速度條件不滿足?<\/li>\n<\/ul>\n<h3 id=\"master-portal-diagnostics\">Master Portal Diagnostics 頁面<\/h3>\n<ul>\n<li>對應 portal-architecture.md 中 Master &gt; Diagnostics<\/li>\n<li>顯示「Has Issue」/ Issue Type(MiAI Issue, GPS Issue 等)<\/li>\n<li>Kenny portal 走訪時看到 5 台 Has Issue / 1 台 MiAI Issue<\/li>\n<\/ul>\n<h2 id=\"_2\">客戶用法<\/h2>\n<ul>\n<li>客戶 fleet manager → Master Portal Diagnostics 看自己 fleet 設備健康<\/li>\n<li>Has Issue 設備 → 點進去看 Issue Type → 對照 KB Q&amp;A 自助 troubleshoot<\/li>\n<\/ul>"}, {"id": "01_product-knowledge--miai-roadmap-2026", "filename": "miai-roadmap-2026.md", "title": "MiAI Roadmap 2026-04-24", "priority": 4, "pending_count": 0, "html": "<h1 id=\"miai-roadmap-2026-04-24\">MiAI Roadmap 2026-04-24<\/h1>\n<blockquote>\n<p>來源:<code>../../MiAI Roadmap Introduce 2026024.pptx<\/code>(7 張)\n⚠️ 這是<strong>對外版本<\/strong>(三層真相中的「對外故事」層)<\/p>\n<\/blockquote>\n<h2 id=\"tier-year-chip-tops-timeline\">Tier × Year × Chip × TOPs ⭐(關鍵 timeline)<\/h2>\n<table>\n<thead>\n<tr>\n<th>Tier<\/th>\n<th>Year<\/th>\n<th>Theme<\/th>\n<th>Chip<\/th>\n<th>AI Compute<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Entry<\/strong><\/td>\n<td>2023<\/td>\n<td>Foundation<\/td>\n<td>Snapdragon 450<\/td>\n<td>&lt; 1 TOPs<\/td>\n<\/tr>\n<tr>\n<td><strong>Basic<\/strong><\/td>\n<td>2025<\/td>\n<td>Expansion<\/td>\n<td>QCS 6125 / QCS 610<\/td>\n<td>1 TOPs<\/td>\n<\/tr>\n<tr>\n<td><strong>Advanced<\/strong><\/td>\n<td>1H‘2027<\/td>\n<td>Advanced<\/td>\n<td>QCS 5430<\/td>\n<td>6 TOPs<\/td>\n<\/tr>\n<tr>\n<td><strong>Premium<\/strong><\/td>\n<td>2H‘2027<\/td>\n<td>Intelligence<\/td>\n<td>QCS 6490<\/td>\n<td>12 TOPs<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>⚠️ <strong>2026 是過渡期<\/strong> — Advanced / Premium 都是 2027 計畫,目前 production 是 Basic tier。Sales 講 6 TOPs / 12 TOPs 功能要小心。<\/p>\n<h2 id=\"ai-model\">AI Model 細節<\/h2>\n<table>\n<thead>\n<tr>\n<th>Tier<\/th>\n<th>Detector<\/th>\n<th>Classifier<\/th>\n<th>Pose Est.<\/th>\n<th>Total<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Entry<\/td>\n<td>YOLOv5n (~1.9M)<\/td>\n<td>CustomCNNv1 (~1M)<\/td>\n<td>PFLDNet (~2-3M)<\/td>\n<td>~5M<\/td>\n<\/tr>\n<tr>\n<td>Basic<\/td>\n<td>YOLOv8s (~11M)<\/td>\n<td>CustomCNNv2 (~2M)<\/td>\n<td>WHENetPose (~8M)<\/td>\n<td>~21M<\/td>\n<\/tr>\n<tr>\n<td>Advanced<\/td>\n<td>YOLOv11m (~20M)<\/td>\n<td>CustomCNNv3 (~10M)<\/td>\n<td>HRNetPose (~35M)<\/td>\n<td>~65M<\/td>\n<\/tr>\n<tr>\n<td>Premium<\/td>\n<td>YOLOv26l (~50M)<\/td>\n<td>Transformer (~25M)<\/td>\n<td>+ Lightweight VLM (~125M)<\/td>\n<td>~200M<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>PM lens:跟客戶講「為什麼某機種做不到 X」直接用 model size + TOPs 解釋。<\/p>\n<h2 id=\"ai-architecture-evolutionserver-ai\">AI Architecture Evolution(Server AI 階段)<\/h2>\n<table>\n<thead>\n<tr>\n<th>階段<\/th>\n<th>架構<\/th>\n<th>Strengths<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>1<\/td>\n<td><strong>Edge AI<\/strong>(目前主流)<\/td>\n<td>Real-time / Low latency / Offline / Privacy<\/td>\n<\/tr>\n<tr>\n<td>2<\/td>\n<td><strong>Edge AI + Server AI<\/strong><\/td>\n<td>二次驗證,降 FP / 借 server 算力<\/td>\n<\/tr>\n<tr>\n<td>3<\/td>\n<td><strong>Edge AI + Server VLM<\/strong><\/td>\n<td>全影片語意理解 / 處理複雜混合行為<\/td>\n<\/tr>\n<tr>\n<td>4<\/td>\n<td><strong>Edge VLM<\/strong>(終局)<\/td>\n<td>Real-time semantic on-device / 不依賴網路<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>→ <strong>Expected Overall Accuracy Improvement: 20% ~ 40%<\/strong>(視場景)<\/p>\n<h2 id=\"roadmap-vs-sheet-vs\">⚠️ Roadmap vs Sheet 衝突(對外 vs 內部)<\/h2>\n<table>\n<thead>\n<tr>\n<th>主題<\/th>\n<th>Roadmap(對外)<\/th>\n<th>Sheet(內部)<\/th>\n<th>對客戶口徑<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>VLM<\/td>\n<td>2H‘2027<\/td>\n<td>2026 Q3<\/td>\n<td><strong>講 2027<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Eating &amp; Drinking<\/td>\n<td>1H‘2027<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/HAWK-562\" rel=\"noopener\" target=\"_blank\">HAWK-562<\/a> 已動<\/td>\n<td>講 2027<\/td>\n<\/tr>\n<tr>\n<td>Yawning<\/td>\n<td>Basic 2025 已 ship<\/td>\n<td>還沒給客戶 / 測試中<\/td>\n<td><strong>改:Roadmap planned, 內部測試中<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Smoking<\/td>\n<td>Basic 2025 已 ship<\/td>\n<td>KB 沒寫 / Sheet 隱藏 / 4 ticket open<\/td>\n<td><strong>改:Roadmap planned, 內部開發中<\/strong><\/td>\n<\/tr>\n<tr>\n<td>MMF<\/td>\n<td>(列在 overview)<\/td>\n<td>還沒上線<\/td>\n<td><strong>不對客戶承諾<\/strong><\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"data-auto-optimization-pipeline\">Data Auto-Optimization Pipeline(月節奏)<\/h2>\n<div class=\"highlight\"><pre><span><\/span><code>Collect → Filter → Label → Train → Validate → Deploy → ...\n<\/code><\/pre><\/div>\n<p>每月一輪。PM lens:跟客戶講「持續優化」有具體 cadence 可提。<\/p>\n<p>⚠️ AI Sheet 上 row 41「Monthly Model Optimization &amp; Release Workflow」<strong>已隱藏 = 不在使用<\/strong>(2026-05-05 確認)。Roadmap 講有,實際內部沒人扛這個 process — <strong>PM 可推進的真空白地帶之一<\/strong>。<\/p>"}, {"id": "01_product-knowledge--voice-alerts", "filename": "voice-alerts.md", "title": "VMX In-Cabin Voice Alerts(完整 KB 抓)", "priority": 4, "pending_count": 0, "html": "<h1 id=\"vmx-in-cabin-voice-alerts-kb\">VMX In-Cabin Voice Alerts(完整 KB 抓)<\/h1>\n<blockquote>\n<p>來源:KB「What in-cabin alerts are available?」(2026-05-06 deep read)\n預設語言 English (US),portal 可改<\/p>\n<\/blockquote>\n<h2 id=\"1-device-startup-and-status\">1. Device Startup and Status<\/h2>\n<table>\n<thead>\n<tr>\n<th>事件<\/th>\n<th>語音<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Device powers on<\/td>\n<td><strong>Device Ready<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Driver ID card 成功讀取<\/td>\n<td>Success<\/td>\n<\/tr>\n<tr>\n<td>Driver 需要 tap ID<\/td>\n<td>Please tap your ID card<\/td>\n<\/tr>\n<tr>\n<td>ID card 讀取失敗<\/td>\n<td>Failed to read the ID Card<\/td>\n<\/tr>\n<tr>\n<td>Camera calibration 完成<\/td>\n<td>Calibration Completed<\/td>\n<\/tr>\n<tr>\n<td>OTA 完成<\/td>\n<td>Auto update complete<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"2-sd-card\">2. SD Card<\/h2>\n<table>\n<thead>\n<tr>\n<th>事件<\/th>\n<th>語音<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>沒 SD card<\/td>\n<td>No SD Card<\/td>\n<\/tr>\n<tr>\n<td>SD card 滿<\/td>\n<td>SD Card Full<\/td>\n<\/tr>\n<tr>\n<td>格式化中<\/td>\n<td>SD Card Formatting, please wait<\/td>\n<\/tr>\n<tr>\n<td>格式化完成<\/td>\n<td>Format completed<\/td>\n<\/tr>\n<tr>\n<td>讀寫 / 格式化錯誤<\/td>\n<td>SD Card Error<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"3-system-reconfiguration\">3. System Reconfiguration<\/h2>\n<table>\n<thead>\n<tr>\n<th>事件<\/th>\n<th>語音<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>SD 掛 / 卸 / 第三鏡頭裝卸<\/td>\n<td>Setting up device, please wait<\/td>\n<\/tr>\n<tr>\n<td>Remote / manual setting 套用<\/td>\n<td>Setting up device, please wait<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"4-wi-fi-hotspot\">4. Wi-Fi Hotspot<\/h2>\n<table>\n<thead>\n<tr>\n<th>事件<\/th>\n<th>語音<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Hotspot 開<\/td>\n<td>Hotspot ON<\/td>\n<\/tr>\n<tr>\n<td>Hotspot 關<\/td>\n<td>Hotspot OFF<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"5-driving-behaviour-eventsg-sensor\">5. Driving Behaviour Events(G-Sensor)<\/h2>\n<table>\n<thead>\n<tr>\n<th>事件<\/th>\n<th>語音<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Harsh acceleration<\/td>\n<td>Harsh Acceleration Detected<\/td>\n<\/tr>\n<tr>\n<td>Harsh braking<\/td>\n<td>Harsh Braking Detected<\/td>\n<\/tr>\n<tr>\n<td>Harsh cornering<\/td>\n<td>Harsh Cornering Detected<\/td>\n<\/tr>\n<tr>\n<td>Impact (driving)<\/td>\n<td>Impact Detected<\/td>\n<\/tr>\n<tr>\n<td>Impact (parked)<\/td>\n<td>Impact Detected<\/td>\n<\/tr>\n<tr>\n<td>Manual emergency recording<\/td>\n<td><strong>Emergency Recording<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Long-time driving<\/td>\n<td><strong>Time for a break<\/strong> ⭐ memory 沒這條<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"6-adas-events\">6. ADAS Events<\/h2>\n<table>\n<thead>\n<tr>\n<th>事件<\/th>\n<th>語音<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>FCW(Frontal Collision Warning)<\/td>\n<td><strong>Keep distance<\/strong><\/td>\n<\/tr>\n<tr>\n<td>LDW(Lane Departure Warning)<\/td>\n<td>Lane departure<\/td>\n<\/tr>\n<tr>\n<td>Stop and Go<\/td>\n<td>Traffic has moved, please proceed<\/td>\n<\/tr>\n<tr>\n<td>Tailgating<\/td>\n<td>Tailgating<\/td>\n<\/tr>\n<tr>\n<td>Collision risk<\/td>\n<td>Collision risk detected<\/td>\n<\/tr>\n<tr>\n<td>ADAS enabled<\/td>\n<td>ADAS on<\/td>\n<\/tr>\n<tr>\n<td>ADAS disabled (no road level)<\/td>\n<td><strong>Can’t detect the road level, ADAS off<\/strong> ⭐ <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7404\" rel=\"noopener\" target=\"_blank\">VMX-7404<\/a> 黃金線索<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"7-dms-events\">7. DMS Events<\/h2>\n<table>\n<thead>\n<tr>\n<th>事件<\/th>\n<th>語音<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Yawning<\/td>\n<td>Yawning detected, stay alert<\/td>\n<\/tr>\n<tr>\n<td>Nodding off<\/td>\n<td>Nodding off detected, stay alert<\/td>\n<\/tr>\n<tr>\n<td>Eyes closed<\/td>\n<td><strong>Sleepy detected, stay alert<\/strong> ⭐(三個 Fatigue 子事件全有獨立語音)<\/td>\n<\/tr>\n<tr>\n<td>Distraction<\/td>\n<td>Distraction detected, keep eyes on road<\/td>\n<\/tr>\n<tr>\n<td>Cell phone usage<\/td>\n<td>Cell phone usage<\/td>\n<\/tr>\n<tr>\n<td>Unfastened seatbelt<\/td>\n<td><strong>Danger! Fasten your seat belt<\/strong><\/td>\n<\/tr>\n<tr>\n<td>In-cabin camera obstructed<\/td>\n<td><strong>Alert! Inward camera is blocked, please remove the obstacle<\/strong> ⭐ 對應 Quantatec / <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7427\" rel=\"noopener\" target=\"_blank\">VMX-7427<\/a><\/td>\n<\/tr>\n<tr>\n<td>DMS enabled<\/td>\n<td>DMS on<\/td>\n<\/tr>\n<tr>\n<td>DMS disabled (no face)<\/td>\n<td>Can’t find a face, DMS off<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"8-traffic-sign-and-signal-events\">8. Traffic Sign and Signal Events<\/h2>\n<table>\n<thead>\n<tr>\n<th>事件<\/th>\n<th>語音<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Stop sign detected<\/td>\n<td>Stop sign detected<\/td>\n<\/tr>\n<tr>\n<td>Stop sign violation (rolling stop)<\/td>\n<td>Stop sign ahead, slow down your speed<\/td>\n<\/tr>\n<tr>\n<td>Red light violation<\/td>\n<td>Red Light Violation<\/td>\n<\/tr>\n<tr>\n<td>Speed camera ahead<\/td>\n<td>Safety camera ahead<\/td>\n<\/tr>\n<tr>\n<td>Average speed camera (Autodoria)<\/td>\n<td>Average speed camera ahead<\/td>\n<\/tr>\n<tr>\n<td>Speed camera violation<\/td>\n<td>Speed Camera Violation<\/td>\n<\/tr>\n<tr>\n<td>Rolling stop<\/td>\n<td>Rolling Stop<\/td>\n<\/tr>\n<tr>\n<td>Railway crossing ahead<\/td>\n<td>Railway crossing ahead<\/td>\n<\/tr>\n<tr>\n<td>Railroad crossing violation<\/td>\n<td>Railroad Crossing Violation<\/td>\n<\/tr>\n<tr>\n<td>School zone ahead<\/td>\n<td>School zone ahead<\/td>\n<\/tr>\n<tr>\n<td>School zone speed violation<\/td>\n<td>School Zone Speed Violation<\/td>\n<\/tr>\n<tr>\n<td>Wrong-way driving<\/td>\n<td>Turn around safely, you are going in the wrong direction<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"9-speed-limit-reminders\">9. Speed Limit Reminders<\/h2>\n<p>格式:<strong>“Speed limit [value]”<\/strong> — 例:Speed limit 30 / 40 / … / 110<\/p>\n<table>\n<thead>\n<tr>\n<th>事件<\/th>\n<th>語音<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>超過 cruise speed<\/td>\n<td>Lower your speed<\/td>\n<\/tr>\n<tr>\n<td>Speed limit 提醒<\/td>\n<td>Speed limit —<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"10-geofencing\">10. Geofencing<\/h2>\n<table>\n<thead>\n<tr>\n<th>事件<\/th>\n<th>語音<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>進入 geofence<\/td>\n<td>Enter Geofence<\/td>\n<\/tr>\n<tr>\n<td>離開 geofence<\/td>\n<td>Leave Geofence<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"11-system-and-privacy\">11. System and Privacy<\/h2>\n<table>\n<thead>\n<tr>\n<th>事件<\/th>\n<th>語音<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Device call-out<\/td>\n<td>Calling<\/td>\n<\/tr>\n<tr>\n<td><strong>Private mode enabled (panic button)<\/strong><\/td>\n<td><strong>Private Mode On<\/strong><\/td>\n<\/tr>\n<tr>\n<td><strong>Private mode disabled (panic button)<\/strong><\/td>\n<td><strong>Private Mode Off<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Camera error auto-recovery<\/td>\n<td>Camera Rebooting, Please Wait<\/td>\n<\/tr>\n<tr>\n<td>Camera errors 無法 fix<\/td>\n<td>(待抓全文)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"_1\">⚠️ 重要校正 / 區分<\/h2>\n<h3 id=\"manual-event-recording-vs-emergency-recording\">Manual Event Recording vs Emergency Recording<\/h3>\n<ul>\n<li><strong>Manual Event Recording<\/strong>:短按按鈕(無來電時)= 錄一個 manual event<\/li>\n<li><strong>Emergency Recording<\/strong>:<strong>Manual emergency recording triggered<\/strong>(更緊急情境的 G-Sensor 觸發)<\/li>\n<li><strong>不是同一個!<\/strong> memory 之前以為是同一個是錯的<\/li>\n<\/ul>\n<h3 id=\"privacy-mode-panic-button\">Privacy Mode = Panic Button<\/h3>\n<ul>\n<li>KB 在這份明確寫「Private mode enabled (panic button)」<\/li>\n<li>跟 Privacy Mode 文章 + Manual Event Button 文章對應<\/li>\n<li>⚠️ <strong>可能 Manual Event Button 跟 Panic Button 是同一個按鈕的不同 hold pattern<\/strong>(短按 = Manual / hold &gt; 2s = Panic / hold 10-30s = format SD)<\/li>\n<li>還是要 Coffee Chat 跟 Mori 釐清<\/li>\n<\/ul>\n<h3 id=\"reset-button-manual-event-buttonkb\">Reset Button ≠ Manual Event Button(KB 確認)<\/h3>\n<ul>\n<li><strong>Manual Event Button = Red Indicator Light<\/strong>(K220/K245/K265)— <strong>可徒手按<\/strong><\/li>\n<li><strong>Reset Button = paper clip 戳<\/strong>(K245/K145c/K245c 在 tamper proof cover 後)<\/li>\n<li>→ 是兩個不同的 button<\/li>\n<\/ul>\n<h3 id=\"vmx-7404-adas-failure\"><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7404\" rel=\"noopener\" target=\"_blank\">VMX-7404<\/a> ADAS Failure 黃金線索<\/h3>\n<p>語音 <code>\"Can't detect the road level, ADAS off\"<\/code>\n- 觸發條件:速度 &lt; 30 km/h 持續 / 車速反覆掉到 30 以下 / ADAS 計算中斷\n- 市區通勤經典情境<\/p>"}, {"id": "01_product-knowledge--kb-full-catalog", "filename": "kb-full-catalog.md", "title": "VMX KB 完整文章 Catalog", "priority": 3, "pending_count": 5, "html": "<h1 id=\"vmx-kb-catalog\">VMX KB 完整文章 Catalog<\/h1>\n<blockquote>\n<p>來源:<a class=\"ext-link\" href=\"https://service.visionmaxfleet.com/portal/en/kb/vm\" rel=\"noopener\" target=\"_blank\">https://service.visionmaxfleet.com/portal/en/kb/vm<\/a>\n掃描日期:2026-05-06\n⚠️ memory 之前說「KB 9 篇」是嚴重低估 — 實際 <strong>60+ 篇<\/strong><\/p>\n<\/blockquote>\n<h2 id=\"6-top-level-categories\">6 個 Top-level Categories<\/h2>\n<div class=\"highlight\"><pre><span><\/span><code>VM Knowledge Base\n├── General                  (子目錄 5 個,共 32 篇)\n│   ├── API                  (3 篇)\n│   ├── FAQ                  (15 篇)\n│   ├── Installation         (2 篇)\n│   ├── Troubleshooting      (2 篇)\n│   └── Getting Started      (10 篇)\n├── Fleet Portal             (15 篇)\n├── Master Portal            (8 篇)\n├── Using camera             (14 篇)\n├── VisionAgent              (3 篇)\n└── Declarations             (4 篇 — 法律,不重要)\n<\/code><\/pre><\/div>\n<h2 id=\"general-api3\">General &gt; API(技術型客戶必看,3 篇)<\/h2>\n<ol>\n<li>VisionMax Portal Interface Updates<\/li>\n<li><strong>API Reference<\/strong> ⭐ 對 Vinicius 等技術型 buyer 是必殺<\/li>\n<li>Is the portal cloud hosted (AWS, Azure, etc.)?<\/li>\n<\/ol>\n<h2 id=\"general-faq15\">General &gt; FAQ(銷售級必背,15 篇)⭐⭐⭐<\/h2>\n<ol>\n<li>How does the emergency 2-way call feature work?<\/li>\n<li><strong>VisionMax Driver Scorecard<\/strong> ⭐<\/li>\n<li><strong>VisionMax Diagnostics Information<\/strong> ⭐<\/li>\n<li>Parking Mode Behavior<\/li>\n<li>How long does the camera stay on after I turn off my vehicle?(熄火 3min 窗口)<\/li>\n<li>SD CARD Recording time: Connected DashCam Footage Storage Calculator<\/li>\n<li>I’m not receiving the password reset email<\/li>\n<li><strong>Can we white label the platform?<\/strong> ⭐ Sales<\/li>\n<li><strong>What ADAS and DMS features do you support?<\/strong> ⭐⭐ RFP 標準答案<\/li>\n<li><strong>How mature is your AI model?<\/strong> ⭐⭐ Deep dive 必問<\/li>\n<li><strong>How long are videos and data stored?<\/strong> ⭐⭐ 隱私 / 合規<\/li>\n<li>What’s the difference between VisionMax Device Portal and Fleet Portal?<\/li>\n<li><strong>How often do you update your AI model?<\/strong> ⭐ 對應月節奏 Roadmap<\/li>\n<li><strong>Are AI models processed locally or in the cloud?<\/strong> ⭐ Edge vs Server<\/li>\n<li><strong>Can thresholds and alerts be customized?<\/strong> ⭐ 對應 Brian 同步戰略<\/li>\n<\/ol>\n<h2 id=\"general-getting-started10\">General &gt; Getting Started(10 篇)<\/h2>\n<ol>\n<li>What are the supported ADAS events?(已 → adas-dms-events.md)<\/li>\n<li>What are the supported DMS events?(已 → adas-dms-events.md)<\/li>\n<li>How long does a software update take?<\/li>\n<li>What in-cabin alerts are available?(已 → voice-alerts.md)<\/li>\n<li>Which NFC cards are compatible with the camera?<\/li>\n<li>How do I update the camera’s software?<\/li>\n<li><strong>What Are the Trigger Conditions for Each Traffic Sign and Signal Feature<\/strong> ⭐ memory 標待補,實則有<\/li>\n<li>Where Are My Videos Stored on the SD Card?<\/li>\n<li><strong>What is the resolution, FPS, Bitrate and video size for MiTAC’s cameras?<\/strong> ⭐ memory 標待補,實則有(已抓內容)<\/li>\n<li><strong>Why are thresholds different for Passenger, Medium Vehicle and Heavy Duty?<\/strong> ⭐ memory 標待補,實則有(已抓)<\/li>\n<\/ol>\n<h2 id=\"general-installation2\">General &gt; Installation(2 篇)<\/h2>\n<ol>\n<li>What is the Installation procedure<\/li>\n<li>VisionMax Quick start Guide<\/li>\n<\/ol>\n<h2 id=\"general-troubleshooting2\">General &gt; Troubleshooting(2 篇)<\/h2>\n<ol>\n<li>How to export the system logs from K220?<\/li>\n<li>What if the camera is not turning on when I start the vehicle?<\/li>\n<\/ol>\n<h2 id=\"fleet-portal15\">Fleet Portal(15 篇)<\/h2>\n<ol>\n<li>How can we turn off the sound “please tap your ID card”?<\/li>\n<li>Can I save the live view video?<\/li>\n<li>What is the Map Overview?<\/li>\n<li><strong>How to change the sensitivity of ADAS and DMS?<\/strong> ⭐ 對應 sensitivity dial<\/li>\n<li>What are the supported sensor events?(已 → adas-dms-events.md G-Sensor)<\/li>\n<li><strong>How to retrieve a video file<\/strong><\/li>\n<li><strong>Behaviour of Privacy Mode in VisionMax<\/strong> ⭐ memory 標待釐清,實則有<\/li>\n<li>VisionMax Update History &amp; Release Notes<\/li>\n<li>How do I view what version of the SW installed currently?<\/li>\n<li><strong>How are passenger / medium-duty / heavy-duty vehicles defined, and how is camera height set?<\/strong> ⭐ memory 標待補,實則有<\/li>\n<li>How many geofences can be configured in the camera?<\/li>\n<li>What is the meta data shown with the video?<\/li>\n<li>Is the video compressed?<\/li>\n<li>What is the codec used for live view?<\/li>\n<li>What if I need video from last month?<\/li>\n<\/ol>\n<h2 id=\"master-portalmemory-08-8\">Master Portal(memory 0/8 完全沒覆蓋,8 篇)⚠️<\/h2>\n<ol>\n<li>How do I add a new device to my fleet?<\/li>\n<li><strong>What can I do in Master portal?<\/strong> ⭐⭐ 對應 portal 雙層<\/li>\n<li>VisionMax Update History &amp; Release Notes<\/li>\n<li>How to Change Devices Settings to a Normal Car<\/li>\n<li>How do I set portal language, time zone, date format?<\/li>\n<li><strong>How do I update SW for all devices at one time?<\/strong> ⭐ 批量 OTA<\/li>\n<li>Portal Usage Guides<\/li>\n<li>How to Add New Account?<\/li>\n<\/ol>\n<h2 id=\"using-camera14\">Using camera(14 篇)<\/h2>\n<ol>\n<li>Manual Event Button Behaviors(已校正紅色按鍵 → kb-cheatsheet.md)<\/li>\n<li>How to care for the camera?<\/li>\n<li>Will a software update erase my stored videos?<\/li>\n<li>What are the various LED Behaviors(分機種,已 → kb-cheatsheet.md)<\/li>\n<li><strong>Driver Identification Setup and Usage for Models K245, K245C, K265, K220<\/strong> ⭐ K-series spec 線索<\/li>\n<li>Where can I find the QR code for the Driver ID?<\/li>\n<li><strong>Internal Flash Overwrite Mechanism<\/strong> ⭐<\/li>\n<li><strong>SD Card Overwriting Mechanism<\/strong> ⭐<\/li>\n<li><strong>How to reset device?<\/strong> ⭐<\/li>\n<li>How often does diagnostic refresh or runs a check of the device?<\/li>\n<li>Precautions and notices<\/li>\n<li>What happens if I tap my card again? Does it start a new trip?<\/li>\n<li>What if my card always got failed when taping?<\/li>\n<li>What are the supported NFC card formats?<\/li>\n<li>How do I know that my card is recognized?<\/li>\n<\/ol>\n<h2 id=\"visionagent3\">VisionAgent(3 篇)<\/h2>\n<ol>\n<li>How to Check Camera Install Position<\/li>\n<li>How do I set APN for the SIM in the camera through VisionAgent?<\/li>\n<li>Can I use a smartphone to connect to the device via WiFi or BT?<\/li>\n<\/ol>\n<h2 id=\"declarations4\">Declarations(4 篇 — 法律)<\/h2>\n<p>略<\/p>\n<h2 id=\"kb-memory\">⚠️ 關鍵 KB 事實校正(memory 之前錯)<\/h2>\n<h3 id=\"fps-10memory-15-30\">影像 FPS = 10(memory 寫 15-30 是錯)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Video Type<\/th>\n<th>Resolution<\/th>\n<th>FPS<\/th>\n<th>Bitrate<\/th>\n<th>Size/3min<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Side by Side<\/td>\n<td>2560 × 720<\/td>\n<td>10<\/td>\n<td>2,764,800<\/td>\n<td>58.8 MB<\/td>\n<\/tr>\n<tr>\n<td>Separated<\/td>\n<td>1280 × 720<\/td>\n<td>10<\/td>\n<td>1,382,400<\/td>\n<td>29.4 MB<\/td>\n<\/tr>\n<tr>\n<td>AUX UVC<\/td>\n<td>1280 × 720<\/td>\n<td>10<\/td>\n<td>5,000,000<\/td>\n<td>106.8 MB<\/td>\n<\/tr>\n<tr>\n<td>AUX USB<\/td>\n<td>2560 × 1440<\/td>\n<td>10<\/td>\n<td>5,529,600<\/td>\n<td>118.8 MB<\/td>\n<\/tr>\n<tr>\n<td>Live View<\/td>\n<td>854 × 480<\/td>\n<td>—<\/td>\n<td>800,000<\/td>\n<td>0.1 MB/s<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3 id=\"threshold-kb\">車種 threshold 差異(KB 解釋過,但無具體數字)<\/h3>\n<ul>\n<li>載重影響加速 → 大車需要更多時間到同樣速度<\/li>\n<li>因此 threshold 不同<\/li>\n<li>⚠️ 具體數字 KB 沒給,還是要問 Mori / Jimmy<\/li>\n<\/ul>\n<h2 id=\"deep-read-2026-05-06\">Deep Read 進度(2026-05-06)<\/h2>\n<h3 id=\"deep-read-18\">✅ Deep read 完成 18 篇<\/h3>\n<p><strong>General &gt; FAQ(8 篇)<\/strong>:\n- ✅ What ADAS and DMS features do you support → <code>sales-faq.md<\/code>\n- ✅ How mature is your AI model → <code>sales-faq.md<\/code>(Local 75-80% / Cloud 90-95%)\n- ✅ How long are videos and data stored → <code>sales-faq.md<\/code>(180 days)\n- ✅ How often do you update your AI model → <code>sales-faq.md<\/code>(Dataset monthly / Models quarterly)\n- ✅ Are AI models processed locally or in the cloud → <code>sales-faq.md<\/code>(hybrid)\n- ✅ Can thresholds and alerts be customized → <code>sales-faq.md<\/code>(NOT open)\n- ✅ Can we white label the platform → <code>sales-faq.md<\/code>(✅ logo + domain)\n- ✅ What’s the difference between Device Portal and Fleet Portal → <code>sales-faq.md<\/code><\/p>\n<p><strong>General &gt; FAQ 補(4 篇)<\/strong>:\n- ✅ VisionMax Driver Scorecard → <code>safety-score.md<\/code>\n- ✅ VisionMax Diagnostics Information → <code>diagnostics.md<\/code>\n- ✅ Parking Mode Behavior → 待整合\n- ✅ How long does the camera stay on → 校正(3 分鐘 suspend window)<\/p>\n<p><strong>General &gt; Getting Started(3 篇)<\/strong>:\n- ✅ What is the resolution, FPS, Bitrate → <code>machines-spec.md<\/code>(全 10 fps / 4 video types)\n- ✅ Why are thresholds different for Passenger / Medium / Heavy → <code>vehicle-classification.md<\/code>\n- ✅ What in-cabin alerts are available → <code>voice-alerts.md<\/code>(完整 11 類)<\/p>\n<p><strong>General &gt; API(2 篇)<\/strong>:\n- ✅ API Reference(只是 link 到 web API doc)\n- ✅ Is the portal cloud hosted (AWS, Azure, etc.) → AWS confirmed<\/p>\n<p><strong>Master Portal(2 篇)<\/strong>:\n- ✅ What can I do in Master portal → <code>sales-faq.md<\/code> Master Portal section\n- ✅ How do I update SW for all devices at one time → batch OTA SOP<\/p>\n<p><strong>Fleet Portal(2 篇)<\/strong>:\n- ✅ How are passenger / medium / heavy defined → <code>vehicle-classification.md<\/code>\n- ✅ Behaviour of Privacy Mode → <code>voice-alerts.md<\/code> Privacy Mode<\/p>\n<p><strong>Using camera(2 篇)<\/strong>:\n- ✅ Manual Event Button Behaviors → <code>voice-alerts.md<\/code> 完整 8 種行為\n- ✅ Driver Identification Setup K245/K245C/K265/K220 → <code>machines-spec.md<\/code> RFID/QR mapping<\/p>\n<p><strong>VisionAgent(1 篇)<\/strong>:\n- ✅ Can I use a smartphone via WiFi or BT → <code>visionagent-app.md<\/code><\/p>\n<p><strong>General &gt; Getting Started(1 篇)<\/strong>:\n- ✅ What Are the Trigger Conditions for Each Traffic Sign → 部分(全文長,只摘 Speed Limit)<\/p>\n<h3 id=\"deep-read-8\">✅ Deep read 第三批新增 8+ 篇<\/h3>\n<p><strong>Fleet Portal<\/strong>:\n- ✅ How to change the sensitivity of ADAS and DMS → 對應 sensitivity dial,Configurations → AI Event Detection → vehicle class → Low/Med/High\n- ✅ How to retrieve a video file → SOP:Trip → Trip List → Retrieve Video → Playback SD Card<\/p>\n<p><strong>Using camera<\/strong>:\n- ✅ SD Card Overwriting Mechanism → <code>storage-mechanism.md<\/code>\n- ✅ Internal Flash Overwrite Mechanism → <code>storage-mechanism.md<\/code>\n- ✅ How to reset device → <code>troubleshooting.md<\/code>(Reset button paper clip / K245/K145c/K245c 在 tamper cover 後)\n- ✅ LED Behaviors → <code>machines-spec.md<\/code> 加機種 LED 差異(K220/K245 1 個 / K265 2 個)<\/p>\n<p><strong>Master Portal<\/strong>:\n- ✅ How to Add New Account → <code>customer-onboarding.md<\/code>\n- ✅ How do I add a new device → <code>customer-onboarding.md<\/code>\n- ✅ VisionMax Update History → 目前是空(沒當期 update)<\/p>\n<p><strong>VisionAgent<\/strong>:\n- ✅ How to Check Camera Install Position → <code>customer-onboarding.md<\/code>(Outward 50:50 / Inward driver location)\n- ✅ How do I set APN → <code>customer-onboarding.md<\/code> APN SOP<\/p>\n<p><strong>Installation / Troubleshooting<\/strong>:\n- ✅ VisionMax Quick start Guide → <code>customer-onboarding.md<\/code>\n- ✅ What if camera not turning on → <code>troubleshooting.md<\/code> Q1\n- ⏳ How to export system logs from K220(沒讀)\n- ⏳ What is Installation procedure(沒讀)<\/p>\n<p><strong>General &gt; FAQ<\/strong>:\n- ✅ SD CARD Recording time(主要 link 到 Jotform calculator)\n- ⏳ I’m not receiving password reset(沒讀)<\/p>\n<p><strong>Deep Read 進度<\/strong>:<strong>~25 / 60+ 篇<\/strong>(~40% coverage)<\/p>\n<h3 id=\"readp2-p3\">⏳ 仍未 read(P2-P3,實際要用時再讀)<\/h3>\n<ul>\n<li>General &gt; FAQ 剩 3 篇<\/li>\n<li>Fleet Portal 剩 ~9 篇(geofences / video metadata / codec / 等技術細節)<\/li>\n<li>Using camera 剩 ~8 篇(care for camera / NFC formats / precautions / 等)<\/li>\n<li>Master Portal 剩 ~3 篇(language / change to normal car / Portal Usage Guides)<\/li>\n<li>Getting Started 剩 5 篇(software update time / NFC compat / video storage / 等)<\/li>\n<li>API Reference(只是 link)/ Installation procedure<\/li>\n<\/ul>"}, {"id": "01_product-knowledge--safety-score", "filename": "safety-score.md", "title": "VisionMax Driver Scorecard / Safety Score", "priority": 3, "pending_count": 1, "html": "<h1 id=\"visionmax-driver-scorecard-safety-score\">VisionMax Driver Scorecard / Safety Score<\/h1>\n<blockquote>\n<p>來源:KB「VisionMax Driver Scorecard」(2026-05-06 deep read)\n用途:對客戶 demo Safety Score / Coaching 必背<\/p>\n<\/blockquote>\n<h2 id=\"_1\">啟用條件<\/h2>\n<ul>\n<li>Driver profile 已建<\/li>\n<li>Driver 已 log in/out 車輛<\/li>\n<li>Score 計算需累積 <strong>&gt; 5,000 km<\/strong> 駕駛距離<\/li>\n<\/ul>\n<h2 id=\"_2\">計分機制<\/h2>\n<h3 id=\"_3\">初始<\/h3>\n<ul>\n<li>每個 driver 起始 Safety Score = <strong>100<\/strong><\/li>\n<\/ul>\n<h3 id=\"_4\">計分基於<\/h3>\n<ol>\n<li><strong>Sensor-detected events<\/strong>(impact / harsh driving)<\/li>\n<li><strong>AI-detected events<\/strong>(ADAS / DMS)<\/li>\n<li><strong>Speeding events<\/strong><\/li>\n<\/ol>\n<h3 id=\"_5\">規則<\/h3>\n<ul>\n<li>各 event type 有 specific weighting(<strong>可調<\/strong>)<\/li>\n<li>事件越多分數越低<\/li>\n<li>只看 <strong>最近 5,000 km<\/strong> 的事件(滾動視窗)<\/li>\n<\/ul>\n<h2 id=\"kb-2026-05-07\">公式(KB 揭露,2026-05-07 補完整)<\/h2>\n<div class=\"highlight\"><pre><span><\/span><code>Safety Score = (1 − (∑ Trip score) / 5000) × 100\n\nTrip score    = TRUNCATE((Event Score × 70 / 100) + (Overspeed Score × 30 / 100), 2)\nEvent Score   = Event Score × Weight\nOverspeed Score = (Cumulative distance of Overspeed / Trip distance) × 100\n<\/code><\/pre><\/div>\n<p><strong>重點<\/strong>:\n- Event 與 Overspeed 是 70 / 30 加權\n- Event Score 還會再乘上 per-event-type weighting(各事件可調)\n- Overspeed 用「<strong>超速距離 / 行程距離<\/strong>」百分比,不是次數\n- 整體分數是 <strong>5,000 km 滾動視窗<\/strong> 累積 trip score 的反向(扣越多分越低)<\/p>\n<h2 id=\"pm\">對 PM 議題的對應<\/h2>\n<ul>\n<li>對應 sheet <strong>#186 Safety Score at vehicle level instead of by driver<\/strong>(Simon,<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7151\" rel=\"noopener\" target=\"_blank\">VMX-7151<\/a>)<\/li>\n<li>客戶要的是「車輛層級」(not driver) — KB 明確是 driver-based<\/li>\n<li>可能要 fork 一套新邏輯 / 新 weighting<\/li>\n<li>對應 #164 Modify Safety Reports(<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7083\" rel=\"noopener\" target=\"_blank\">VMX-7083<\/a>)— PDF 報表內容跟網頁顯示不一致<\/li>\n<li>對應「事件 weighting 可調」 → Brian 同步戰略想開放 fleet 改<\/li>\n<\/ul>\n<h2 id=\"_6\">客戶口徑<\/h2>\n<blockquote>\n<p>「Safety Score 從 100 起算,基於 sensor / AI / speeding 三類事件加權扣分,只看最近 5,000 km 的滾動視窗。各事件 weighting 在內部維護,目前 fleet manager 不能改。」(對應 KB「Threshold not customizable」)<\/p>\n<\/blockquote>\n<h2 id=\"coffee-chat\">待釐清(Coffee Chat)<\/h2>\n<ul>\n<li>完整公式(KB 截斷)<\/li>\n<li>各事件 weighting 具體值(不對外公開但 PM 內部要知道)<\/li>\n<li><strong>Vehicle level Safety Score<\/strong> 跟 driver level 怎麼整合(<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7151\" rel=\"noopener\" target=\"_blank\">VMX-7151<\/a> 議題)<\/li>\n<\/ul>"}, {"id": "01_product-knowledge--sales-faq", "filename": "sales-faq.md", "title": "Sales-Level FAQ — 對外口徑(KB 已 deep read)", "priority": 3, "pending_count": 0, "html": "<h1 id=\"sales-level-faq-kb-deep-read\">Sales-Level FAQ — 對外口徑(KB 已 deep read)<\/h1>\n<blockquote>\n<p>來源:KB General &gt; FAQ + Master Portal,2026-05-06 Kenny + Claude 完整深讀\n用法:對客戶 RFP / Deep Dive / Demo 直接拿這層用,<strong>KB 已驗證<\/strong><\/p>\n<\/blockquote>\n<h2 id=\"kb-8\">⭐ KB 確定的對外答案(8 題核心)<\/h2>\n<h3 id=\"q1-what-adas-and-dms-features-do-you-support\">Q1. What ADAS and DMS features do you support?<\/h3>\n<p><strong>KB 答案<\/strong>:\n- <strong>ADAS<\/strong>:LDWS, FCWS, Tailgating, <strong>Rolling Stop<\/strong>, Stop &amp; Go, <strong>Speed Sign (in development)<\/strong>\n- <strong>DMS<\/strong>:Distraction, Fatigue, Phone Usage, Unfastened Seatbelt, Lens Covered, <strong>Smoking (in development)<\/strong><\/p>\n<p>⚠️ 校正以前 memory:\n- ADAS 完整清單比 memory 多 1 個(Rolling Stop 已 ship)\n- Speed Sign 是 <strong>(in development)<\/strong>,不是 Premium tier 2027\n- Smoking 是 <strong>(in development)<\/strong>,memory 之前說「KB 沒寫」是錯的<\/p>\n<h3 id=\"q2-how-mature-is-your-ai-model\">Q2. How mature is your AI model?<\/h3>\n<p><strong>KB 答案<\/strong>(直接背):\n- <strong>Device-Side (Local) AI: 75% to 80% accuracy<\/strong>\n- <strong>Server-Side (Cloud) AI: 90% to 95% accuracy<\/strong> for Unfastened Seatbelt and Phone Use Detection<\/p>\n<p>⚠️ Sensitivity dial 估計值(Low 0.85 / Med 0.70 / High 0.55)是 confidence threshold per event,跟 overall accuracy 不同。<\/p>\n<h3 id=\"q3-how-long-are-videos-and-data-stored\">Q3. How long are videos and data stored?<\/h3>\n<p><strong>KB 答案<\/strong>:<strong>180 days standard retention<\/strong> for all videos and associated data.<\/p>\n<h3 id=\"q4-how-often-do-you-update-your-ai-model\">Q4. How often do you update your AI model?<\/h3>\n<p><strong>KB 答案<\/strong>:\n- <strong>Dataset refreshed monthly<\/strong> in cloud\n- <strong>Models updated quarterly<\/strong>\n- New features added as available<\/p>\n<p>⚠️ MiAI Roadmap Slide 6 講「月節奏 collect→filter→label→train→validate→deploy」是內部 cycle,<strong>對外用 KB 的 quarterly model update<\/strong>。<\/p>\n<h3 id=\"q5-are-ai-models-processed-locally-or-in-the-cloud\">Q5. Are AI models processed locally or in the cloud?<\/h3>\n<p><strong>KB 答案<\/strong>:\n- 「Local + secondary cloud analysis」hybrid 架構\n- Cloud secondary 用於 Unfastened Seatbelt + Phone Use,<strong>&gt; 90% accuracy<\/strong>\n- 對應 Roadmap Slide 5 Stage 1+2(Edge AI + Server AI)<\/p>\n<h3 id=\"q6-can-thresholds-and-alerts-be-customized\">Q6. Can thresholds and alerts be customized?<\/h3>\n<p><strong>KB 答案<\/strong>:\n- ✅ Voice alerts can be customized\n- ❌ AI thresholds <strong>NOT currently open for customers to modify<\/strong><\/p>\n<p>⚠️ Brian 同步戰略翻案目標就是改這個,但 <strong>KB 對外目前還是 NOT open<\/strong>。<\/p>\n<h3 id=\"q7-can-we-white-label-the-platform\">Q7. Can we white label the platform?<\/h3>\n<p><strong>KB 答案<\/strong>:✅ Yes - fully functional White Label solution\n- <strong>Brand Integration<\/strong>: Replace VisionMax logo with partner brand\n- <strong>Domain &amp; URL<\/strong>: Custom domain (visionmaxfleet.com → partnerfleet.com)\n- 強調:no lengthy dev cycle, instant access<\/p>\n<h3 id=\"q8-whats-the-difference-between-device-portal-and-fleet-portal\">Q8. What’s the difference between Device Portal and Fleet Portal?<\/h3>\n<p><strong>KB 答案<\/strong>:\n- <strong>Device Management (Master Portal)<\/strong>:Hardware-focused — Inventory / Health monitoring / Storage / OTA push\n- <strong>Unified Fleet Intelligence (Fleet Portal)<\/strong>:Fleet data — Live View / Event Reports / Safety Analytics / Driver Coaching\n- 一句話:「One manages hardware, the other analyzes fleet performance」<\/p>\n<h2 id=\"master-portal-kbwhat-can-i-do-in-master-portal\">⭐ Master Portal 完整能力(KB:What can I do in Master portal?)<\/h2>\n<p>Administrative operations:\n1. Create / edit / remove fleets\n2. Add devices manually or batch import + assign to fleets / Edit / remove\n3. Modify plan types\n4. View health status report — devices connected ≥1 + uploaded health\n5. View specific device health status\n6. Manage fleet manager’s accounts\n7. Trend chart — fleet size + plan types over time\n8. <strong>Push OTA updates<\/strong>: camera app / base + region images / MiDM client / MiDM system app / map data\n9. <strong>Access<\/strong>: camera app SDK doc / MiAI SDK API doc / <strong>web API doc<\/strong> ⭐ 對技術型客戶必殺<\/p>\n<h3 id=\"batch-ota-sopkb\">Batch OTA SOP(KB)<\/h3>\n<p>Management → Inventory → 全選 fleet 設備或多選 → 點 “Update” 推 OTA<\/p>\n<h2 id=\"vehicle-classificationkbhow-are-passenger-medium-heavy-defined\">⭐ Vehicle Classification(KB:How are passenger / medium / heavy defined)<\/h2>\n<table>\n<thead>\n<tr>\n<th>Class<\/th>\n<th>類型<\/th>\n<th>重量(lbs)<\/th>\n<th>例子<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>1-3<\/td>\n<td>Passenger / Light Duty<\/td>\n<td>6,000 - 14,000<\/td>\n<td>Pickup trucks<\/td>\n<\/tr>\n<tr>\n<td>4-6<\/td>\n<td>Medium Duty<\/td>\n<td>14,001 - 26,000<\/td>\n<td>Delivery vans<\/td>\n<\/tr>\n<tr>\n<td>7-8<\/td>\n<td>Heavy Duty<\/td>\n<td>&gt; 26,001<\/td>\n<td>Long-haul, construction<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<ul>\n<li>不同 class 有 specific height + AI parameters<\/li>\n<li>VisionMax 開發了 3 種 height + AI param settings<\/li>\n<li>技術人員需測量實際安裝高度(對應 <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/HAWK-501\" rel=\"noopener\" target=\"_blank\">HAWK-501<\/a> Camera height 不穩定 ticket)<\/li>\n<\/ul>\n<h2 id=\"privacy-modekbbehaviour-of-privacy-mode-in-visionmax\">⭐ Privacy Mode(KB:Behaviour of Privacy Mode in VisionMax)<\/h2>\n<ul>\n<li><strong>進入<\/strong>:Press and hold <strong>Panic Button<\/strong> &gt; 2 秒<\/li>\n<li><strong>進入後<\/strong>:<\/li>\n<li>停止上傳 health / GPS / photo / video<\/li>\n<li>AI + sensor event detection 暫停<\/li>\n<li>SD 錄影暫停<\/li>\n<li>⚠️ Manual Event Button 按下時 camera <strong>仍會錄<\/strong><\/li>\n<li><strong>退出<\/strong>:Panic Button hold &gt; 2 秒<\/li>\n<li><strong>Restart<\/strong>:Privacy Mode 維持(不會自動退出)<\/li>\n<\/ul>\n<p>⚠️ <strong>與 memory 衝突<\/strong>:memory 校正過「紅色按鍵沒有 panic event」,但 KB 講 Panic Button 用於 Privacy Mode。可能是兩個不同按鈕(Manual Event vs Panic) — Coffee Chat 必問 Mori。<\/p>\n<h2 id=\"manual-event-buttonkbmanual-event-button-behaviors\">⭐ Manual Event Button(KB:Manual Event Button Behaviors)<\/h2>\n<table>\n<thead>\n<tr>\n<th>場景<\/th>\n<th>動作<\/th>\n<th>行為<\/th>\n<th>語音<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>ACC ON / 來電<\/td>\n<td>短按<\/td>\n<td>接電話<\/td>\n<td>—<\/td>\n<\/tr>\n<tr>\n<td>ACC ON / 來電<\/td>\n<td>hold &gt; 2s<\/td>\n<td>拒接<\/td>\n<td>—<\/td>\n<\/tr>\n<tr>\n<td>ACC ON / 無來電<\/td>\n<td>短按<\/td>\n<td>Manual event recording<\/td>\n<td>“Manual Event Recording”<\/td>\n<\/tr>\n<tr>\n<td>ACC ON / 無來電<\/td>\n<td>hold 2-6s<\/td>\n<td>Call out to server<\/td>\n<td>—<\/td>\n<\/tr>\n<tr>\n<td>ACC ON / 無來電<\/td>\n<td>long press +3s<\/td>\n<td>Back to base call<\/td>\n<td>—<\/td>\n<\/tr>\n<tr>\n<td>ACC OFF / Clean install<\/td>\n<td>短按 / hold &gt; 1s<\/td>\n<td>開機<\/td>\n<td>“Device Ready”<\/td>\n<\/tr>\n<tr>\n<td>ACC OFF / ACC mode<\/td>\n<td>短按<\/td>\n<td>Manual event recording<\/td>\n<td>“Manual Event Recording”<\/td>\n<\/tr>\n<tr>\n<td>ACC OFF<\/td>\n<td>hold 10-30s<\/td>\n<td><strong>格式化 SD card<\/strong><\/td>\n<td>“SD Card formatting, please wait”<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>⚠️ Private mode 中,接電話 + Manual event 不執行(其他仍可)<\/p>\n<h2 id=\"k-series-kbdriver-identification-setup-kb-mapping\">⭐ K-series 機種差異(KB:Driver Identification Setup,<strong>第一個 KB 確認的機種 mapping<\/strong>)<\/h2>\n<table>\n<thead>\n<tr>\n<th>機種<\/th>\n<th>RFID 卡<\/th>\n<th>QR Code<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>K245<\/td>\n<td>✅<\/td>\n<td>✅<\/td>\n<\/tr>\n<tr>\n<td>K245C<\/td>\n<td>✅<\/td>\n<td>✅<\/td>\n<\/tr>\n<tr>\n<td>K265<\/td>\n<td>✅<\/td>\n<td>✅<\/td>\n<\/tr>\n<tr>\n<td>K220<\/td>\n<td>❌<\/td>\n<td>✅(QR only)<\/td>\n<\/tr>\n<tr>\n<td>K145 / K145c (with i25)<\/td>\n<td>❌<\/td>\n<td>❌<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>→ K220 不支援 RFID,K145 / K145c 連 QR 都不行(有 i25 才行)<\/p>\n<h2 id=\"sopkb-first\">客戶答題 SOP(KB-first)<\/h2>\n<ol>\n<li>客戶問 → 翻 KB(這層)<\/li>\n<li>KB 沒答案 → 不要編,改:「Roadmap planned, 我內部確認後 24h 內回覆」<\/li>\n<li>KB vs Roadmap 衝突 → 用 Roadmap 對外 + 標「上線時間請我內部確認」<\/li>\n<li>內部數字(threshold / fps / 容量)→ 用 KB,不要從 NotebookLM 推測<\/li>\n<\/ol>\n<h2 id=\"coffee-chat\">仍要 Coffee Chat 釐清<\/h2>\n<ul>\n<li>Mori:<strong>紅色按鍵 = Manual Event Button or Panic Button?各機種幾個 button?<\/strong>(KB 兩篇有衝突)<\/li>\n<li>Mori:K-series 各 chip 對應 tier<\/li>\n<li>Mori:各車種 threshold 具體值<\/li>\n<li>Brian:VMX/BMS 同步戰略時程 + 對 Q6「threshold not customizable」何時翻案<\/li>\n<li>Brian:white label 客戶誰用過(Suvio 案?)<\/li>\n<\/ul>"}, {"id": "01_product-knowledge--storage-mechanism", "filename": "storage-mechanism.md", "title": "Storage Overwrite Mechanism(SD Card + Internal Flash)", "priority": 2, "pending_count": 0, "html": "<h1 id=\"storage-overwrite-mechanismsd-card-internal-flash\">Storage Overwrite Mechanism(SD Card + Internal Flash)<\/h1>\n<blockquote>\n<p>來源:KB「SD Card Overwriting Mechanism」+「Internal Flash Overwrite Mechanism」(2026-05-06 deep read)\n對客戶解釋「老影片去哪了 / 為什麼 event 找不到」必備<\/p>\n<\/blockquote>\n<h2 id=\"sd-card\">SD Card(主要儲存)<\/h2>\n<p>3 種文件類型 + storage limit:<\/p>\n<table>\n<thead>\n<tr>\n<th>類型<\/th>\n<th>何時錄<\/th>\n<th>Storage Limit<\/th>\n<th>觸發刪除條件<\/th>\n<th>每次刪量<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Video<\/strong><\/td>\n<td>Normal recording<\/td>\n<td>(空間優先)<\/td>\n<td>剩餘 &lt; 1.5 GB<\/td>\n<td>2 GB<\/td>\n<\/tr>\n<tr>\n<td><strong>Event<\/strong><\/td>\n<td>ACC on 觸發<\/td>\n<td>9% 總容量<\/td>\n<td>用滿 9%<\/td>\n<td>100 MB<\/td>\n<\/tr>\n<tr>\n<td><strong>Parking Event<\/strong><\/td>\n<td>ACC off 觸發<\/td>\n<td>9% 總容量<\/td>\n<td>用滿 9%<\/td>\n<td>100 MB<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<ul>\n<li><strong>檢查頻率:每 50 秒<\/strong><\/li>\n<li>例:128 GB SD → Event 限 11.52 GB(128 × 9%)→ 滿了刪 100 MB<\/li>\n<\/ul>\n<h2 id=\"internal-flash\">Internal Flash(內部儲存)<\/h2>\n<p>4 種文件類型:<\/p>\n<table>\n<thead>\n<tr>\n<th>類型<\/th>\n<th>內容<\/th>\n<th>Storage Limit<\/th>\n<th>觸發<\/th>\n<th>每次刪量<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Event<\/strong><\/td>\n<td>ACC on 觸發<\/td>\n<td>10%<\/td>\n<td>用滿 10%<\/td>\n<td>100 MB<\/td>\n<\/tr>\n<tr>\n<td><strong>Parking Event<\/strong><\/td>\n<td>ACC off 觸發<\/td>\n<td>10%<\/td>\n<td>用滿 10%<\/td>\n<td>100 MB<\/td>\n<\/tr>\n<tr>\n<td><strong>Snapshot<\/strong><\/td>\n<td>Timeline / Face ID / Headshot<\/td>\n<td>5%<\/td>\n<td>用滿 5%<\/td>\n<td>100 MB<\/td>\n<\/tr>\n<tr>\n<td><strong>Photo<\/strong><\/td>\n<td>事件觸發拍照<\/td>\n<td><strong>100 張<\/strong><\/td>\n<td>超過 100 張<\/td>\n<td>1 張(最舊)<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<ul>\n<li><strong>檢查頻率:每 50 秒<\/strong>(item 1-3)/ 每張照片觸發時(item 4)<\/li>\n<li>例:8 GB internal flash → Event 限 819 MB(8 × 1024 × 10%)<\/li>\n<\/ul>\n<h2 id=\"cloud-retentionkb-faq\">Cloud Retention(KB FAQ)<\/h2>\n<ul>\n<li>所有 video + 相關資料:<strong>180 days<\/strong>(對外標準保留期)<\/li>\n<\/ul>\n<h2 id=\"pm\">對 PM 議題<\/h2>\n<h3 id=\"event\">客戶問「我上個月的 event 影片不見了」<\/h3>\n<ul>\n<li>先看是 SD 或 Cloud<\/li>\n<li>SD:9% Event 限制可能滿了(每 100 MB 刪)<\/li>\n<li>Cloud:超過 180 days 自動刪<\/li>\n<\/ul>\n<h3 id=\"128-what-if-i-need-video-from-last-month\">#128 What if I need video from last month<\/h3>\n<ul>\n<li>KB 對應有專文(待 deep read)<\/li>\n<li>如果是 Video folder(連續錄)→ 大概率被覆蓋<\/li>\n<li>如果是 Event(已上傳 cloud)→ 180 days 內可拿<\/li>\n<\/ul>\n<h3 id=\"sheet-199-ble-beacons-storage-calculator\">sheet #199 BLE Beacons / Storage Calculator<\/h3>\n<ul>\n<li>KB 提供 Jotform 計算機:<a class=\"ext-link\" href=\"https://form.jotform.com/243577498838479\" rel=\"noopener\" target=\"_blank\">https://form.jotform.com/243577498838479<\/a><\/li>\n<li>客戶可估 SD 容量 vs 錄影時數<\/li>\n<\/ul>"}, {"id": "01_product-knowledge--visionagent-app", "filename": "visionagent-app.md", "title": "VisionAgent App(技術人員 / 客戶端工具)", "priority": 2, "pending_count": 1, "html": "<h1 id=\"visionagent-app\">VisionAgent App(技術人員 / 客戶端工具)<\/h1>\n<blockquote>\n<p>來源:KB VisionAgent 3 篇(2026-05-06 deep read)\n用途:技術人員 / 客戶安裝 / 配置設備時用的 smartphone app<\/p>\n<\/blockquote>\n<h2 id=\"_1\">是什麼<\/h2>\n<p>VisionAgent = smartphone app(iOS / Android)用來配置 / 診斷 VMX 設備。<\/p>\n<p>對應 sheet #195「[VisionAgent] 埋GA Code」/ #182「[VisionAgent] iOS Map Overview」等多筆 ticket。<\/p>\n<h2 id=\"_2\">連線方式<\/h2>\n<ul>\n<li><strong>WiFi<\/strong>(主要)— 設備開 hotspot,smartphone 連<\/li>\n<li><strong>BT<\/strong>:KB 沒明確支援(待釐清)<\/li>\n<\/ul>\n<h2 id=\"_3\">主要功能<\/h2>\n<h3 id=\"1-camera-install-position\">1. Camera Install Position 檢查<\/h3>\n<ul>\n<li>KB 文章:How to Check Camera Install Position<\/li>\n<li>用途:技術人員裝相機時用手機看 live view 確認位置 OK<\/li>\n<li>對應 Vehicle Class 的 height 設定(passenger / medium / heavy 各有 height + AI param)<\/li>\n<\/ul>\n<h3 id=\"2-apn-sim\">2. APN 設定(SIM 卡網路設定)<\/h3>\n<ul>\n<li>KB 文章:How do I set APN for the SIM in the camera through VisionAgent?<\/li>\n<li>用途:更換 SIM 卡 / 海外不同電信商時透過 VisionAgent 設定 APN<\/li>\n<li>對應 OTA / connectivity 議題<\/li>\n<\/ul>\n<h3 id=\"3-live-view-health-status-diagnostic-scan\">3. Live View + Health Status + Diagnostic Scan<\/h3>\n<ul>\n<li>KB 文章:Can I use a smartphone to connect to the device via WiFi or BT?<\/li>\n<li>連線後可:<\/li>\n<li>看 live view(裝相機時對位置)<\/li>\n<li>觸發 device health status 上報<\/li>\n<li>跑 diagnostic scan<\/li>\n<\/ul>\n<h2 id=\"pm\">對 PM 議題的對應<\/h2>\n<h3 id=\"ios-app-vmx-7373-to-7381-ticket\">iOS App 開發中(<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7373\" rel=\"noopener\" target=\"_blank\">VMX-7373<\/a> to 7381 多筆 ticket)<\/h3>\n<ul>\n<li><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7373\" rel=\"noopener\" target=\"_blank\">VMX-7373<\/a> [iOS] Add Parking Photo Button<\/li>\n<li><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7374\" rel=\"noopener\" target=\"_blank\">VMX-7374<\/a> [iOS] Add Manual End Button on Trip Details<\/li>\n<li><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7375\" rel=\"noopener\" target=\"_blank\">VMX-7375<\/a> [iOS] Add Manual End Button<\/li>\n<li><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7377\" rel=\"noopener\" target=\"_blank\">VMX-7377<\/a> [iOS] Can’t Access Driver Info from Map Overview<\/li>\n<li><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7381\" rel=\"noopener\" target=\"_blank\">VMX-7381<\/a> [iOS] 無法刪除 Event<\/li>\n<li>→ 對應 sheet 上 Fleet Mobile APP Push notification(#176 / <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7030\" rel=\"noopener\" target=\"_blank\">VMX-7030<\/a> / Pending)<\/li>\n<\/ul>\n<h3 id=\"kb-sheet\">KB 跟 Sheet 不同層<\/h3>\n<ul>\n<li>KB 對應的「VisionAgent」= 給技術人員裝相機用的 app<\/li>\n<li>Sheet「Fleet Mobile APP」= 給 fleet manager 用的管理 app<\/li>\n<li><strong>是兩個不同的 app<\/strong>!別混淆<\/li>\n<\/ul>\n<h2 id=\"_4\">客戶口徑<\/h2>\n<blockquote>\n<p>「VisionAgent 是給安裝技術人員 / 客戶端 power user 用的工具,可以裝相機時看 live view、設 APN、跑 diagnostic。Fleet Manager 日常用 web portal,iOS App 在開發中。」<\/p>\n<\/blockquote>"}]}, {"id": "02_organization-map", "name": "組織與利害關係人", "icon": "👥", "docs": [{"id": "02_organization-map--readme", "filename": "README.md", "title": "02 Organization Map", "priority": 0, "pending_count": 2, "html": "<h1 id=\"02-organization-map\">02 Organization Map<\/h1>\n<p>人員 / 客戶 / Coffee chat 待問清單。<\/p>\n<h2 id=\"_1\">文件<\/h2>\n<ul>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"02_organization-map\" data-doc=\"02_organization-map--stakeholders\" href=\"#02_organization-map/02_organization-map--stakeholders\">stakeholders.md<\/a><\/strong> — 內部 + 海外客戶完整名單<\/li>\n<li><strong><a class=\"internal-doc-link\" data-cat=\"02_organization-map\" data-doc=\"02_organization-map--coffee-chat-questions\" href=\"#02_organization-map/02_organization-map--coffee-chat-questions\">coffee-chat-questions.md<\/a><\/strong> — 待問清單 by 人<\/li>\n<\/ul>\n<h2 id=\"_2\">三大客戶分類<\/h2>\n<h3 id=\"tier-1\">Tier 1(每週固定會議)<\/h3>\n<ul>\n<li>Azuga(Custom SDK,21 API 排隊)<\/li>\n<li>Bridgeron(API)<\/li>\n<li>BMS(雙版本同步戰略對象)<\/li>\n<\/ul>\n<h3 id=\"tier-2\">Tier 2(評估中)<\/h3>\n<ul>\n<li>Platform Science(Vinicius,US)<\/li>\n<li>CONNECTSOURCE(Passenger Blurring)<\/li>\n<\/ul>\n<h3 id=\"tier-3\">Tier 3(個別案件)<\/h3>\n<ul>\n<li>Quantatec / HDFE / LB Technology / Rastrac / Seeing Machines / Suvio / DSNY / Mainfreight<\/li>\n<\/ul>"}, {"id": "02_organization-map--coffee-chat-questions", "filename": "coffee-chat-questions.md", "title": "Coffee Chat 待問清單", "priority": 5, "pending_count": 1, "html": "<h1 id=\"coffee-chat\">Coffee Chat 待問清單<\/h1>\n<p>依人分類,問完就劃掉。<\/p>\n<h2 id=\"briansoftware-head\">☕ Brian(Software Head)<\/h2>\n<h3 id=\"_1\">戰略級<\/h3>\n<ul>\n<li>[ ] <strong>VMX/BMS 同步戰略時程<\/strong>(6 個月內?具體 milestone?)<\/li>\n<li>[ ] BMS/VMX 同步我可以扛哪一塊(API 文件 / Fleet portal UI / 客戶溝通)<\/li>\n<li>[ ] <strong>Roadmap vs Sheet 同步缺口<\/strong>(Smoking / VLM 等不一致)是否有正式機制<\/li>\n<li>[ ] HDFE beta 模式想要什麼形式(toggle 切舊版?transition 期?)<\/li>\n<\/ul>\n<h3 id=\"_2\">戰術級<\/h3>\n<ul>\n<li>[ ] Pro / Suspend 完整定價<\/li>\n<li>[ ] 「13 cams / 47 cams」含義<\/li>\n<li>[ ] Contract Fleet 真實定義(Portal 上有 tab 但 PDF 未列)<\/li>\n<li>[ ] PDF 補強 Wiki ticket 推不推<\/li>\n<li>[ ] MMF 是已 ship 還是 roadmap planned<\/li>\n<li>[ ] Jira dashboard 4 個 filter 的 JQL<\/li>\n<li>[ ] <strong>Q2 merge label sweep PM 來扛<\/strong>(對應 #154 process gap)<\/li>\n<\/ul>\n<h2 id=\"mori\">☕ Mori(硬體)<\/h2>\n<h3 id=\"_3\">機種對應<\/h3>\n<ul>\n<li>[ ] <strong>K145c / K220 / K245 / K245c / K265 各跑哪顆 Qualcomm chip<\/strong><\/li>\n<li>[ ] Kenny 自己的 K245 屬 Entry / Basic / Advanced 哪個 tier<\/li>\n<li>✅ 各機種 frame rate — 機體可達 15-30 fps,<strong>對外 only 10 fps<\/strong>(2026-05-07 已釐清,運算資源限制)<\/li>\n<\/ul>\n<h3 id=\"g-sensor\">G-Sensor<\/h3>\n<ul>\n<li>[ ] <strong>Harsh Acceleration / Rollover G 值門檻<\/strong>(只 lock 4 種,缺這 2)<\/li>\n<li>[ ] <strong>200 Hz G-Sensor 韌體可行性<\/strong>(Simon must-have)<\/li>\n<\/ul>\n<h3 id=\"_4\">細節<\/h3>\n<ul>\n<li>[ ] 紅色按鍵語音不一致 — 是哪幾台<\/li>\n<li>[ ] Private Mode 切換按法<\/li>\n<li>[ ] K-series spec 對照表(鏡頭 / 算力 / SD 容量)現成文件?<\/li>\n<\/ul>\n<h2 id=\"jimmyai-inference\">☕ Jimmy(AI Inference)<\/h2>\n<h3 id=\"vs\">對外 vs 內部不一致<\/h3>\n<ul>\n<li>[ ] <strong>Smoking 真實狀態<\/strong>:KB 沒寫 / Sheet 隱藏 / Roadmap 列 / 4 ticket open — production 到底有沒有?<\/li>\n<li>[ ] <strong>Yawning 內部測試效果指標<\/strong>(2026-05-06 會議揭露效果不如預期)<\/li>\n<li>[ ] <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7324\" rel=\"noopener\" target=\"_blank\">VMX-7324<\/a> 客訴 Smoking 怎麼解<\/li>\n<li>✅ <strong>「Burning ADAS / Burning DMS」是什麼意思<\/strong> — 是 typo,實為 <strong>Blurring function<\/strong>(2026-05-07 已釐清)<\/li>\n<\/ul>\n<h3 id=\"_5\">技術深度<\/h3>\n<ul>\n<li>[ ] 各 event 真實 Confidence threshold(memory 是估計值)<\/li>\n<li>[ ] Sensitivity dial Low / Med / High 真實 debounce / cooldown<\/li>\n<li>[ ] Yawning validation 卡點<\/li>\n<li>[ ] <strong>Eating / Drinking<\/strong> Roadmap 標 2027,<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/HAWK-562\" rel=\"noopener\" target=\"_blank\">HAWK-562<\/a> 已開,實際進度?<\/li>\n<li>[ ] Server-side AI 進度(Stage 2/3 何時上)<\/li>\n<li>[ ] <strong>Face Not Found Issue<\/strong>(<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7404\" rel=\"noopener\" target=\"_blank\">VMX-7404<\/a> 同根因?)<\/li>\n<\/ul>\n<h3 id=\"jimmy\">甜頭(送 Jimmy)<\/h3>\n<ul>\n<li>[ ] <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7404\" rel=\"noopener\" target=\"_blank\">VMX-7404<\/a> ADAS Failure evidence 提交(8/10 設備 / Trip 7028714 vs 7079470)<\/li>\n<\/ul>\n<h2 id=\"lucyui\">☕ Lucy(UI)<\/h2>\n<h3 id=\"rollover\">模糊 / Rollover<\/h3>\n<ul>\n<li>[ ] 模糊功能 UI 設計時程<\/li>\n<li>[ ] Rollover UI 設計(<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7194\" rel=\"noopener\" target=\"_blank\">VMX-7194<\/a> 5/6 加 UI)<\/li>\n<li>[ ] 任務完成主動通知機制<\/li>\n<\/ul>\n<h3 id=\"portal\">Portal 視覺<\/h3>\n<ul>\n<li>[ ] <strong>軌跡顏色含義<\/strong>(藍 / 橘 / 紅)<\/li>\n<li>[ ] <strong>Severity 等級<\/strong>(Minor / 推測還有 Major / Critical)<\/li>\n<li>[ ] 舊 Playback 紅色預告 UI 設計<\/li>\n<\/ul>\n<h3 id=\"56\">5/6 後續<\/h3>\n<ul>\n<li>[ ] Yawning Fatigue config 開關 UI<\/li>\n<li>[ ] HDFE「切回舊版」開關設計<\/li>\n<\/ul>\n<h2 id=\"spencercloud\">☕ Spencer(Cloud)<\/h2>\n<ul>\n<li>[ ] <strong>Server-side AI Stage 2/3 進度<\/strong>(Edge+Server / Server VLM)<\/li>\n<li>[ ] Master/MAU 模糊 API 開關設計<\/li>\n<li>[ ] <strong><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6722\" rel=\"noopener\" target=\"_blank\">VMX-6722<\/a> 文件 / Casebase 同步<\/strong>(對應 Brian 的雙版本同步戰略)<\/li>\n<li>[ ] Contract Fleet RBAC spec<\/li>\n<li>[ ] ADAS Failure 跟 <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7404\" rel=\"noopener\" target=\"_blank\">VMX-7404<\/a> 關聯<\/li>\n<li>[ ] AI debug overlay 是否該對客戶關閉<\/li>\n<\/ul>\n<h2 id=\"tony-akamai\">☕ Tony(韌體 / Akamai 中介)<\/h2>\n<ul>\n<li>[ ] <strong>Akamai CDN PG 失效進度<\/strong>(Brian 已派工)<\/li>\n<li>[ ] OTA JSON purge 機制可不可靠<\/li>\n<\/ul>\n<h2 id=\"sales\">☕ Sales 主管<\/h2>\n<ul>\n<li>[ ] 合約中對 Contract Fleet / Sub-fleet 的措辭<\/li>\n<\/ul>\n<h2 id=\"wendy-hub-tab\">☕ Wendy ⚠️(身份不明,Hub 第三 tab 提到)<\/h2>\n<ul>\n<li>[ ] <strong>基本身份<\/strong>:她是哪個部門?跟進什麼客戶?<\/li>\n<li>[ ] 她對 roadmap 資訊不對稱的具體痛點<\/li>\n<\/ul>\n<p>→ 找 Brian 確認 Wendy 是誰再去約。<\/p>"}, {"id": "02_organization-map--stakeholders", "filename": "stakeholders.md", "title": "內部利害關係人地圖", "priority": 5, "pending_count": 12, "html": "<h1 id=\"_1\">內部利害關係人地圖<\/h1>\n<h2 id=\"mitac\">MiTAC 端<\/h2>\n<table>\n<thead>\n<tr>\n<th>領域<\/th>\n<th>人<\/th>\n<th>職責 / 關鍵議題<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>Software Head<\/strong><\/td>\n<td><strong>Brian<\/strong><\/td>\n<td>VisionMax / Cloud / Camera App / AI 整體;團隊 ~20 人;Jira dashboard 主導者<\/td>\n<\/tr>\n<tr>\n<td>Camera App<\/td>\n<td>Hsinyi, Jack, Leo<\/td>\n<td>設備端錄影 / UI / 紅色按鍵<\/td>\n<\/tr>\n<tr>\n<td>AI Inference<\/td>\n<td><strong>Jimmy<\/strong>, Vincent, Eric<\/td>\n<td>ADAS / DMS 模型、訓練、validation<\/td>\n<\/tr>\n<tr>\n<td>AI Inference 補<\/td>\n<td>Jieli, Andy<\/td>\n<td>Yawning / Quantatec / DMS Golden Case<\/td>\n<\/tr>\n<tr>\n<td>Cloud Backend<\/td>\n<td><strong>Spencer<\/strong>, Neil<\/td>\n<td>Event API / DB / portal serving<\/td>\n<\/tr>\n<tr>\n<td>MiDM / OTA<\/td>
