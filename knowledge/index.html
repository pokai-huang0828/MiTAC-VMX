jira.navman.co.nz/jira/browse/VMX-6670\" rel=\"noopener\" target=\"_blank\">VMX-6670<\/a> / 7324 / 6380 / 6920)<\/td>\n<\/tr>\n<tr>\n<td>會議 Note(4/2)<\/td>\n<td>「Edge 70% 準確,正在跟 server YOLO11-L 整合」<\/td>\n<\/tr>\n<tr>\n<td><strong>對客戶口徑<\/strong><\/td>\n<td>⚠️ 必問 Jimmy 真實狀態。預設「Roadmap planned, 內部開發中」<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3 id=\"mmf-mobility-map-function\">MMF (Mobility Map Function)<\/h3>\n<table>\n<thead>\n<tr>\n<th>角度<\/th>\n<th>內容<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Roadmap<\/td>\n<td>Slide 2 列在 overview<\/td>\n<\/tr>\n<tr>\n<td>memory<\/td>\n<td>還沒上線、測試中<\/td>\n<\/tr>\n<tr>\n<td>Jira<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6353\" rel=\"noopener\" target=\"_blank\">VMX-6353<\/a> / <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6925\" rel=\"noopener\" target=\"_blank\">VMX-6925<\/a>(open)<\/td>\n<\/tr>\n<tr>\n<td><strong>對客戶口徑<\/strong><\/td>\n<td>❌ <strong>不對任何客戶承諾<\/strong><\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3 id=\"vlmvision-language-models\">VLM(Vision-Language Models)<\/h3>\n<table>\n<thead>\n<tr>\n<th>角度<\/th>\n<th>內容<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Roadmap 對外版<\/td>\n<td>2H‘2027(Premium tier)<\/td>\n<\/tr>\n<tr>\n<td>AI Sheet 內部<\/td>\n<td><strong>2026 Q3<\/strong><\/td>\n<\/tr>\n<tr>\n<td>Jira<\/td>\n<td>(No PIC, sheet 標 2026 Q3)<\/td>\n<\/tr>\n<tr>\n<td>Kenny 裁示<\/td>\n<td>sheet 是內部真相,roadmap 對外<\/td>\n<\/tr>\n<tr>\n<td><strong>對客戶口徑<\/strong><\/td>\n<td>✅ 「2H‘2027 Roadmap 規劃」<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3 id=\"eating-drinking\">Eating / Drinking<\/h3>\n<table>\n<thead>\n<tr>\n<th>角度<\/th>\n<th>內容<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Roadmap<\/td>\n<td>Advanced tier 1H‘2027<\/td>\n<\/tr>\n<tr>\n<td>AI Sheet<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/HAWK-562\" rel=\"noopener\" target=\"_blank\">HAWK-562<\/a> 已開,Jimmy 在動<\/td>\n<\/tr>\n<tr>\n<td>會議揭露<\/td>\n<td>提早 feasibility(or 早於 Roadmap)<\/td>\n<\/tr>\n<tr>\n<td><strong>對客戶口徑<\/strong><\/td>\n<td>✅ 「2027 Roadmap 規劃」<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3 id=\"burning-adas-burning-dms-blurring-function2026-05-07\">Burning ADAS / Burning DMS → 實為 Blurring function(2026-05-07 校正)<\/h3>\n<table>\n<thead>\n<tr>\n<th>角度<\/th>\n<th>內容<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Roadmap Slide 2<\/td>\n<td>寫成 Burning ADAS / Burning DMS(typo)<\/td>\n<\/tr>\n<tr>\n<td>KB<\/td>\n<td>沒寫<\/td>\n<\/tr>\n<tr>\n<td>真實意義<\/td>\n<td>✅ <strong>Blurring function<\/strong> — 影像 / 隱私模糊化<\/td>\n<\/tr>\n<tr>\n<td><strong>對客戶口徑<\/strong><\/td>\n<td>「對應 server-side 影像模糊化(隱私 / 合規場景)」<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3 id=\"server-ai-stages\">Server AI Stages 進度<\/h3>\n<table>\n<thead>\n<tr>\n<th>階段<\/th>\n<th>Roadmap<\/th>\n<th>內部進度(2026-05-06)<\/th>\n<th>對客戶口徑<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>Stage 1 Edge AI<\/td>\n<td>已上<\/td>\n<td>✅ 已上<\/td>\n<td>可講<\/td>\n<\/tr>\n<tr>\n<td>Stage 2 Edge + Server AI<\/td>\n<td>已上<\/td>\n<td>部分 ticket 進行(<a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6722\" rel=\"noopener\" target=\"_blank\">VMX-6722<\/a> LDWS Eric Feasibility / <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6703\" rel=\"noopener\" target=\"_blank\">VMX-6703<\/a> / 7346)<\/td>\n<td>有限度講「已開發 server-side validation」<\/td>\n<\/tr>\n<tr>\n<td>Stage 3 Edge + Server VLM<\/td>\n<td>對外規劃<\/td>\n<td>沒人扛<\/td>\n<td>講「Roadmap 中」<\/td>\n<\/tr>\n<tr>\n<td>Stage 4 Edge VLM<\/td>\n<td>終局<\/td>\n<td>沒動工<\/td>\n<td>講「終局視野」<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"_1\">規則<\/h2>\n<p>跟客戶 / 主管講之前:\n1. 對 product spec 詢問 → 看 <a class=\"internal-doc-link\" data-cat=\"01_product-knowledge\" data-doc=\"01_product-knowledge--kb-cheatsheet\" href=\"#01_product-knowledge/01_product-knowledge--kb-cheatsheet\">01_product-knowledge/kb-cheatsheet.md<\/a> + 本檔\n2. 對時程詢問 → 對外用 Roadmap(本檔最後一欄「對客戶口徑」)\n3. 對技術細節 → 用 KB + 標 ⚠️ 估計<\/p>\n<h2 id=\"_2\">更新頻率<\/h2>\n<p>每月做一次跨 KB / Sheet / Jira / Roadmap cross-check,把新出現的不一致記到本檔。<\/p>"}, {"id": "06_calibration-log--sheet-jira-mismatches", "filename": "sheet-jira-mismatches.md", "title": "Sheet ↔ Jira Mismatch 紀錄", "priority": 4, "pending_count": 0, "html": "<h1 id=\"sheet-jira-mismatch\">Sheet ↔ Jira Mismatch 紀錄<\/h1>\n<blockquote>\n<p>雙向同步缺口。Sheet 跟 Jira 不一致是常態,需 PM 每兩週 sweep。<\/p>\n<\/blockquote>\n<h2 id=\"_1\">兩個方向<\/h2>\n<h3 id=\"1sheet-jirajira-sheet\">方向 1:Sheet 落後 Jira(Jira 已關 / Sheet 沒改)<\/h3>\n<p>業務端看 Sheet 以為「PM/RD 拖延」,實際 RD 已交付。<\/p>\n<h3 id=\"2sheet-jira-jira-close\">方向 2:Sheet 領先 Jira(口頭說完成 / Jira 沒 close)<\/h3>\n<p>看 Jira 以為「沒做完」,實際產品端認為已交付。<\/p>\n<h2 id=\"_2\">歷史紀錄<\/h2>\n<h3 id=\"2026-05-05-sweep-sheet-4\">2026-05-05 sweep(會議前抓)— Sheet 落後 4 件<\/h3>\n<table>\n<thead>\n<tr>\n<th>Sheet #<\/th>\n<th>Jira<\/th>\n<th>Sheet 寫<\/th>\n<th>Jira 真實<\/th>\n<th>結果<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>162<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6754\" rel=\"noopener\" target=\"_blank\">VMX-6754<\/a><\/td>\n<td>In Process(7 個月)<\/td>\n<td>Resolved<\/td>\n<td>5/6 會議同步 ✅<\/td>\n<\/tr>\n<tr>\n<td>165<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7029\" rel=\"noopener\" target=\"_blank\">VMX-7029<\/a><\/td>\n<td>In Process(5 個月)<\/td>\n<td>Resolved<\/td>\n<td>5/6 會議同步 ✅<\/td>\n<\/tr>\n<tr>\n<td>187<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7161\" rel=\"noopener\" target=\"_blank\">VMX-7161<\/a><\/td>\n<td>In Process<\/td>\n<td>Resolved<\/td>\n<td>5/6 會議同步 ✅<\/td>\n<\/tr>\n<tr>\n<td>188<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7162\" rel=\"noopener\" target=\"_blank\">VMX-7162<\/a><\/td>\n<td>In Process<\/td>\n<td>Resolved<\/td>\n<td>5/6 會議同步 ✅<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h3 id=\"2026-05-06-sweep-sheet-3\">2026-05-06 sweep(會議後新增)— Sheet 領先 3 件<\/h3>\n<table>\n<thead>\n<tr>\n<th>Sheet #<\/th>\n<th>Jira<\/th>\n<th>Sheet 寫<\/th>\n<th>Jira 真實<\/th>\n<th>結果<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>180<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7082\" rel=\"noopener\" target=\"_blank\">VMX-7082<\/a>(Lucy GA tracking)<\/td>\n<td>Resolved<\/td>\n<td><strong>New<\/strong><\/td>\n<td>⏳ 待私訊 Lucy<\/td>\n<\/tr>\n<tr>\n<td>195<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7233\" rel=\"noopener\" target=\"_blank\">VMX-7233<\/a>(VisionAgent GA Code)<\/td>\n<td>Resolved<\/td>\n<td><strong>New<\/strong><\/td>\n<td>⏳ 待私訊 Internal<\/td>\n<\/tr>\n<tr>\n<td>199<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-6782\" rel=\"noopener\" target=\"_blank\">VMX-6782<\/a>(BLE Beacons)<\/td>\n<td>Resolved<\/td>\n<td><strong>Open<\/strong><\/td>\n<td>⏳ 待私訊 joe.lien<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<p>→ 5/6 動作 owner 在 sheet 加註「5/6 已完成 提供給客戶測試」但沒 close Jira。<\/p>\n<h3 id=\"sheet-link-2026-05-06\">Sheet link 錯誤(2026-05-06)<\/h3>\n<table>\n<thead>\n<tr>\n<th>Sheet #<\/th>\n<th>Sheet 寫 link<\/th>\n<th>Jira 實際是<\/th>\n<th>應該是<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>194<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7316\" rel=\"noopener\" target=\"_blank\">VMX-7316<\/a><\/td>\n<td>[AZUGA SmartLink] 新增事件支援<\/td>\n<td>該找 IOSix 對應 ticket<\/td>\n<\/tr>\n<tr>\n<td>197<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7147\" rel=\"noopener\" target=\"_blank\">VMX-7147<\/a>(第二個 link)<\/td>\n<td>Camera recording no longer exists<\/td>\n<td>移除 <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7147\" rel=\"noopener\" target=\"_blank\">VMX-7147<\/a>,只留 <a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7224\" rel=\"noopener\" target=\"_blank\">VMX-7224<\/a><\/td>\n<\/tr>\n<tr>\n<td>209<\/td>\n<td><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7407\" rel=\"noopener\" target=\"_blank\">VMX-7407<\/a>(重複)<\/td>\n<td>UVC RAW frame error handling<\/td>\n<td>應為 <strong><a class=\"ext-link jira-link\" href=\"https://jira.navman.co.nz/jira/browse/VMX-7088\" rel=\"noopener\" target=\"_blank\">VMX-7088<\/a> Viewer only<\/strong><\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<h2 id=\"_3\">規律 / 啟示<\/h2>\n<ol>\n<li><strong>Resolved → 沒人回頭關<\/strong> 是常態。Sheet 上看到 In Process 不一定真的 active<\/li>\n<li><strong>「我做完了」≠ Jira closed<\/strong>。產品端認為交付給客戶測試 = sheet 動;但 Jira ticket 要等 QA / verification 才 close<\/li>\n<li><strong>Sheet link 寫錯<\/strong>多發生在新增 row 時複製貼上沒改 link<\/li>\n<li><strong>Sheet 隱藏 row<\/strong> 跟 mismatch 不同 — hidden = 不在使用,mismatch = 還在用但狀態不對齊<\/li>\n<\/ol>\n<h2 id=\"brian-sheet-owner\">防呆建議(對 Brian / Sheet owner)<\/h2>\n<ul>\n<li>每兩週 sweep(PM 來扛)<\/li>\n<li>新增 row 時驗證 link<\/li>\n<li>Resolved 後在 sheet 加 verification 階段(client testing / staging / production)<\/li>\n<li>Sheet 加「Last verified」欄<\/li>\n<\/ul>"}]}], "overview_html": "<h1 id=\"knowledge-base-kenny-huang-vmx-pm\">Knowledge Base — Kenny Huang VMX PM<\/h1>\n<blockquote>\n<p>Kenny 的 PM 評估期知識庫,結構化來自:KB / Sheet / Jira / 會議錄音 / Coffee chat / Hub 第三 tab 自萃取框架。\n整理日期:2026-05-06\n最新狀態同步:2026-05-06 Q2 Review 會議後<\/p>\n<\/blockquote>\n<p>🌐 <strong><a href=\"index.html\">在瀏覽器開啟 Knowledge Hub →<\/a><\/strong>(離線可用,7 個分類 tab + 搜尋)<\/p>\n<p>更新內容後重新產生:<code>python3 knowledge/_build_index.py<\/code><\/p>\n<hr/>\n<h2 id=\"_1\">🔗 上游資料源<\/h2>\n<table>\n<thead>\n<tr>\n<th>來源<\/th>\n<th>連結 / 路徑<\/th>\n<th>性質<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong>VMX Knowledge Base<\/strong><\/td>\n<td><a class=\"ext-link\" href=\"https://service.visionmaxfleet.com/portal/en/kb/vm\" rel=\"noopener\" target=\"_blank\">https://service.visionmaxfleet.com/portal/en/kb/vm<\/a><\/td>\n<td>✅ 已 ship 的官方事實<\/td>\n<\/tr>\n<tr>\n<td>Request Tracker Sheet<\/td>\n<td><a class=\"ext-link\" href=\"https://docs.google.com/spreadsheets/d/1DXCf8vU7ZrtzVdMEPSxHgmDb7cPKJFDK/edit\" rel=\"noopener\" target=\"_blank\">https://docs.google.com/spreadsheets/d/1DXCf8vU7ZrtzVdMEPSxHgmDb7cPKJFDK/edit<\/a><\/td>\n<td>內部進行中<\/td>\n<\/tr>\n<tr>\n<td>AI 工作計畫 Sheet<\/td>\n<td>同上 (gid=339075798)<\/td>\n<td>AI team 內部追蹤<\/td>\n<\/tr>\n<tr>\n<td>Jira<\/td>\n<td><a class=\"ext-link\" href=\"https://jira.navman.co.nz/jira/\" rel=\"noopener\" target=\"_blank\">https://jira.navman.co.nz/jira/<\/a><\/td>\n<td>RD ticket 事實狀態<\/td>\n<\/tr>\n<tr>\n<td>MiAI Roadmap (對外)<\/td>\n<td><code>../MiAI Roadmap Introduce 2026024.pptx<\/code><\/td>\n<td>客戶 / 主管版<\/td>\n<\/tr>\n<tr>\n<td>Case_learning Hub<\/td>\n<td><code>../Case_learning/case-learning-hub.html<\/code><\/td>\n<td>客戶案 + PM 框架<\/td>\n<\/tr>\n<tr>\n<td>Portal HTML Briefings<\/td>\n<td><code>../portal_reference/*.html<\/code><\/td>\n<td>客戶簡報用<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr/>\n<h2 id=\"folder\">📁 Folder 結構<\/h2>\n<table>\n<thead>\n<tr>\n<th>Folder<\/th>\n<th>內容<\/th>\n<th>何時用<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td><strong><a href=\"01_product-knowledge/\">01_product-knowledge/<\/a><\/strong><\/td>\n<td>KB cheatsheet / 機種 / Events / Voice / Roadmap<\/td>\n<td>對客戶 / RD 講具體 spec 前查<\/td>\n<\/tr>\n<tr>\n<td><strong><a href=\"02_organization-map/\">02_organization-map/<\/a><\/strong><\/td>\n<td>內部利害關係人 / 客戶 / Coffee chat 待問<\/td>\n<td>寫信 / 找人前查<\/td>\n<\/tr>\n<tr>\n<td><strong><a href=\"03_systems-architecture/\">03_systems-architecture/<\/a><\/strong><\/td>\n<td>Portal 雙層 / Plan Type / Server AI 架構<\/td>\n<td>對客戶 demo / 解釋 demo 前查<\/td>\n<\/tr>\n<tr>\n<td><strong><a href=\"04_pm-frameworks/\">04_pm-frameworks/<\/a><\/strong><\/td>\n<td>三層真相 / 承諾層次 / 4 條核心原則<\/td>\n<td>寫 proposal / 跟 Brian 對話前查<\/td>\n<\/tr>\n<tr>\n<td><strong><a href=\"05_workflows/\">05_workflows/<\/a><\/strong><\/td>\n<td>HTML 簡報 SOP / MDT 模板 / Sheet sweeper<\/td>\n<td>動手做東西前查<\/td>\n<\/tr>\n<tr>\n<td><strong><a href=\"06_calibration-log/\">06_calibration-log/<\/a><\/strong><\/td>\n<td>已校正事實 / Sheet vs Jira mismatch 紀錄<\/td>\n<td>確認自己沒講錯話<\/td>\n<\/tr>\n<\/tbody>\n<\/table>\n<hr/>\n<h2 id=\"kb\">三層真相 — 進入 KB 前的閱讀準則<\/h2>\n<div class=\"highlight\"><pre><span><\/span><code>┌─────────────────────────────────────────┐\n│  KB         → 已 ship 的事實              │   對客戶可具體承諾\n├─────────────────────────────────────────┤\n│  Sheet      → 內部進行中                  │   PM 內部判斷依據\n├─────────────────────────────────────────┤\n│  Roadmap    → 對外規劃故事                │   客戶 / 主管的版本\n└─────────────────────────────────────────┘\n<\/code><\/pre><\/div>\n<p><strong>衝突處理<\/strong>:對外用 Roadmap、對內用 Sheet、實際是否能用看 KB。<\/p>\n<p>詳見 <a class=\"internal-doc-link\" data-cat=\"04_pm-frameworks\" data-doc=\"04_pm-frameworks--three-truth-layers\" href=\"#04_pm-frameworks/04_pm-frameworks--three-truth-layers\">04_pm-frameworks/three-truth-layers.md<\/a>。<\/p>\n<hr/>\n<h2 id=\"_2\">🚦 快速指南<\/h2>\n<h3 id=\"x\">「我要對客戶講 X 功能」<\/h3>\n<ol>\n<li>開 KB(<a class=\"ext-link\" href=\"https://service.visionmaxfleet.com/portal/en/kb/vm)搜\" rel=\"noopener\" target=\"_blank\">https://service.visionmaxfleet.com/portal/en/kb/vm)搜<\/a> X<\/li>\n<li>沒找到 → 看 <a href=\"06_calibration-log/\">06_calibration-log<\/a> 有沒有寫「狀態待釐清」<\/li>\n<li>還沒釐清 → 不要承諾,改用「Roadmap planned, 內部測試中」(Yawning / Smoking 都這狀態)<\/li>\n<\/ol>\n<h3 id=\"x_1\">「我要找對的人問 X」<\/h3>\n<ul>\n<li>看 <a class=\"internal-doc-link\" data-cat=\"02_organization-map\" data-doc=\"02_organization-map--stakeholders\" href=\"#02_organization-map/02_organization-map--stakeholders\">02_organization-map/stakeholders.md<\/a><\/li>\n<li>已準備好的問題:<a class=\"internal-doc-link\" data-cat=\"02_organization-map\" data-doc=\"02_organization-map--coffee-chat-questions\" href=\"#02_organization-map/02_organization-map--coffee-chat-questions\">02_organization-map/coffee-chat-questions.md<\/a><\/li>\n<\/ul>\n<h3 id=\"_3\">「我要做新簡報」<\/h3>\n<ul>\n<li>開 <a class=\"internal-doc-link\" data-cat=\"05_workflows\" data-doc=\"05_workflows--html-presentation-pipeline\" href=\"#05_workflows/05_workflows--html-presentation-pipeline\">05_workflows/html-presentation-pipeline.md<\/a><\/li>\n<li>PPT 路線:套 <code>../MDT_2026_powerpoint_template.pptx<\/code><\/li>\n<li>HTML 路線:套 <code>#5B9BD5 / #4472C4 / #ED7D31<\/code> + Calibri<\/li>\n<\/ul>\n<h3 id=\"brian\">「我要應對 Brian 戰略議題」<\/h3>\n<ul>\n<li><a href=\"04_pm-frameworks/\">04_pm-frameworks/<\/a> 全部讀過一次<\/li>\n<li>關鍵:VMX/BMS 同步翻案 / Beta 模式 / Sunset Plan(舊 Playback 案)<\/li>\n<\/ul>\n<hr/>\n<h2 id=\"_4\">知識更新原則<\/h2>\n<ol>\n<li><strong>新事實 / 校正<\/strong> → 寫進 <a href=\"06_calibration-log/\">06_calibration-log/<\/a>,不要直接改舊文件<\/li>\n<li><strong>新會議洞察<\/strong> → 寫進 <code>../meetings/YYYY-MM-DD_*<\/code> + 把戰略議題抽出到 04 / 06<\/li>\n<li><strong>客戶案 update<\/strong> → 進 <code>../Case_learning/<\/code><\/li>\n<li><strong>Sheet / Jira 變動<\/strong> → 截圖驗證 visible rows,不信 CSV export<\/li>\n<\/ol>\n<p>⚠️ <strong>這個資料夾是 source of truth 的整理層,不是原始資料層<\/strong>。原始資料在 <code>../meetings/<\/code>、<code>../portal_reference/<\/code>、<code>../Case_learning/<\/code>,以及 NotebookLM 線上(notebook id <code>a3aad3ec-ecf3-4468-a0d9-13a6a18359c7<\/code>)。<\/p>\n<hr/>\n<h2 id=\"_5\">版本<\/h2>\n<table>\n<thead>\n<tr>\n<th>日期<\/th>\n<th>變動<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>2026-05-06<\/td>\n<td>初版建立,整合 13 條 Claude memory + Hub 第三 tab + 5/6 Q2 Review 會議洞察<\/td>\n<\/tr>\n<\/tbody>\n<\/table>", "pending_groups": [{"category_id": "01_product-knowledge", "category_name": "產品知識", "category_icon": "🔧", "files": [{"doc_id": "01_product-knowledge--kb-cheatsheet", "filename": "kb-cheatsheet.md", "title": "VMX KB Cheatsheet", "items": [{"line_no": 21, "line": "## KB 待補的區塊(問 Mori / Jimmy)", "keyword": "待補"}]}, {"doc_id": "01_product-knowledge--machines-spec", "filename": "machines-spec.md", "title": "K-series 機種規格", "items": [{"line_no": 46, "line": "## 待補對應(問 Mori)", "keyword": "待補"}, {"line_no": 48, "line": "| 機種 | Chip(待確認) | Tier(待確認) | TOPs(待確認) | RFID(KB) | QR(KB) |", "keyword": "待確認"}, {"line_no": <script>
(function () {
  const data = JSON.parse(document.getElementById("hub-data").textContent);
  const tabsEl    = document.getElementById("tabs");
  const sidebarEl = document.getElementById("sidebar");
  const contentEl = document.getElementById("content");
  const searchEl  = document.getElementById("searchBox");
  const layoutEl  = document.getElementById("layout");
  const toggleEl  = document.getElementById("sidebarToggle");
  const handleEl  = document.getElementById("resizeHandle");

  const PENDING_RE = /(待釐清|待確認|待問|待補|待動作|待對齊|待裁示|TBD|TODO)/g;

  // Pseudo-categories
  const overviewCat = {
    id: "overview", name: "總覽", icon: "🏠",
    docs: [{
      id: "overview-readme",
      filename: "knowledge/README.md",
      title: "Knowledge Base 總覽",
      priority: 0,
      pending_count: 0,
      html: data.overview_html,
    }],
  };
  const pendingCat = { id: "pending", name: "待釐清", icon: "📌", docs: [], isPending: true };
  const allCats = [overviewCat, ...data.categories, pendingCat];

  let activeCatId = allCats[0].id;
  let activeDocId = allCats[0].docs[0] ? allCats[0].docs[0].id : null;

  // ─── Sidebar persistence ───
  const savedW = parseInt(localStorage.getItem("hub-sidebar-w") || "0", 10);
  if (savedW >= 180 && savedW <= 600) {
    document.documentElement.style.setProperty("--sidebar-w", savedW + "px");
  }
  if (localStorage.getItem("hub-sidebar-collapsed") === "1") {
    layoutEl.classList.add("sidebar-collapsed");
  }

  // ─── Helpers ───
  function pendingCount() { return data.pending_total || 0; }
  function categoryCount(cat) { return cat.isPending ? pendingCount() : cat.docs.length; }
  function renderStars(n) { return n ? "★".repeat(n) + "☆".repeat(5 - n) : ""; }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function escapeAttr(s) { return escapeHtml(s); }

  // ─── Tabs ───
  function buildTabs() {
    tabsEl.innerHTML = "";
    allCats.forEach((cat) => {
      const t = document.createElement("div");
      t.className = "tab" + (cat.id === activeCatId ? " active" : "") + (cat.isPending ? " pending-tab" : "");
      const cnt = categoryCount(cat);
      t.innerHTML = `<span class="icon">${cat.icon}</span>${cat.name}` +
        (cnt > 0 ? `<span class="count">${cnt}</span>` : "");
      t.onclick = () => selectCategory(cat.id);
      tabsEl.appendChild(t);
    });
  }

  // ─── Sidebar ───
  function buildSidebar() {
    const cat = allCats.find((c) => c.id === activeCatId);
    if (!cat) { sidebarEl.innerHTML = `<div class="resize-handle" id="resizeHandle"></div>`; return; }

    let inner;
    if (cat.isPending) {
      inner = `<div class="sidebar-header">${cat.icon} ${cat.name}（${pendingCount()} 條)</div><ul>`;
      data.pending_groups.forEach((g) => {
        const total = g.files.reduce((s,f)=>s+f.items.length,0);
        inner += `<li><a class="group-link" data-cat="${g.category_id}" href="#${g.category_id}">
          <span class="row-title"><span class="row-title-text">${g.category_icon} ${escapeHtml(g.category_name)}</span><span class="pending-badge">${total}</span></span>
          <span class="filename">${g.files.length} 檔</span>
        </a></li>`;
      });
      inner += `</ul>`;
    } else {
      inner = `<div class="sidebar-header">${cat.icon} ${cat.name} (${cat.docs.length})</div><ul>`;
      cat.docs.forEach((d) => {
        const stars = d.priority > 0 ? `<span class="stars">${renderStars(d.priority)}</span>` : "";
        const badge = d.pending_count > 0 ? `<span class="pending-badge">${d.pending_count}</span>` : "";
        inner += `
          <li>
            <a href="#${activeCatId}/${d.id}" data-id="${d.id}" class="${d.id === activeDocId ? "active" : ""}" data-title="${escapeAttr(d.title)}" data-filename="${escapeAttr(d.filename)}">
              <span class="row-title">
                <span class="row-title-text">${escapeHtml(d.title)}</span>
                ${stars}${badge}
              </span>
              <span class="filename">${escapeHtml(d.filename)}</span>
            </a>
          </li>`;
      });
      inner += `</ul>`;
    }
    sidebarEl.innerHTML = inner + `<div class="resize-handle" id="resizeHandle"></div>`;

    sidebarEl.querySelectorAll("a[data-id]").forEach((a) => {
      a.onclick = (e) => { e.preventDefault(); selectDoc(a.dataset.id); };
    });
    sidebarEl.querySelectorAll(".group-link").forEach((a) => {
      a.onclick = (e) => { e.preventDefault(); selectCategory(a.dataset.cat); };
    });
    bindResizeHandle();
    applySearchFilter();
  }

  // ─── Content ───
  function buildContent() {
    const cat = allCats.find((c) => c.id === activeCatId);
    if (!cat) { contentEl.innerHTML = `<div class="empty">未選擇分類</div>`; return; }

    if (cat.isPending) { buildPendingContent(); contentEl.scrollTop = 0; return; }

    const doc = cat.docs.find((d) => d.id === activeDocId);
    if (!doc) { contentEl.innerHTML = `<div class="empty">未選擇文件</div>`; return; }

    const stars = doc.priority > 0
      ? `<span class="stars" title="重要性 ${doc.priority}/5">${renderStars(doc.priority)}</span>`
      : "";
    const pendingPill = doc.pending_count > 0 ? `<span class="pending-pill">${doc.pending_count} 待釐清</span>` : "";
    const canBack = navHistory.length > 1;

    contentEl.innerHTML = `
      <article class="doc-wrapper">
        <div class="doc-meta">
          <span class="left">
            <button class="back-btn" id="backBtn" ${canBack ? "" : "disabled"} title="回到上一頁 (Alt+←)">← 上一頁</button>
            ${cat.icon} ${escapeHtml(cat.name)} ${stars} ${pendingPill}
          </span>
          <span class="filename">${escapeHtml(doc.filename)}</span>
        </div>
        <div class="doc-content">${doc.html}</div>
      </article>
    `;
    contentEl.scrollTop = 0;
    bindBackButton();
    bindInternalLinks();
  }

  function buildPendingContent() {
    const canBack = navHistory.length > 1;
    let html = `<div class="pending-page">`;
    html += `
      <div style="margin-bottom:12px"><button class="back-btn" id="backBtn" ${canBack ? "" : "disabled"} title="回到上一頁 (Alt+←)">← 上一頁</button></div>
      <div class="pending-summary">
        共 <strong>${pendingCount()}</strong> 條待釐清項目,
        分布於 ${data.pending_groups.length} 個分類、${data.pending_groups.reduce((s,g)=>s+g.files.length,0)} 個文件中。
        <br><small>關鍵字:待釐清 / 待確認 / 待問 / 待補 / 待動作 / 待對齊 / 待裁示 / TBD / TODO。點檔名跳到原文。</small>
      </div>
    `;
    data.pending_groups.forEach((g) => {
      const groupTotal = g.files.reduce((s, f) => s + f.items.length, 0);
      html += `<section class="pending-group">`;
      html += `<h3>${g.category_icon} ${escapeHtml(g.category_name)} <span class="group-count">${groupTotal}</span></h3>`;
      g.files.forEach((f) => {
        const docHash = `${g.category_id}/${f.doc_id}`;
        html += `<div class="pending-file">`;
        html += `<h4><a href="#${docHash}" class="jump" data-cat="${g.category_id}" data-doc="${f.doc_id}">${escapeHtml(f.title)}</a> <span class="count">${f.items.length}</span> <code>${escapeHtml(f.filename)}</code></h4>`;
        html += `<ul>`;
        f.items.forEach((it) => {
          const escaped = escapeHtml(it.line).replace(PENDING_RE, "<mark>$1</mark>");
          html += `<li><span class="ln">L${it.line_no}</span>${escaped}</li>`;
        });
        html += `</ul></div>`;
      });
      html += `</section>`;
    });
    if (pendingCount() === 0) html += `<div class="empty">🎉 沒有待釐清項目</div>`;
    html += `</div>`;
    contentEl.innerHTML = html;
    contentEl.querySelectorAll("a.jump").forEach((a) => {
      a.onclick = (e) => { e.preventDefault(); selectCatDoc(a.dataset.cat, a.dataset.doc); };
    });
    bindBackButton();
  }

  // ─── Click handler for internal .md links rewritten by the build ───
  function bindInternalLinks() {
    contentEl.querySelectorAll("a.internal-doc-link").forEach((a) => {
      a.onclick = (e) => {
        e.preventDefault();
        const cat = a.dataset.cat;
        const doc = a.dataset.doc;
        if (cat && doc) selectCatDoc(cat, doc);
      };
    });
  }

  // ─── Back button ───
  const navHistory = []; // stack of {catId, docId}
  function pushHistory() {
    const top = navHistory[navHistory.length - 1];
    if (top && top.catId === activeCatId && top.docId === activeDocId) return;
    navHistory.push({ catId: activeCatId, docId: activeDocId });
    if (navHistory.length > 100) navHistory.shift();
  }
  function bindBackButton() {
    const btn = document.getElementById("backBtn");
    if (btn) btn.onclick = goBack;
  }
  function goBack() {
    if (navHistory.length < 2) return;
    navHistory.pop();              // remove current
    const prev = navHistory[navHistory.length - 1];
    activeCatId = prev.catId;
    activeDocId = prev.docId;
    syncHash();
    buildTabs(); buildSidebar(); buildContent();
  }

  // ─── Routing ───
  function syncHash() {
    const cat = allCats.find((c) => c.id === activeCatId);
    if (cat && cat.isPending) location.hash = activeCatId;
    else location.hash = `${activeCatId}/${activeDocId || ""}`;
  }
  function selectCategory(catId) {
    activeCatId = catId;
    const cat = allCats.find((c) => c.id === activeCatId);
    activeDocId = (cat && !cat.isPending && cat.docs[0]) ? cat.docs[0].id : null;
    pushHistory();
    syncHash();
    buildTabs(); buildSidebar(); buildContent();
  }
  function selectDoc(docId) {
    activeDocId = docId;
    pushHistory();
    syncHash();
    buildSidebar(); buildContent();
  }
  function selectCatDoc(catId, docId) {
    activeCatId = catId;
    activeDocId = docId;
    pushHistory();
    syncHash();
    buildTabs(); buildSidebar(); buildContent();
  }

  function applySearchFilter() {
    const q = (searchEl.value || "").trim().toLowerCase();
    sidebarEl.querySelectorAll("li").forEach((li) => {
      const a = li.querySelector("a");
      if (!a) return;
      const haystack = ((a.dataset.title || "") + " " + (a.dataset.filename || "") + " " + a.textContent).toLowerCase();
      li.classList.toggle("hidden", !!q && haystack.indexOf(q) === -1);
    });
  }

  function fromHash(initial) {
    const h = location.hash.replace(/^#/, "");
    if (!h) return;
    const [catId, docId] = h.split("/");
    const cat = allCats.find((c) => c.id === catId);
    if (!cat) return;
    activeCatId = cat.id;
    if (cat.isPending) { activeDocId = null; return; }
    if (docId) {
      const doc = cat.docs.find((d) => d.id === docId);
      if (doc) activeDocId = doc.id;
    } else {
      activeDocId = cat.docs[0] ? cat.docs[0].id : null;
    }
  }

  // ─── Sidebar resize ───
  function bindResizeHandle() {
    const handle = document.getElementById("resizeHandle");
    if (!handle) return;
    handle.addEventListener("mousedown", (e) => {
      e.preventDefault();
      handle.classList.add("dragging");
      document.body.classList.add("resizing");
      const startX = e.clientX;
      const startW = sidebarEl.getBoundingClientRect().width;
      function onMove(ev) {
        let w = startW + (ev.clientX - startX);
        w = Math.max(180, Math.min(600, w));
        document.documentElement.style.setProperty("--sidebar-w", w + "px");
      }
      function onUp() {
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        handle.classList.remove("dragging");
        document.body.classList.remove("resizing");
        const finalW = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--sidebar-w"), 10);
        if (finalW) localStorage.setItem("hub-sidebar-w", String(finalW));
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  }

  // ─── Sidebar toggle ───
  toggleEl.onclick = () => {
    layoutEl.classList.toggle("sidebar-collapsed");
    localStorage.setItem("hub-sidebar-collapsed", layoutEl.classList.contains("sidebar-collapsed") ? "1" : "0");
  };

  // ─── Init ───
  fromHash(true);
  pushHistory();
  buildTabs();
  buildSidebar();
  buildContent();

  searchEl.addEventListener("input", applySearchFilter);
  window.addEventListener("hashchange", () => {
    fromHash(false);
    pushHistory();
    buildTabs(); buildSidebar(); buildContent();
  });

  document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    // Ctrl+B → toggle sidebar
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "b") {
      e.preventDefault();
      toggleEl.click();
      return;
    }
    // Alt+← → back
    if (e.altKey && e.key === "ArrowLeft") {
      e.preventDefault();
      goBack();
      return;
    }
    const n = parseInt(e.key, 10);
    if (n >= 1 && n <= allCats.length) selectCategory(allCats[n - 1].id);
  });
})();
</script>

</body>
</html>
