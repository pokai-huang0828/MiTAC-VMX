          "id": "01_product-knowledge--safety-score",

          "last_updated": "2026-05-07",
          "text": "VisionMax Driver Scorecard / Safety Score 來源:KB「VisionMax Driver Scorecard」(2026-05-06 deep read)\n用途:對客戶 demo Safety Score / Coaching 必背 啟用條件 Driver profile 已建 Driver 已 log in/out 車輛 Score 計算需累積 > 5,000 km 駕駛距離 計分機制 初始 每個 driver 起始 Safety Score = 100 計分基於 Sensor-detected events (impact / harsh driving) AI-detected events (ADAS / DMS) Speeding events 規則 各 event type 有 specific weighting( 可調 ) 事件越多分數越低 只看 最近 5,000 km 的事件(滾動視窗) 公式(KB 揭露,2026-05-07 補完整) Safety Score = (1 − (∑ Trip score) / 5000) × 100\n\nTrip score    = TRUNCATE((Event Score × 70 / 100) + (Overspeed Score × 30 / 100), 2)\nEvent Score   = Event Score × Weight\nOverspeed Score = (Cumulative distance of Overspeed / Trip distance) × 100 重點 :\n- Event 與 Overspeed 是 70 / 30 加權\n- Event Score 還會再乘上 per-event-type weighting(各事件可調)\n- Overspeed 用「 超速距離 / 行程距離 」百分比,不是次數\n- 整體分數是 5,000 km 滾動視窗 累積 trip score 的反向(扣越多分越低) 對 PM 議題的對應 對應 sheet #186 Safety Score at vehicle level instead of by driver (Simon, VMX-7151 ) 客戶要的是「車輛層級」(not driver) — KB 明確是 driver-based 可能要 fork 一套新邏輯 / 新 weighting 對應 #164 Modify Safety Reports( VMX-7083 )— PDF 報表內容跟網頁顯示不一致 對應「事件 weighting 可調」 → Brian 同步戰略想開放 fleet 改 客戶口徑 「Safety Score 從 100 起算,基於 sensor / AI / speeding 三類事件加權扣分,只看最近 5,000 km 的滾動視窗。各事件 weighting 在內部維護,目前 fleet manager 不能改。」(對應 KB「Threshold not customizable」) 待釐清(Coffee Chat) 完整公式(KB 截斷) 各事件 weighting 具體值(不對外公開但 PM 內部要知道) Vehicle level Safety Score 跟 driver level 怎麼整合( VMX-7151 議題)"
        },

          "last_updated": "2026-05-06",
          "text": "Sales-Level FAQ — 對外口徑(KB 已 deep read) 來源:KB General > FAQ + Master Portal,2026-05-06 Kenny + Claude 完整深讀\n用法:對客戶 RFP / Deep Dive / Demo 直接拿這層用, KB 已驗證 ⭐ KB 確定的對外答案(8 題核心) Q1. What ADAS and DMS features do you support? KB 答案 :\n- ADAS :LDWS, FCWS, Tailgating, Rolling Stop , Stop & Go, Speed Sign (in development) - DMS :Distraction, Fatigue, Phone Usage, Unfastened Seatbelt, Lens Covered, Smoking (in development) ⚠️ 校正以前 memory:\n- ADAS 完整清單比 memory 多 1 個(Rolling Stop 已 ship)\n- Speed Sign 是 (in development) ,不是 Premium tier 2027\n- Smoking 是 (in development) ,memory 之前說「KB 沒寫」是錯的 Q2. How mature is your AI model? KB 答案 (直接背):\n- Device-Side (Local) AI: 75% to 80% accuracy - Server-Side (Cloud) AI: 90% to 95% accuracy for Unfastened Seatbelt and Phone Use Detection ⚠️ Sensitivity dial 估計值(Low 0.85 / Med 0.70 / High 0.55)是 confidence threshold per event,跟 overall accuracy 不同。 Q3. How long are videos and data stored? KB 答案 : 180 days standard retention for all videos and associated data. Q4. How often do you update your AI model? KB 答案 :\n- Dataset refreshed monthly in cloud\n- Models updated quarterly - New features added as available ⚠️ MiAI Roadmap Slide 6 講「月節奏 collect→filter→label→train→validate→deploy」是內部 cycle, 對外用 KB 的 quarterly model update 。 Q5. Are AI models processed locally or in the cloud? KB 答案 :\n- 「Local + secondary cloud analysis」hybrid 架構\n- Cloud secondary 用於 Unfastened Seatbelt + Phone Use, > 90% accuracy - 對應 Roadmap Slide 5 Stage 1+2(Edge AI + Server AI) Q6. Can thresholds and alerts be customized? KB 答案 :\n- ✅ Voice alerts can be customized\n- ❌ AI thresholds NOT currently open for customers to modify ⚠️ Brian 同步戰略翻案目標就是改這個,但 KB 對外目前還是 NOT open 。 Q7. Can we white label the platform? KB 答案 :✅ Yes - fully functional White Label solution\n- Brand Integration : Replace VisionMax logo with partner brand\n- Domain & URL : Custom domain (visionmaxfleet.com → partnerfleet.com)\n- 強調:no lengthy dev cycle, instant access Q8. What’s the difference between Device Portal and Fleet Portal? KB 答案 :\n- Device Management (Master Portal) :Hardware-focused — Inventory / Health monitoring / Storage / OTA push\n- Unified Fleet Intelligence (Fleet Portal) :Fleet data — Live View / Event Reports / Safety Analytics / Driver Coaching\n- 一句話:「One manages hardware, the other analyzes fleet performance」 ⭐ Master Portal 完整能力(KB:What can I do in Master portal?) Administrative operations:\n1. Create / edit / remove fleets\n2. Add devices manually or batch import + assign to fleets / Edit / remove\n3. Modify plan types\n4. View health status report — devices connected ≥1 + uploaded health\n5. View specific device health status\n6. Manage fleet manager’s accounts\n7. Trend chart — fleet size + plan types over time\n8. Push OTA updates : camera app / base + region images / MiDM client / MiDM system app / map data\n9. Access : camera app SDK doc / MiAI SDK API doc / web API doc ⭐ 對技術型客戶必殺 Batch OTA SOP(KB) Management → Inventory → 全選 fleet 設備或多選 → 點 “Update” 推 OTA ⭐ Vehicle Classification(KB:How are passenger / medium / heavy defined) Class 類型 重量(lbs) 例子 1-3 Passenger / Light Duty 6,000 - 14,000 Pickup trucks 4-6 Medium Duty 14,001 - 26,000 Delivery vans 7-8 Heavy Duty > 26,001 Long-haul, construction 不同 class 有 specific height + AI parameters VisionMax 開發了 3 種 height + AI param settings 技術人員需測量實際安裝高度(對應 HAWK-501 Camera height 不穩定 ticket) ⭐ Privacy Mode(KB:Behaviour of Privacy Mode in VisionMax) 進入 :Press and hold Panic Button > 2 秒 進入後 : 停止上傳 health / GPS / photo / video AI + sensor event detection 暫停 SD 錄影暫停 ⚠️ Manual Event Button 按下時 camera 仍會錄 退出 :Panic Button hold > 2 秒 Restart :Privacy Mode 維持(不會自動退出) ⚠️ 與 memory 衝突 :memory 校正過「紅色按鍵沒有 panic event」,但 KB 講 Panic Button 用於 Privacy Mode。可能是兩個不同按鈕(Manual Event vs Panic) — Coffee Chat 必問 Mori。 ⭐ Manual Event Button(KB:Manual Event Button Behaviors) 場景 動作 行為 語音 ACC ON / 來電 短按 接電話 — ACC ON / 來電 hold > 2s 拒接 — ACC ON / 無來電 短按 Manual event recording “Manual Event Recording” ACC ON / 無來電 hold 2-6s Call out to server — ACC ON / 無來電 long press +3s Back to base call — ACC OFF / Clean install 短按 / hold > 1s 開機 “Device Ready” ACC OFF / ACC mode 短按 Manual event recording “Manual Event Recording” ACC OFF hold 10-30s 格式化 SD card “SD Card formatting, please wait” ⚠️ Private mode 中,接電話 + Manual event 不執行(其他仍可) ⭐ K-series 機種差異(KB:Driver Identification Setup, 第一個 KB 確認的機種 mapping ) 機種 RFID 卡 QR Code K245 ✅ ✅ K245C ✅ ✅ K265 ✅ ✅ K220 ❌ ✅(QR only) K145 / K145c (with i25) ❌ ❌ → K220 不支援 RFID,K145 / K145c 連 QR 都不行(有 i25 才行) 客戶答題 SOP(KB-first) 客戶問 → 翻 KB(這層) KB 沒答案 → 不要編,改:「Roadmap planned, 我內部確認後 24h 內回覆」 KB vs Roadmap 衝突 → 用 Roadmap 對外 + 標「上線時間請我內部確認」 內部數字(threshold / fps / 容量)→ 用 KB,不要從 NotebookLM 推測 仍要 Coffee Chat 釐清 Mori: 紅色按鍵 = Manual Event Button or Panic Button?各機種幾個 button? (KB 兩篇有衝突) Mori:K-series 各 chip 對應 tier Mori:各車種 threshold 具體值 Brian:VMX/BMS 同步戰略時程 + 對 Q6「threshold not customizable」何時翻案 Brian:white label 客戶誰用過(Suvio 案?)"

          "text": "承諾層次框架(Commit Framework) Kenny 自萃取自 Platform Science / CONNECTSOURCE 兩案的 PM 框架 核心命題 研發 PM 不是承諾「結果」,是承諾「透明度」 。 「七月到的時候,客戶不會是第一個知道『做不到』的人。」 4 層承諾 類型 範例 風險 適用 功能上線日期 「七月上線」 高 研發確定性極高才用 里程碑節點 「六月底給你 MVP 評估結果」 中 階段評估 / 測試版 評估時程 「兩週內告訴你能不能做」 低 需求確認初期 資訊更新頻率 「每月底給進度更新」 極低 任何時期都可承諾 金句 信任不是來自準時,是來自事先預警 。 同樣是延兩個月:\n- ✅ 事先預警 → 建立信任\n- ❌ 事後才說 → 摧毀信任 應用到 VMX 實際情境 對 Vinicius(Platform Science) 不講「Custom SDK 七月上線」(高風險) 講「兩週內告訴你 SDK 文件齊全度」(低風險)+「每月底我會給進度」(極低風險) 對 BMS Smartlink 不講「Yawning Q2 上」(高風險,內部測試還不過) 講「Yawning 進入 user TR 階段我們會立刻 sync 給你」(里程碑,中風險) 對 HDFE UI 抱怨(2026-05-06 會議) 不講「九月底正式 deprecate 舊版」(高風險,客戶會抗拒) 用 sunset 流程:Q2 預告 + GA 追蹤 + Q3 9月底正式移除(里程碑 + 資訊更新組合) 跟 KB / Sheet / Roadmap 三層真相關係 三層真相 = 誰看到什麼版本 (空間維度) 承諾層次 = 用什麼語法承諾 (語言維度) 兩者互補"

          "text": "4 條核心 PM 原則 Kenny 自萃取自 Platform Science / CONNECTSOURCE 兩案 🔍 1. 讀懂需求背後的動機 Wendy 說「功能何時出」→ 真正在意「我在客戶面前的可信度」 Vinicius 說「需要 SDK 文件」→ 真正在測「MiTAC 值不值得深度合作」 回應動機,不只回應表面問題 。 🔄 2. 你的工作是「讓事情不卡住」 具體空白地帶(全部該 PM 主動介入): 真實的 PM 介入空間(2026-05-06 後校正) 空白地帶 為什麼是真機會 切入點 #154 Label 管理 process gap Brian 自評 filter 漏 pick 提 Q2 merge label sweep Sheet ↔ Jira 雙向同步缺口 兩個方向都有 mismatch 每兩週 sweep K265 白名單沒 owner Vinicius 案卡點 推 owner Passenger Blurring 可行性沒結論 CONNECTSOURCE 案 推結論 + Roadmap 對齊 路線圖會議沒人約 Wendy 案 主動發起季度 roadmap sync 「任務完成主動通知」UI 機制缺 模糊功能 / Demand request 跟 Lucy 提 ⚠️ 不要扛 AI sheet hidden row (那是團隊已決定不做,2026-05-05 校正)。 💬 3. PM 是「商業翻譯」 技術成本 → 業務語言 例: $700/月 AWS 成本 對工程師是基礎設施,對業務是定價變數,對 PM 是要翻譯清楚的橋樑 例:200 Hz G-Sensor 韌體可行性 → 對 Sales 可講「客戶 must-have, 工程在做韌體 study」 業務機會 → 產品優先順序的依據 例:HDFE UI 抱怨 → 不只是「個別客戶問題」, 是「未來重大變更要做 beta 模式」的機會 📅 4. 每次互動要有明確的 Next Step + Owner + Timeline 不能停在「我們再看看」或「到時候再說」。 Template 「下一步:[行動] / 由 [人] / 在 [時間前] 完成。我會在 [check-in 時間點] 跟你 sync 進度。」 例 ❌「Yawning 的事情我們再討論」 ✅「Yawning user TR 開放 / Jieli + Lucy 協作 UI / 兩週內。我下週四 sync 你 user TR 結果。」"

          "text": "內部溝通斷層 源自 Wendy 案 + 2026-05-06 Sheet/Jira 同步缺口發現 業務端不滿的根因表 業務感受 根因 PM 解法 「不知道功能什麼時候出」 產品端沒主動輸出 roadmap 建立定期 roadmap sync(每季) 「不知道能否承諾」 承諾層次太粗,沒里程碑 提供「確認日期」而非「上線日期」 「功能說好有,但用不了」 原型 ≠ 可交付,差異未傳達 早期清楚說就緒條件 「感覺被蒙在鼓裡」 無常態資訊流,只有被動回應 主動推播, 沒進展也要說 核心洞察 業務端的不滿通常是資訊不對稱,不是情緒問題 。 PM 有責任主動輸出資訊,即使功能沒進展,也要讓業務端知道「我們知道、目前狀態是 X」。 Sheet ↔ Jira 雙向同步缺口(2026-05-06 發現) PM 角色升級成「Sheet/Jira sync owner」,要處理兩個方向的落差: 方向 1:Sheet 落後 Jira(Jira 已關 Sheet 沒改) 例: VMX-6754 / 7029 / 7161 / 7162 — 5/6 Q2 Review 前 業務端看 Sheet 以為「拖了 7 個月」,實際 RD 已交付 方向 2:Sheet 領先 Jira(口頭說完成,Jira 沒 close) 例: VMX-7082 / 7233 / 6782 — 5/6 Q2 Review 後新生成 「我做完了」≠ Jira ticket transition PM 介入動作 每兩週做一次 Sheet × Jira sweep:\n1. 撈 Sheet 顯示 In Process 的 ticket\n2. 比對 Jira 真實狀態\n3. 兩個方向 mismatch 都私訊 owner 確認\n4. 同步後在 Sheet 加 sweep 紀錄 → 這就是評估期 PM 真實的「沒人扛 = 我來扛」入口。 對應到 VMX 內部具體案件 案件 業務端感受 PM 解法 #11 OTA 17 個月 Brian 自己提 看似 stale 不是內部問題,Akamai 設定錯,Brian 自己不在意 Yawning(對外 Roadmap 已有 vs 內部測試中) 客戶以為已 ship 對外口徑統一改「Roadmap planned」/ 5/7 補:UI toggle 對應 VMX-7432 (Lucy) Smoking(KB 標 in development / Sheet 隱藏 / Roadmap 列) 業務不確定能否賣 給 sales 統一口徑「KB 列開發中」(KB 有官方依據) #154 Server AI( VMX-6722 ) API 沒釋出 5/7 校正:不是 label 漏 pick,是 transition discipline gap — RD 寫 deploy comment 但沒按 Open→Resolved button。對 Brian 提改善從「transition 紀律」切入 Lens Cover 雙軌維護(5/7) 客戶規格分歧 對 Azuga 講「標準版解除車速」,對 BMS 講「車速 > 0」 — 別混 Eating 17x 客訴 ID 6652(5/7) BMS 客訴爆炸 對外 Roadmap 維持 2027,對 BMS 講 6/15 緊急重訓進度 ✅ Wendy = wendy.hammond / MiTAC AU(2026-05-08 解密) Wendy 是 Hub 第三 tab「資訊不對稱框架原型」對應的真實人物。 項目 值 全名 wendy.hammond Email wendy.hammond@mitac.com.au 部門 MiTAC AU(澳洲) — 跟 Cary Lo 同部門 角色 業務 / 客戶代表(代 reseller 客戶端傳達需求) 案件 PASSENGER BLURRING / 跨 reseller feature reuse 訴求 「conception stage 早期介入,save work 給 regional teams」(5/5 信原話) 她的案 = 「資訊不對稱框架原型」最完整體現 :外部 stakeholder 只能在 feature 已 ship 後才知道,要從事後告知改成早期介入。Brian 5/4 回應提供 Sheet + AI Roadmap doc sync 入口,屬於「結構性解法」而非個案處理。 詳見 stakeholders.md MiTAC AU 列 + memory reference_wendy_hammond_identity.md 。"

          "text": "重大 UI 變更管理框架 源自 2026-05-06 Q2 Review 會議:HDFE 抱怨 + 舊 Playback Sunset Plan Brian 引入的 Beta 模式 「未來重大變更時可以考慮 BT(beta)期 — 像 AWS、Box、Atlassian 都是先告訴你新介面試用,給你時間,再正式 deprecate。」 — Brian 2026-05-06 對應 Kenny 承諾層次框架 變更類型 承諾風險 解法 強制日期切換 高風險 不建議 beta period + 切換按鈕 中風險 ✅ Brian 想引入 紅色預告 + GA 追蹤 + 漸進式 sunset 低風險 ✅ 已在做(舊 Playback) 純資訊更新 極低風險 任何時期都可 4 階段標準 Sunset SOP(從舊 Playback 案萃取) Stage 1:GA 追蹤期(觀察) 埋 GA 看誰在用 觀察至少一個月 (時間太短沒意義) 不只看 page view,要看 visitor / device / browser Stage 2:預告期(資訊更新層) 在頁面上加紅色預告 / 驚嘆號 寫具體日期(不是「即將不再維護」) 範例:「此功能將於 2026-09-30 終止支援」 Stage 3:Beta period(中風險承諾層) 提供「新版 / 舊版切換」按鈕 4 個月 grace period(現在 → 9月底) 用戶有選擇權 Stage 4:正式 deprecate(高風險承諾層) 跳 alert 引導到新介面 舊頁面下線 已在跑的 Sunset 案例(VMX 內) 功能 預告日 正式下線 Stage 舊 Playback 頁面(#135 / #147 / #182 / VMX-7132 ) Q2 2026-05 Q3 2026-09-30 Stage 2-3 之間 客戶溝通 template 對抱怨「不習慣」的客戶(像 HDFE): ❌ 「新介面比較好,習慣就好了」 ✅ 「我聽到你的 feedback。 這個變更我們確實該提供 transition 期 ,我會跟產品確認能否給你切換按鈕。同時你能告訴我哪些操作具體變難嗎?(滑鼠次數 / 找事件 / 篩選)我整理後給 owner」 → 對應 4 條核心原則:\n1. 讀懂動機(他要可信度,不只是 UI)\n2. 讓事情不卡住(主動推 toggle 提案)\n3. 商業翻譯(把 UX 痛點翻成產品 task)\n4. Next Step + Owner + Timeline"

          "text": "MDT 2026 PowerPoint Template SOP 路徑: ../../MDT_2026_powerpoint_template.pptx (5.96 MB)\n2026-05-05 起所有報告基底 規格 尺寸: 16:9 (13.33 × 7.50 inch) 字型: Calibri Light (major)/ Calibri (minor)/ 新細明體(TC) 6 layouts(內含 sample slide,可刪) 6 個 Layout idx 名稱 用途 主要 placeholder 0 Title Slide 封面 Title(2 行 OK)/ Subtitle 1 Breakpage 章節分隔 Title + 多層 bullet 2 Title and Content 01 純文字內頁 Header + bullet 內文 3 Title and Content 02 內頁 + 物件 Page Title + 段落 4 Title and Content 03 滿版物件 整片內容區 5 Thank You Slide 結尾 (純視覺) 色票(theme accents) 名稱 色碼 用途 accent1 #5B9BD5 主藍 accent5 #4472C4 深藍 accent2 #ED7D31 橘(強調 / CTA) accent3 #A5A5A5 灰 accent4 #FFC000 金 accent6 #70AD47 綠 python-pptx 拷模板程式 from pptx import Presentation # 拿模板當底 p = Presentation ( 'MDT_2026_powerpoint_template.pptx' ) # (選擇)模板已有 6 張 sample slide,可全部刪掉 xml_slides = p . slides . _sldIdLst slides = list ( xml_slides ) for slide in slides : xml_slides . remove ( slide ) # 加新 slide(用 layout 0 = Title Slide) slide = p . slides . add_slide ( p . slide_layouts [ 0 ]) slide . placeholders [ 0 ] . text = '我的主題' slide . placeholders [ 1 ] . text = '副標題' # 加內頁(layout 2 = Title and Content 01) slide = p . slides . add_slide ( p . slide_layouts [ 2 ]) slide . placeholders [ 0 ] . text = '章節標題' slide . placeholders [ 1 ] . text = '內文 bullet 1 \\n 內文 bullet 2' p . save ( 'output.pptx' ) 直接手動編輯 SOP 拷貝 MDT_2026_powerpoint_template.pptx 改名(例: Q2-Review.pptx ) PowerPoint 開啟 刪掉 6 張 sample slide 新增投影片時選對應 layout (右鍵 → 新增投影片 → 選 layout) 文字內容直接編輯 placeholder, 不要動字型 / 顏色 (讓 theme 跑) 儲存 何時用 .pptx vs HTML 用途 .pptx HTML 給主管看 / 內部會議 ✅(熟悉) △ 客戶現場 demo △ ✅(更專業) 海外客戶 △ ✅(連結即看) 內部知識整理 △ ✅ 含複雜動畫 ❌ ✅ 需要列印 ✅ △(要 export PDF)"

          "text": "Customer Onboarding SOP(裝相機 → 配置 → 上線) 來源:KB Quick Start Guide / Camera Install Position / APN Setting / How to Add Device + Account\n用途:海外客戶 / 新 fleet 客戶 onboarding 整體流程 1. Master Portal 註冊 master account\n   ↓\n2. Master Portal 加 device 到 inventory\n   ↓\n3. Master Portal 創 fleet + 把 device 分到 fleet\n   ↓\n4. Master Portal 創 fleet manager account(+ Viewer Only Role 待釐清)\n   ↓\n5. 技術人員到車上裝相機(VisionAgent app)\n   ↓\n6. APN 設定(if SIM 不通)\n   ↓\n7. Camera Install Position 確認(VisionAgent live view)\n   ↓\n8. ignition on → 等 calibration → \"Calibration Completed\"\n   ↓\n9. Driver Profile 創 + RFID/QR 卡發放\n   ↓\n10. Driver tap 卡 → trip 開始 → 上線 Step-by-step 1. Master 加 Device(KB:How do I add a new device) Login Master Portal Management → Inventory New Device(individual 或 import CSV) ⚠️ Only master admin 可加 — fleet admin 不行 2. Assign Device to Fleet Inventory 選 device → assign 到 fleet 設備 power on + 連網後開始 reporting 3. 加 Fleet Manager Account(KB:How to Add New Account) Master Portal → Management → User Account 新增 4. 裝相機 — VisionAgent(KB:How to Check Camera Install Position) 前置 :VisionAgent app(iOS / Android)+ smartphone WiFi 連 device hotspot Outward Camera 設定 :\n- 車輛停 level ground\n- 相機 view parallel to ground\n- Ground:Sky = 50:50 - 矩形框內是 ADAS engine 處理區 → 確保 unobstructed view Inward Camera 設定 :\n- 設 Driver Location: Right (RHD) / Left (LHD) - Camera Location:選 A / B(具體選法看 KB 圖)\n- DMS 需 clear view of driver’s face 5. APN 設定(KB:How do I set APN through VisionAgent) 何時要做 :Telecom APN setting 導致網路失敗時 SOP:\n1. VisionAgent → Search Dashcam → 確認 CDR # match\n2. Save + Yes(連 device WiFi)\n3. Home → SIM → setting screen\n4. Enter APN info → Save Changes\n5. Verify → OK\n6. Diagnostics → 看 APN saved + online 狀態\n7. Disconnect 6. Driver Identification 設定 機種能力 :\n- K245 / K245C / K265:RFID + QR\n- K220:QR only\n- K145(c) with i25:都不行 SOP (KB:Driver Identification Setup):\n- VisionMax → Management → Driver → + New Driver\n- 輸入 IC Card S/N(RFID 號)+ name + photo + employee ID\n- 完成後,trip 開始時相機說「Please tap your ID card」/「Please scan your ID QR code」\n- Driver tap NFC 或 scan QR(in-cabin camera 前 3 秒內) 7. 第一次 Calibration 開車到開放路段 ADAS: 30 km/h × 3 分鐘 + 平坦少彎 DMS:20 km/h × 15 秒 + 司機臉穩定 完成語音:”Calibration Completed” 8. 健康檢查 Master Portal :Management → Diagnostics\n- 看 device 「Has Issue」狀態\n- Issue Type:Location Function / Sensor Events Detection / 等\n- KB Diagnostics 文章有詳細 Q&A 常見 Onboarding 卡點 問題 KB 對應文章 解法 Camera 不開 Troubleshooting > 沒開機 檢查電源 / fuse / 手動 ignition switch Network 不通 VisionAgent > APN 設 APN Calibration 失敗 (vehicle classification / camera height) 確認 vehicle class + height settings Driver 卡讀不到 Using camera > NFC 對齊 NFC symbol / 換 supported card 格式 ADAS Failure Diagnostics + 30km/h × 3min 看 GPS / 速度條件 / camera 高度 對應 PM 議題 Vinicius (Platform Science) 案的 K265 white-list 卡點 — 可能是 onboarding step 2 (assign to fleet)沒推 owner Connect Source Passenger Blurring 跟 onboarding 無關,是 feature Quantatec obstruction :VisionAgent 可看 inward camera blocked 警示"

          "text": "Sheet × Jira Sync Sweeper SOP Kenny PM 角色升級:每兩週做 Sheet × Jira 雙向 sync。\n起源:2026-05-05 抓出 Sheet stale → 2026-05-06 會議直接落地 4 件同步 → 但又生出 3 個新 mismatch。 為什麼要做這件事 業務端的不滿通常是資訊不對稱:\n- 方向 1:Sheet 落後 Jira (Jira 已 close,Sheet 沒改)→ 業務以為「PM/RD 拖延」\n- 方向 2:Sheet 領先 Jira (口頭說完成,Jira 沒 close)→ 看 Jira 以為「沒做完」 PM 是商業翻譯,要消除這層不對稱。 雙週 Sweeper SOP(每兩週執行一次) Step 1:撈 Sheet 真實 visible rows 開 https://docs.google.com/spreadsheets/d/1DXCf8vU7ZrtzVdMEPSxHgmDb7cPKJFDK/edit 用截圖,不要用 CSV export (CSV 會把 hidden row 一起拉) 看右下角「已顯示 X 列(共 Y 列)」確認 visible 數 Status 欄 filter 顯示 In Process / Discussion / Pending / Feasibility Step 2:抓出每筆 visible row 的 Jira link Step 3:批量驗證 Jira 真實狀態 用 Chrome MCP 或手動點開 重點看: Status (Open / In Progress / Resolved / Closed)+ Resolution (Unresolved / Fixed) Step 4:整理兩個方向的 mismatch Sheet Jira 方向 動作 In Process Resolved Sheet 落後 私訊 owner 確認後改 sheet status Resolved Open Sheet 領先 私訊 owner 提醒 transition Jira Discussion In Progress Sheet 慢一拍 同步 sheet Step 5:私訊 owner(分人,別丟群組) Template: 「Hi [Owner],我在做雙週 sheet sync 發現 [#XXX, VMX-XXXX]:\n- Sheet 顯示:[status]\n- Jira 顯示:[status] 是不是 [推測:已交付但 ticket 沒 transition / 還在做但 sheet 改太快]?要不要一起對齊一下?」 Step 6:更新 sheet + 在 sheet 加 sweep 紀錄 在 Discussion Note 欄加註: 5/X PM sync - Jira status: [X] 已知歷史 mismatch 紀錄 2026-05-05 抓出(會議前)— Sheet 落後 # Jira Sheet Jira 結果 162 VMX-6754 In Process Resolved 5/6 同步 ✅ 165 VMX-7029 In Process Resolved 5/6 同步 ✅ 187 VMX-7161 In Process Resolved 5/6 同步 ✅ 188 VMX-7162 In Process Resolved 5/6 同步 ✅ 2026-05-06 抓出(會議後)— Sheet 領先 # Jira Sheet Jira 結果 180 VMX-7082 Resolved New ⏳ 待私訊 Lucy 195 VMX-7233 Resolved New ⏳ 待私訊 Internal 199 VMX-6782 Resolved Open ⏳ 待私訊 joe.lien 2026-05-06 Sheet link 錯誤 # Sheet 寫 真實應該是 194 IOSix dongle VMX-7316 (實為 AZUGA SmartLink) (待釐清) 197 UVC integration VMX-7224 + VMX-7147 (實為 Camera recording bug) 移除 VMX-7147 209 Viewer only VMX-7407 (重複) 應為 VMX-7088 工具命令 用 Python + Chrome MCP 批量驗證(已驗證可用) # 從 sheet visible rows 抓出 jira list,批量檢查 tickets = [ 'VMX-6754' , 'VMX-7029' , ... ] for t in tickets : # navigate to https://jira.navman.co.nz/jira/browse/{t} # find Status field # log result → 可批量自動化,我用過 22 票一次過。 何時做 Off-cycle sweep 大會議前 1 天(會議當天才動會被打臉) 客戶 demo 前 跟 Brian 1on1 前"

          "id": "05_workflows--troubleshooting",
          "filename": "troubleshooting.md",
          "title": "Troubleshooting Checklist(對 fleet manager / 技術人員)",
          "priority": 4,
          "pending_count": 0,
          "last_updated": "2026-05-06",
          "text": "Troubleshooting Checklist(對 fleet manager / 技術人員) 來源:KB Troubleshooting + Diagnostics + 各機種 LED Behaviors(2026-05-06 deep read) 客戶報修第一層 checklist Q1. 設備沒開機 KB 線索 :\n- LED 紅燈 60 秒以上閃 = camera 沒在錄 / 即將關機\n- 數分鐘內會 shut down 檢查 :\n- 電源連接 / ignition line(loose contact)\n- 保險絲(power line)\n- Manual ignition switch(部分版本有,要 ON) Q2. GPS Function 失效(導致 ADAS / DMS 都不偵測) KB Diagnostic Q1 :Location Function — GPS 10 分鐘沒訊號 影響 :不能建 trip / 不能偵測 ADAS / DMS / 不能記錄 video 位置 Solution :確保車輛在 open area,GPS 收得到 Q3. ADAS 觸發失敗(常見!) 症狀 : \"Can't detect the road level, ADAS off\" 語音 真因 1 :速度沒滿足 30 km/h × 3 分鐘 + 平坦少彎 真因 2 :Camera height 設錯(車種不對應) 真因 3 :GPS 失效(連帶) Solution :\n- 開出市區到高速公路維持速度\n- Master Portal Diagnostics 看 ADAS AI Health\n- 確認 Vehicle Class 設對(passenger/medium/heavy) Q4. Sensor Events 不觸發 KB Diagnostic Q2 :Sensor Events Detection 失敗 Solution :檢查 device 安裝是否正確 Q5. SD card 找不到 / 錯誤 KB :\n- 「No SD Card」語音 — 沒插\n- 「SD Card Error」語音 — 讀寫錯誤\n- 紅燈每 15 秒閃一次(K220/K245/K265) Solution :\n- 插 SD card / 換 SD card\n- KB「SD Card Overwriting Mechanism」 — 看是否容量問題\n- 紅色按鍵 hold 10-30s 重格式化( \"SD Card formatting, please wait\" ) Q6. Network / APN 不通 KB :K265 orange LED 常亮 = 沒網路 Solution :VisionAgent app → 設 APN(海外 SIM 常見) Q7. Driver 卡讀不到 KB :「Failed to read the ID Card」語音 Solution :\n- 對齊 NFC symbol\n- 換 supported NFC 格式\n- K220:確認用 QR Code(K220 不支援 RFID)\n- K145(c):需 i25 才能 QR Q8. Privacy Mode 卡住(設備不錄) 症狀 : \"Private Mode On\" 進去後沒再退 KB :Privacy Mode 不會自動退, Restart 後仍維持 Solution :Panic Button hold > 2s(KB)→ \"Private Mode Off\" Q9. Calibration 一直不完成 KB :\n- ADAS:60 km/h × 3 min(KB 寫 — 注意這是 初次 calibration 條件,跟持續門檻 30 不同)\n- DMS:20 km/h × 15 秒,臉穩定即可\n- 完成語音「Calibration Completed」 Solution :開高速直線路段 Q10. Camera 重置(最後手段) KB:How to reset device :\n- 用 paper clip 戳 reset button\n- ⚠️ K245 / K145c / K245c:reset button 在 tamper proof cover 後面,要先拆 對技術人員 escalation VisionAgent → Diagnostic Scan → 看 health report 如果還不行 → Master Portal 看 Diagnostics 頁 還不行 → KB「How to export the system logs from K220」(K220 special)→ Submit Ticket 對應 PM ticket VMX-7404 ADAS Failure → Q3 多重原因 VMX-7194 Rollover → Q4 sensor 系列 VMX-7427 Quantatec obstruction → 屬 Q9 範疇(camera 看不到驅動者) VMX-7407 UVC RAW frame error → 屬 Q2 範疇(sensor 不識別)"
        },

eparately .” → Brian 自己已說過「不在現有功能裡」、「需另外開發」、「API 沒特殊權限」。Cary 5/7 兩問其實是把同樣問題用更具體的規格再問一次。 C. 結論（內部用，不對外） Q1 passenger-only blurring（駕駛保留） 現行： 不支援 技術可行性： 可行 （BMS 有 DMS 知道駕駛座位置 → 可推駕駛臉 → blur 模組排除駕駛區） 實作成本： 新 spike ticket + RD scope → 排入 Q2 2026 update / 7 月最早 Q2 fleet / contract-fleet 層級套用 現行： 沒有 server-side gating ，blurring 是 caller-responsibility on-demand call 兩條路： (A)客戶端自控 ：CONNECTSOURCE 在自己 dispatch logic 只對特定 fleet 觸發 blur API → 馬上可做 (B)VMX server-side flag ：需 RD 排程，跟 Q1 一起綁 Q2 2026 update 推薦：先 (A) 救急、(B) 排正式路線圖 Q3 Teams customer session 應開， 但禁止裸接 — Brian dev scope 沒拍前不訂時間 進會議前要：(1) Q1/Q2 內部 scope 對齊；(2) 對外故事一致；(3) Brian 在場主答 D. 動作清單 立即（24h 內） [x] 完成本 calibration log + 更新 case-learning 主檔 [ ] 給 Brian 內部 DM 三點摘要（ 等使用者明示後才發 — auto-mode 不主動發訊息） 本週 [ ] Brian 拍 Q1/Q2 dev scope（PM 端追蹤） [ ] 若 Brian 同意，幫忙開兩張 spike ticket（ 不抓 Eric/Vincent/Jimmy 名字 — 等 Brian 指派） [ ] CONNECTSOURCE 4/24 起 5 件 P1 todo 全沒結（ 老問題 ），下一輪同步要拉出來逼進度 紅線提醒 ❌ 不在 thread 裡搶在 Brian 前回 Q1/Q2 ❌ 不在 dev scope 沒拍前訂 Teams session 時間 ❌ 對 Cary 講「現有沒能力」這種內部判讀（那是 Brian 該講的對外故事） E. 跨檔案連結 完整分析： ~/.claude/plans/https-outlook-cloud-microsoft-mail-categ-glimmering-sky.md 案件主檔（已更新時間軸 + Action Items）： case-learning/connectsource-passenger-blurring.md Jira 對齊佐證： knowledge/06_calibration-log/ai-tab-jira-alignment-2026-05-07.md API 文件（v2026-Q1）： https://visionmax.redocly.app/ F. Kenny 5/7 14:41 已發回信(對外 commitment 紀錄) ⚠️ 這是已發出的對外承諾,將來會被檢驗 。後續 RD 任何修改若跟這封信內容不一致,Kenny 必須主動補正 thread。 收件結構 收件:cary.lo-mitac, brian.chienlee, wendy.hammond 副本:elvis.tran-mitac, spencer.su Kenny 的具體承諾(逐條對照前段「結論」內部判讀) 議題 內部結論(C 段) 對外回信(F 段已發) 落差 自我介紹 — 「Pokai (Kenny) Huang, Technical Support , Brian’s team at MDT, based in Taipei. Brian has looped me in」 對外 title 用 Technical Support(對齊 user_kenny memory) Q1 Passenger-only blurring 現行不支援,技術可行,排 Q2 2026 update / 7 月 「Yes feasible. Our current API for the European deployment already supports independent blurring control for driver and passenger faces.」 🚨 對外升級成「現有 API 已支援」 (原內部判讀「現行不支援」)— 比 C 段樂觀。 待確認:Europ <script>
(function () {
  const data = JSON.parse(document.getElementById("hub-data").textContent);
  const tabsEl    = document.getElementById("tabs");
  const sidebarEl = document.getElementById("sidebar");
  const contentEl = document.getElementById("content");
  const searchEl  = document.getElementById("searchBox");
  const layoutEl  = document.getElementById("layout");
  const toggleEl  = document.getElementById("sidebarToggle");
  const handleEl  = document.getElementById("resizeHandle");

  const PENDING_RE = /(待釐清|待確認|待問|待補|待動作|待對齊|待裁示|TBD|TODO)/g;

  // Pseudo-categories
  const overviewCat = {
    id: "overview", name: "總覽", icon: "🏠",
    docs: [{
      id: "overview-readme",
      filename: "knowledge/README.md",
      title: "Knowledge Base 總覽",
      priority: 0,
      pending_count: 0,
    }],
  };
  const pendingCat = { id: "pending", name: "待釐清", icon: "📌", docs: [], isPending: true };
  const allCats = [overviewCat, ...data.categories, pendingCat];

  // ─── Per-doc HTML loader (each doc lives in docs/<id>.html) ───
  const docHtmlCache = Object.create(null);
  let loadToken = 0;

  async function loadDocHtml(docId) {
    if (docHtmlCache[docId] != null) return docHtmlCache[docId];
    try {
      const res = await fetch(`docs/${docId}.html`);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const text = await res.text();
      const dom = new DOMParser().parseFromString(text, "text/html");
      const node = dom.querySelector(".doc-content");
      const html = node
        ? node.innerHTML
        : `<div class="empty">⚠️ docs/${docId}.html 缺少 .doc-content 節點</div>`;
      docHtmlCache[docId] = html;
      return html;
    } catch (e) {
      return `<div class="empty">⚠️ 無法載入 <code>docs/${docId}.html</code>(${e.message})。<br>若以 <code>file://</code> 開啟,fetch 會被瀏覽器擋。請改用本機伺服器:<br><code>python -m http.server</code> 或 VS Code Live Server。</div>`;
    }
  }

  let activeCatId = allCats[0].id;
  let activeDocId = allCats[0].docs[0] ? allCats[0].docs[0].id : null;

  // ─── Sidebar persistence ───
  const savedW = parseInt(localStorage.getItem("hub-sidebar-w") || "0", 10);
  if (savedW >= 180 && savedW <= 600) {
    document.documentElement.style.setProperty("--sidebar-w", savedW + "px");
  }
  if (localStorage.getItem("hub-sidebar-collapsed") === "1") {
    layoutEl.classList.add("sidebar-collapsed");
  }

  // ─── Helpers ───
  function pendingCount() { return data.pending_total || 0; }
  function categoryCount(cat) { return cat.isPending ? pendingCount() : cat.docs.length; }
  function renderStars(n) { return n ? "★".repeat(n) + "☆".repeat(5 - n) : ""; }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function escapeAttr(s) { return escapeHtml(s); }

  // ─── Tabs ───
  function buildTabs() {
    tabsEl.innerHTML = "";
    allCats.forEach((cat) => {
      const t = document.createElement("div");
      t.className = "tab" + (cat.id === activeCatId ? " active" : "") + (cat.isPending ? " pending-tab" : "");
      const cnt = categoryCount(cat);
      t.innerHTML = `<span class="icon">${cat.icon}</span>${cat.name}` +
        (cnt > 0 ? `<span class="count">${cnt}</span>` : "");
      t.onclick = () => selectCategory(cat.id);
      tabsEl.appendChild(t);
    });
  }

  // ─── Sidebar ───
  function buildSidebar() {
    const cat = allCats.find((c) => c.id === activeCatId);
    if (!cat) { sidebarEl.innerHTML = `<div class="resize-handle" id="resizeHandle"></div>`; return; }

    let inner;
    if (cat.isPending) {
      inner = `<div class="sidebar-header">${cat.icon} ${cat.name}（${pendingCount()} 條)</div><ul>`;
      data.pending_groups.forEach((g) => {
        const total = g.files.reduce((s,f)=>s+f.items.length,0);
        inner += `<li><a class="group-link" data-cat="${g.category_id}" href="#${g.category_id}">
          <span class="row-title"><span class="row-title-text">${g.category_icon} ${escapeHtml(g.category_name)}</span><span class="pending-badge">${total}</span></span>
          <span class="filename">${g.files.length} 檔</span>
        </a></li>`;
      });
      inner += `</ul>`;
    } else {
      inner = `<div class="sidebar-header">${cat.icon} ${cat.name} (${cat.docs.length})</div><ul>`;
      cat.docs.forEach((d) => {
        const stars = d.priority > 0 ? `<span class="stars">${renderStars(d.priority)}</span>` : "";
        const badge = d.pending_count > 0 ? `<span class="pending-badge">${d.pending_count}</span>` : "";
        inner += `
          <li>
            <a href="#${activeCatId}/${d.id}" data-id="${d.id}" class="${d.id === activeDocId ? "active" : ""}" data-title="${escapeAttr(d.title)}" data-filename="${escapeAttr(d.filename)}">
              <span class="row-title">
                <span class="row-title-text">${escapeHtml(d.title)}</span>
                ${stars}${badge}
              </span>
              <span class="filename">${escapeHtml(d.filename)}</span>
            </a>
          </li>`;
      });
      inner += `</ul>`;
    }
    sidebarEl.innerHTML = inner + `<div class="resize-handle" id="resizeHandle"></div>`;

    sidebarEl.querySelectorAll("a[data-id]").forEach((a) => {
      a.onclick = (e) => { e.preventDefault(); selectDoc(a.dataset.id); };
    });
    sidebarEl.querySelectorAll(".group-link").forEach((a) => {
      a.onclick = (e) => { e.preventDefault(); selectCategory(a.dataset.cat); };
    });
    bindResizeHandle();
    applySearchFilter();
  }

  // ─── Content ───
  async function buildContent() {
    const cat = allCats.find((c) => c.id === activeCatId);
    if (!cat) { contentEl.innerHTML = `<div class="empty">未選擇分類</div>`; return; }

    if (cat.isPending) { buildPendingContent(); contentEl.scrollTop = 0; return; }

    const doc = cat.docs.find((d) => d.id === activeDocId);
    if (!doc) { contentEl.innerHTML = `<div class="empty">未選擇文件</div>`; return; }

    // Stale-fetch guard: each call gets a token; later clicks invalidate earlier loads.
    const myToken = ++loadToken;
    contentEl.innerHTML = `<div class="empty">載入 ${escapeHtml(doc.title)}…</div>`;

    const docHtml = await loadDocHtml(doc.id);
    if (myToken !== loadToken) return; // user already moved on

    const stars = doc.priority > 0
      ? `<span class="stars" title="重要性 ${doc.priority}/5">${renderStars(doc.priority)}</span>`
      : "";
    const pendingPill = doc.pending_count > 0 ? `<span class="pending-pill">${doc.pending_count} 待釐清</span>` : "";
    const canBack = navHistory.length > 1;

    const lastUpdated = doc.last_updated
      ? `<span class="last-updated" title="檔案最後修改日期">📅 ${escapeHtml(doc.last_updated)}</span>`
      : "";

    contentEl.innerHTML = `
      <article class="doc-wrapper">
        <div class="doc-meta">
          <span class="left">
            <button class="back-btn" id="backBtn" ${canBack ? "" : "disabled"} title="回到上一頁 (Alt+←)">← 上一頁</button>
            ${cat.icon} ${escapeHtml(cat.name)} ${stars} ${pendingPill}
          </span>
          <span class="meta-right">${lastUpdated} <span class="filename">${escapeHtml(doc.filename)}</span></span>
        </div>
        <div class="doc-content">${docHtml}</div>
      </article>
    `;
    contentEl.scrollTop = 0;
    bindBackButton();
    bindInternalLinks();
  }

  function buildPendingContent() {
    const canBack = navHistory.length > 1;
    let html = `<div class="pending-page">`;
    html += `
      <div class="back-btn-row"><button class="back-btn" id="backBtn" ${canBack ? "" : "disabled"} title="回到上一頁 (Alt+←)">← 上一頁</button></div>
      <div class="pending-summary">
        共 <strong>${pendingCount()}</strong> 條待釐清項目,
        分布於 ${data.pending_groups.length} 個分類、${data.pending_groups.reduce((s,g)=>s+g.files.length,0)} 個文件中。
        <br><small>關鍵字:待釐清 / 待確認 / 待問 / 待補 / 待動作 / 待對齊 / 待裁示 / TBD / TODO。點檔名跳到原文。</small>
      </div>
    `;
    data.pending_groups.forEach((g) => {
      const groupTotal = g.files.reduce((s, f) => s + f.items.length, 0);
      html += `<section class="pending-group">`;
      html += `<h3>${g.category_icon} ${escapeHtml(g.category_name)} <span class="group-count">${groupTotal}</span></h3>`;
      g.files.forEach((f) => {
        const docHash = `${g.category_id}/${f.doc_id}`;
        html += `<div class="pending-file">`;
        html += `<h4><a href="#${docHash}" class="jump" data-cat="${g.category_id}" data-doc="${f.doc_id}">${escapeHtml(f.title)}</a> <span class="count">${f.items.length}</span> <code>${escapeHtml(f.filename)}</code></h4>`;
        html += `<ul>`;
        f.items.forEach((it) => {
          const escaped = escapeHtml(it.line).replace(PENDING_RE, "<mark>$1</mark>");
          html += `<li><span class="ln">L${it.line_no}</span>${escaped}</li>`;
        });
        html += `</ul></div>`;
      });
      html += `</section>`;
    });
    if (pendingCount() === 0) html += `<div class="empty">🎉 沒有待釐清項目</div>`;
    html += `</div>`;
    contentEl.innerHTML = html;
    contentEl.querySelectorAll("a.jump").forEach((a) => {
      a.onclick = (e) => { e.preventDefault(); selectCatDoc(a.dataset.cat, a.dataset.doc); };
    });
    bindBackButton();
  }

  // ─── Click handler for internal .md links rewritten by the build ───
  function bindInternalLinks() {
    contentEl.querySelectorAll("a.internal-doc-link").forEach((a) => {
      a.onclick = (e) => {
        e.preventDefault();
        const cat = a.dataset.cat;
        const doc = a.dataset.doc;
        if (cat && doc) selectCatDoc(cat, doc);
      };
    });
  }

  // ─── Back button ───
  const navHistory = []; // stack of {catId, docId}
  function pushHistory() {
    const top = navHistory[navHistory.length - 1];
    if (top && top.catId === activeCatId && top.docId === activeDocId) return;
    navHistory.push({ catId: activeCatId, docId: activeDocId });
    if (navHistory.length > 100) navHistory.shift();
  }
  function bindBackButton() {
    const btn = document.getElementById("backBtn");
    if (btn) btn.onclick = goBack;
  }
  function goBack() {
    if (navHistory.length < 2) return;
    navHistory.pop();              // remove current
    const prev = navHistory[navHistory.length - 1];
    activeCatId = prev.catId;
    activeDocId = prev.docId;
    syncHash();
    buildTabs(); buildSidebar(); buildContent();
  }

  // ─── Routing ───
  function syncHash() {
    const cat = allCats.find((c) => c.id === activeCatId);
    if (cat && cat.isPending) location.hash = activeCatId;
    else location.hash = `${activeCatId}/${activeDocId || ""}`;
  }
  function selectCategory(catId) {
    activeCatId = catId;
    const cat = allCats.find((c) => c.id === activeCatId);
    activeDocId = (cat && !cat.isPending && cat.docs[0]) ? cat.docs[0].id : null;
    pushHistory();
    syncHash();
    buildTabs(); buildSidebar(); buildContent();
  }
  function selectDoc(docId) {
    activeDocId = docId;
    pushHistory();
    syncHash();
    buildSidebar(); buildContent();
  }
  function selectCatDoc(catId, docId) {
    activeCatId = catId;
    activeDocId = docId;
    pushHistory();
    syncHash();
    buildTabs(); buildSidebar(); buildContent();
  }

  // Build a doc-id → search-text lookup once, so input filter is fast.
  const docTextById = (() => {
    const map = Object.create(null);
    allCats.forEach((cat) => {
      (cat.docs || []).forEach((d) => {
        if (d.text) map[d.id] = d.text.toLowerCase();
      });
    });
    return map;
  })();

  function applySearchFilter() {
    const q = (searchEl.value || "").trim().toLowerCase();
    sidebarEl.querySelectorAll("li").forEach((li) => {
      const a = li.querySelector("a");
      if (!a) return;
      const docId = a.dataset.id || "";
      const haystack = (
        (a.dataset.title || "") + " " +
        (a.dataset.filename || "") + " " +
        a.textContent + " " +
        (docTextById[docId] || "")
      ).toLowerCase();
      li.classList.toggle("hidden", !!q && haystack.indexOf(q) === -1);
    });
  }

  function fromHash(initial) {
    const h = location.hash.replace(/^#/, "");
    if (!h) return;
    const [catId, docId] = h.split("/");
    const cat = allCats.find((c) => c.id === catId);
    if (!cat) return;
    activeCatId = cat.id;
    if (cat.isPending) { activeDocId = null; return; }
    if (docId) {
      const doc = cat.docs.find((d) => d.id === docId);
      if (doc) activeDocId = doc.id;
    } else {
      activeDocId = cat.docs[0] ? cat.docs[0].id : null;
    }
  }

  // ─── Sidebar resize ───
  function bindResizeHandle() {
    const handle = document.getElementById("resizeHandle");
    if (!handle) return;
    handle.addEventListener("mousedown", (e) => {
      e.preventDefault();
      handle.classList.add("dragging");
      document.body.classList.add("resizing");
      const startX = e.clientX;
      const startW = sidebarEl.getBoundingClientRect().width;
      function onMove(ev) {
        let w = startW + (ev.clientX - startX);
        w = Math.max(180, Math.min(600, w));
        document.documentElement.style.setProperty("--sidebar-w", w + "px");
      }
      function onUp() {
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        handle.classList.remove("dragging");
        document.body.classList.remove("resizing");
        const finalW = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--sidebar-w"), 10);
        if (finalW) localStorage.setItem("hub-sidebar-w", String(finalW));
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  }

  // ─── Sidebar toggle ───
  toggleEl.onclick = () => {
    layoutEl.classList.toggle("sidebar-collapsed");
    localStorage.setItem("hub-sidebar-collapsed", layoutEl.classList.contains("sidebar-collapsed") ? "1" : "0");
  };

  // ─── Init ───
  fromHash(true);
  pushHistory();
  buildTabs();
  buildSidebar();
  buildContent();

  searchEl.addEventListener("input", applySearchFilter);
  window.addEventListener("hashchange", () => {
    fromHash(false);
    pushHistory();
    buildTabs(); buildSidebar(); buildContent();
  });

  document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    // Ctrl+B → toggle sidebar
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "b") {
      e.preventDefault();
      toggleEl.click();
      return;
    }
    // Alt+← → back
    if (e.altKey && e.key === "ArrowLeft") {
      e.preventDefault();
      goBack();
      return;
    }
    const n = parseInt(e.key, 10);
    if (n >= 1 && n <= allCats.length) selectCategory(allCats[n - 1].id);
  });
})();
</script>
